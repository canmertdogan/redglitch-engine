<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Platformer Physics Smoke Test</title>
  <style>body{font-family:monospace;background:#222;color:#eee;padding:10px}</style>
</head>
<body>
  <h1>Platformer Physics Smoke Test</h1>
  <div id="output"></div>

  <!-- Engine dependencies (load minimal set) -->
  <script src="../PlatformerConfig.js"></script>
  <script src="../entities/Entity.js"></script>
  <script src="../entities/MovingPlatform.js"></script>
  <script src="../entities/Player.js"></script>
  <script src="../PhysicsSystem.js"></script>

  <script>
    const out = document.getElementById('output');
    function log(...args){
      console.log(...args);
      const el = document.createElement('div'); el.textContent = args.join(' '); out.appendChild(el);
    }

    // Setup a minimal map (10x6) with a flat platform at y=4
    const map = { width: 10, height: 6, collision: new Array(10*6).fill(0) };
    const groundY = 4;
    for(let x=0;x<10;x++){ map.collision[groundY*10 + x] = 1; }

    // Create systems
    const phys = new window.PhysicsSystem();

    // Create a moving platform above ground and a player on it
    const plat = new window.PlatformerMovingPlatform(2 * phys.tileSize, (groundY-1) * phys.tileSize, phys.tileSize*2, phys.tileSize/2);
    plat.speed = 1; // pixels-per-tick scale (legacy)

    const player = new window.PlatformerPlayer(2 * phys.tileSize, (groundY-2) * phys.tileSize);
    player.vx = 0; player.vy = 0;

    log('Initial player', player.x, player.y, 'platform', plat.x, plat.y);

    // Simulate mixed timesteps to ensure stable behavior
    const steps = [1/60, 1/30, 1/120, 0.08, 1/60, 1/60];

    function step(dt){
      // update platform
      plat.update(dt, map);
      // run physics for player with platform list
      phys.apply(player, map, [plat], dt);
      log(`dt=${dt.toFixed(4)} | plat.x=${plat.x.toFixed(2)} plat.lastX=${plat.lastX.toFixed(2)} | player.x=${player.x.toFixed(2)} player.y=${player.y.toFixed(2)}`);
    }

    (async function run(){
      for(const dt of steps){
        step(dt);
        // small delay so logs are readable
        await new Promise(r => setTimeout(r, 100));
      }
      log('Simulation complete. Inspect logs for platform riding stability.');
    })();
  </script>
</body>
</html>
