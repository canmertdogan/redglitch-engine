<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REDGLITCH GAME STUDIO</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <script src="lib/three.min.js"></script>
    <style>
        :root {
            --bg: #000;
            --accent: #f1c40f;
            --text: #cfd8dc;
            --dim: #444;
            --hud-blue: rgba(64, 224, 208, 0.3);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'VT323', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        #blackhole-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* Transparent Mesh Graph Canvas */
        #mesh-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            opacity: 0.3;
            pointer-events: none;
        }

        #ui-overlay-tint {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.9) 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* --- HUD GRAPHICS --- */
        .hud-element {
            position: fixed;
            z-index: 100;
            pointer-events: none;
            color: var(--hud-blue);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hud-line {
            position: fixed;
            background: var(--hud-blue);
            z-index: 99;
        }

        .scanning-line {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to bottom, transparent, var(--hud-blue), transparent);
            z-index: 101;
            animation: scan 8s linear infinite;
            opacity: 0.5;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .container {
            z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            width: 80%; max-width: 800px;
            pointer-events: none;
        }

        /* Glitch Text Effect */
        .glitch {
            z-index: 100;
            position: fixed;
            top: 35px;
            left: 40px;
            font-family: 'VT323', monospace;
            font-size: 2rem;
            letter-spacing: 6px;
            color: #fff;
            pointer-events: none;
        }
        .glitch span { color: var(--accent); }
        .glitch::before, .glitch::after {
            content: 'REDGLITCH GAME STUDIO';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.8;
        }
        .glitch::before { color: #ff00c1; z-index: -1; animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite; }
        .glitch::after { color: #00fff9; z-index: -2; animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) reverse both infinite; }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--dim);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .loader-box {
            width: 100%;
            display: flex; flex-direction: column; gap: 3px;
        }

        .bar-frame {
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            position: absolute; left: 0; top: 0; bottom: 0;
            background: var(--accent);
            width: 0%;
            box-shadow: 0 0 20px var(--accent);
        }

        .status-row {
            display: flex; justify-content: space-between;
            font-size: 0.8rem; color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .terminal {
            width: 100%; height: 60px;
            margin-top: 15px;
            color: #888; font-size: 0.75rem;
            overflow: hidden;
            display: flex; flex-direction: column-reverse;
            border-top: 1px solid #222;
            padding-top: 5px;
        }
        .log-entry { margin-bottom: 2px; }
        .log-entry.active { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        .corner {
            position: fixed; width: 40px; height: 40px;
            border: 2px solid var(--dim);
            pointer-events: none;
            z-index: 100;
        }
        .tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        .roscosmos {
            position: fixed;
            bottom: 25px;
            right: 45px;
            font-size: 10px;
            color: rgba(255,255,255,0.1);
            letter-spacing: 4px;
            z-index: 100;
            pointer-events: none;
            text-transform: uppercase;
        }

        /* HUD Readouts */
        #hud-coords { top: 100px; left: 40px; }
        #hud-status { top: 100px; right: 40px; text-align: right; }
        #hud-vitals { bottom: 120px; left: 40px; }
    </style>
</head>
<body>

    <div id="blackhole-container"></div>
    <canvas id="mesh-canvas"></canvas>
    <div id="ui-overlay-tint"></div>
    <div class="scanning-line"></div>

    <!-- HUD ELEMENTS -->
    <div id="hud-coords" class="hud-element">
        LAT: 45.9206° N<br>
        LON: 63.3422° E<br>
        ALT: 408.2 KM
    </div>
    <div id="hud-status" class="hud-element">
        SYSTEM: NOMINAL<br>
        CORE: STABLE<br>
        SINGULARITY: ACTIVE
    </div>
    <div id="hud-vitals" class="hud-element">
        <div style="width: 100px; height: 2px; background: var(--hud-blue); margin-bottom: 5px;"></div>
        O2: 98% | TEMP: 21°C<br>
        RADIATION: 0.02 mSv/h
    </div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- CORNER BRANDING -->
    <div class="glitch" style="z-index:100;">
        REDGLITCH GAME <span>STUDIO</span>
        <div class="subtitle" style="margin:0; letter-spacing:2px; opacity:0.6;">REDGLITCH ENGINE V7</div>
    </div>

    <div style="position:fixed; top:35px; right:40px; z-index:100; text-align:right; pointer-events: none;">
        <div style="color:var(--accent); font-size:1.2rem; letter-spacing:3px; text-shadow: 0 0 10px var(--accent);">CORE V7</div>
        <div style="color:#555; font-size:0.7rem; margin-top:5px;">BUILD: 2026.02.11_GARGANTUA_PRO</div>
    </div>

    <div class="roscosmos">РОСКОСМОС</div>

    <!-- BOTTOM LOADING UI -->
    <div class="container" style="position:fixed; bottom:40px; left:50%; transform:translateX(-50%); width:85%; max-width:none;">
        <div class="loader-box">
            <div class="status-row">
                <span id="status-text">INITIALIZING SINGULARITY...</span>
                <span id="pct">0%</span>
            </div>
            <div class="bar-frame">
                <div class="bar-fill" id="bar"></div>
            </div>
        </div>

        <div class="terminal" id="terminal"></div>
    </div>

    <script>
        /**
         * GARGANTUA PRO - CINEMATIC PRECISION + HUD
         */
        (function() {
            const container = document.getElementById('blackhole-container');
            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.PlaneGeometry(2, 2);
            const uniforms = {
                iTime: { value: 0 },
                iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
            };

            const fragmentShader = `
                uniform float iTime;
                uniform vec2 iResolution;

                float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453123); }
                float noise(vec2 p) {
                    vec2 i = floor(p); vec2 f = fract(p);
                    f = f*f*(3.0-2.0*f);
                    return mix(mix(hash(i + vec2(0,0)), hash(i + vec2(1,0)), f.x),
                               mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * iResolution.xy) / min(iResolution.y, iResolution.x);
                    float d = length(uv);
                    float shadow = smoothstep(0.08, 0.085, d);
                    float photon = exp(-pow(d - 0.09, 2.0) * 5000.0) * 1.5;
                    float angle = atan(uv.y, uv.x);
                    float disk_h = exp(-pow(uv.y, 2.0) * 200.0) * smoothstep(0.1, 0.5, d) * exp(-d * 1.5);
                    float lens_r = abs(d - 0.22);
                    float disk_v = exp(-pow(lens_r, 2.0) * 1000.0) * 0.5;
                    float n = noise(vec2(angle * 5.0 - iTime * 1.5, d * 20.0));
                    float final_disk = (disk_h + disk_v) * (0.7 + 0.3 * n);
                    float glow = exp(-d * 6.0) * 0.15;
                    vec3 col = vec3(0.0);
                    vec2 star_uv = uv * (1.0 + 0.03 / (d + 0.01));
                    float stars = pow(noise(star_uv * 100.0), 40.0);
                    col += vec3(stars) * 0.4 * shadow;
                    vec3 gold = vec3(1.0, 0.7, 0.2);
                    col += gold * final_disk * 1.8;
                    col += vec3(1.0) * photon;
                    col += gold * glow;
                    col *= shadow;
                    col = pow(col, vec3(1.1));
                    gl_FragColor = vec4(col, 1.0);
                }
            `;

            const material = new THREE.ShaderMaterial({ uniforms, fragmentShader });
            scene.add(new THREE.Mesh(geometry, material));

            function animate(time) {
                requestAnimationFrame(animate);
                uniforms.iTime.value = time * 0.001;
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
            });
        })();

        // --- MESH GRAPH ANIMATION ---
        (function() {
            const canvas = document.getElementById('mesh-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];
            
            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > w) this.vx *= -1;
                    if (this.y < 0 || this.y > h) this.vy *= -1;
                }
            }

            for(let i=0; i<60; i++) particles.push(new Particle());

            function draw() {
                ctx.clearRect(0, 0, w, h);
                ctx.strokeStyle = 'rgba(64, 224, 208, 0.15)';
                ctx.lineWidth = 0.5;

                for(let i=0; i<particles.length; i++) {
                    particles[i].update();
                    for(let j=i+1; j<particles.length; j++) {
                        let dx = particles[i].x - particles[j].x;
                        let dy = particles[i].y - particles[j].y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // --- HUD UPDATES ---
        setInterval(() => {
            const coords = document.getElementById('hud-coords');
            if (coords) {
                const lat = (45.9206 + (Math.random() - 0.5) * 0.001).toFixed(4);
                const lon = (63.3422 + (Math.random() - 0.5) * 0.001).toFixed(4);
                coords.innerHTML = `LAT: ${lat}° N<br>LON: ${lon}° E<br>ALT: ${(408.2 + (Math.random() - 0.5) * 0.5).toFixed(1)} KM`;
            }
        }, 500);

        // --- LOADING LOGIC ---
        const logs = [
            "Initiating Vostok protocol...",
            "Warping asset horizon...",
            "Stabilizing photon sphere...",
            "Igniting Singularity core...",
            "Bending light manifolds...",
            "Connecting Baikonur relay...",
            "Stability reached.",
            "Welcome, Architect."
        ];
        
        let progress = 0;
        const bar = document.getElementById('bar');
        const pct = document.getElementById('pct');
        const status = document.getElementById('status-text');
        const term = document.getElementById('terminal');

        function log(msg) {
            const div = document.createElement('div');
            div.className = 'log-entry active';
            div.innerText = `> ${msg}`;
            term.prepend(div);
            if (status) status.innerText = msg.toUpperCase();
        }

        function updateProgress() {
            if (progress < 100) {
                let step = Math.random() * 1.2;
                if (progress > 85) step = 0.1;
                progress += step;
                if (progress > 100) progress = 100;

                if (bar) bar.style.width = progress + '%';
                if (pct) pct.innerText = Math.floor(progress) + '%';

                const logIndex = Math.floor((progress / 100) * logs.length);
                if (term && term.children.length < logIndex + 1 && logs[logIndex]) {
                    log(logs[logIndex]);
                }

                if (progress >= 100) {
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
                    return;
                }
                setTimeout(updateProgress, 35);
            }
        }
        updateProgress();
    </script>
</body>
</html>
