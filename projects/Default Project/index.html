<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline' ; font-src 'self' ; connect-src 'self' http://localhost:3000 ws://localhost:3000; img-src 'self' data: blob:;">
    <script>
        window.onerror = function(msg, url, line, col, error) {
            console.error("Error: " + msg + "\n\n" + url + ":" + line + ":" + col);
            return false;
        };
        window.onunhandledrejection = function(event) {
            console.error("Unhandled Rejection: " + event.reason);
        };
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KETEBE ENGINE</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="base_game/style.css">
    <link href="fonts/fonts.css" rel="stylesheet">
</head>
<body>
    <canvas id="atmosphere-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1;"></canvas>

    <!-- SCREEN: LOGIN -->
    <div id="login-screen" class="screen active">
        <div class="ui-scaler">
            <div class="terminal-window" style="position: absolute; left: 175px; top: 50px;">
                <h1 style="color:var(--accent); margin:0;">KETEBE TERMINAL</h1>
                <p id="login-prompt">Identify yourself, Traveler.</p>
                <input type="text" id="username-input" placeholder="ENTER NAME..." maxlength="12" autocomplete="off">
                <button id="login-btn" class="retro-btn" style="position:relative; width:100%; height:50px; margin-top:10px;" onclick="window.attemptLogin()">CONNECT</button>
            </div>
        </div>
    </div>

    <!-- SCREEN: MAIN MENU -->
    <div id="main-menu" class="screen hidden">
        <div class="ui-scaler">
            <div style="position: absolute; bottom: 20px; width: 100%; text-align: center; color: #555;">
                USER: <span id="current-user-display" style="color:var(--accent);">GUEST</span>
            </div>
        </div>
    </div>

    <!-- SCREEN: SKILL SELECTOR -->
    <div id="skill-selector-screen" class="screen hidden">
        <div class="ui-scaler"></div>
    </div>

    <!-- SCREEN: SETTINGS -->
    <div id="settings-screen" class="screen hidden">
        <div class="ui-scaler"></div>
    </div>

    <!-- SCREEN: OVERLAYS -->
    <div id="overlay-screen" class="screen hidden">
        <div class="ui-scaler">
            <div class="retro-panel" style="left: 100px; top: 50px; width: 600px; height: 350px; text-align: center;">
                <h2 id="overlay-title" class="retro-label" style="position:relative; width:100%; font-size:2.5rem; margin-top:20px;">TITLE</h2>
                <div id="overlay-body" style="padding:20px; color:#fff; font-size:1.2rem;">Content...</div>
                <button id="btn-close-overlay" class="retro-btn" style="position:relative; width:150px; height:40px; margin-top:20px;">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- SCREEN: DEATH -->
    <div id="death-screen" class="screen hidden">
        <div class="ui-scaler">
            <h1 class="death-title">YOU DIED</h1>
            
            <div style="position:absolute; width:100%; top:220px; text-align:center; color:#ff0000; font-family:inherit; font-size:1.5rem; text-shadow:2px 2px 0 #000;">
                REVIVES: <span id="revive-count" style="color:#fff;">5</span> | 
                RESPAWNS: <span id="respawn-count" style="color:#fff;">3</span>
            </div>

            <div style="position:absolute; width:100%; top:280px; display:flex; justify-content:center; gap:20px;">
                <button id="btn-revive" class="retro-btn death-btn" style="position:relative; width:180px; height:60px; font-size:2rem;">REVIVE</button>
                <button id="btn-respawn" class="retro-btn death-btn" style="position:relative; width:180px; height:60px; font-size:2rem;">RESPAWN</button>
            </div>

            <button id="btn-death-quit" class="retro-btn" style="left:300px; top:360px; width:200px; height:40px; font-size:1.2rem; border-color:#555; color:#888;">MAIN MENU</button>
        </div>
    </div>

    <!-- SCREEN: PAUSE -->
    <div id="pause-menu" class="screen hidden">
        <div class="ui-scaler"></div>
    </div>

    <!-- SCREEN: INVENTORY -->
    <div id="inventory-screen" class="screen hidden">
        <div class="ui-scaler"></div>
    </div>

    <!-- SCREEN: SPLASH -->
    <div id="splash-screen" class="screen" style="background:#050505; z-index:10000; display:flex; overflow:hidden;">
        <div class="stars-layer-1"></div>
        <div class="stars-layer-2"></div>
        <div class="ui-scaler" style="perspective: 1200px; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            
            <div class="atom-3d-container">
                <div class="atom-3d">
                    <!-- Nucleus (Pixel Cube) -->
                    <div class="nucleus">
                        <div class="face front"></div>
                        <div class="face back"></div>
                        <div class="face right"></div>
                        <div class="face left"></div>
                        <div class="face top"></div>
                        <div class="face bottom"></div>
                    </div>
                    
                    <!-- Electron Rings -->
                    <div class="orbit-ring ring-1">
                        <div class="electron"></div>
                    </div>
                    <div class="orbit-ring ring-2">
                        <div class="electron"></div>
                    </div>
                    <div class="orbit-ring ring-3">
                        <div class="electron"></div>
                    </div>
                </div>
            </div>

            <h1 class="splash-text glitch-text" data-text="KETEBE ENGINE">POWERED BY <br><span style="color:var(--accent); font-size: 1.2em;">KETEBE ENGINE</span></h1>
        </div>
    </div>

    <!-- SCREEN: LOADING -->
    <div id="loading-screen" class="screen hidden" style="background:#000; z-index:9999;">
        <div class="ui-scaler">
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
                <h1 class="retro-label" style="position:relative; font-size:3rem;">LOADING ASSETS...</h1>
                <div style="width:400px; height:30px; border:2px solid var(--accent); padding:3px; margin-top:20px;">
                    <div id="game-loading-bar" style="width:0%; height:100%; background:var(--accent); transition:width 0.1s;"></div>
                </div>
                <div id="game-loading-text" style="margin-top:10px; color:#fff;">0%</div>
            </div>
        </div>
    </div>

    <!-- SCREEN: GAMEPLAY -->
    <div id="game-container" class="hidden">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-scaler" id="game-ui-scaler" style="pointer-events: none;">
            <div id="game-hud">
                <div id="status-bars">
                    <div class="bar-container" id="hp_bar"><div class="bar-fill hp" style="width: 100%;"></div><span class="bar-label">AL-HAYAT</span></div>
                    <div class="bar-container" id="stamina_bar"><div class="bar-fill stamina" style="width: 100%;"></div><span class="bar-label">SAAF TA'ISH</span></div>
                    <div class="bar-container" id="mana_bar"><div class="bar-fill mana" style="width: 100%;"></div><span class="bar-label">IRAB POWER</span></div>
                </div>
                <div id="game-clock">08:00</div>
                <div id="skill-bar">
                    <div class="skill-slot"><span class="inv-slot-num">Z</span></div>
                    <div class="skill-slot"><span class="inv-slot-num">X</span></div>
                    <div class="skill-slot"><span class="inv-slot-num">C</span></div>
                    <div class="skill-slot"><span class="inv-slot-num">V</span></div>
                </div>
                <div id="inventory-bar">
                    <div class="inv-slot"><span class="inv-slot-num">1</span></div>
                    <div class="inv-slot"><span class="inv-slot-num">2</span></div>
                    <div class="inv-slot"><span class="inv-slot-num">3</span></div>
                    <div class="inv-slot"><span class="inv-slot-num">4</span></div>
                    <div class="inv-slot"><span class="inv-slot-num">5</span></div>
                    <div class="inv-slot"><span class="inv-slot-num">6</span></div>
                    <div class="inv-slot"><span class="inv-slot-num">7</span></div>
                    <div class="inv-slot"><span class="inv-slot-num">8</span></div>
                    <div class="inv-slot"><span class="inv-slot-num">9</span></div>
                </div>
                <div id="top-right-controls">
                    <button id="debug-iso-btn" class="retro-btn" style="position:relative; width:44px; height:44px; font-size:0.8rem;">ISO</button>
                    <button id="btn-save" class="retro-btn" style="position:relative; width:44px; height:44px; font-size:0.8rem;">SAV</button>
                    <button id="pause-btn" class="retro-btn" style="position:relative; width:44px; height:44px;">||</button>
                    <button id="fullscreen-btn" class="retro-btn" style="position:relative; width:44px; height:44px;">⛶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE CONTROLS -->
    <div id="mobile-controls" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999;">
        <!-- D-Pad / Joystick Area -->
        <div id="joystick-zone" style="position: absolute; bottom: 50px; left: 50px; width: 150px; height: 150px; pointer-events: auto;">
            <div id="virtual-joystick-base" class="joystick-base pixel-art">
                <div id="virtual-joystick-stick" class="joystick-stick pixel-art"></div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div id="action-zone" style="position: absolute; bottom: 50px; right: 50px; width: 200px; height: 180px; pointer-events: auto;">
            <!-- Main Attack (Big) -->
            <div class="touch-btn action-btn btn-atk" data-key="MOUSE" style="position:absolute; bottom:20px; right:20px; width:90px; height:90px; font-size:1.5rem;">ATK</div>
            
            <!-- Secondary Actions -->
            <div class="touch-btn action-btn btn-act" data-key="Space" style="position:absolute; bottom:0; right:130px; width:60px; height:60px; font-size:1rem;">ACT</div>
            <div class="touch-btn action-btn btn-run" data-key="ShiftLeft" style="position:absolute; bottom:80px; right:130px; width:60px; height:60px; font-size:1rem;">RUN</div>
            <div class="touch-btn action-btn btn-skill" data-key="KeyZ" style="position:absolute; top:0; right:40px; width:60px; height:60px; font-size:1rem;">SKILL</div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/android-adapter.bundle.js"></script>
    <script src="js/runtime-loader.js"></script>
</body>
</html>
