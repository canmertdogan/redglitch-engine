<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Engine - Test</title>
    <link href="../../fonts/fonts.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            font-family: 'VT323', monospace;
            overflow: hidden;
            color: #fff;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10000;
        }
        
        #loading-screen.hidden {
            display: none;
        }
        
        #loading-text {
            color: #f1c40f;
            font-size: 36px;
            letter-spacing: 4px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        #game-container {
            width: 100%;
            height: 100vh;
            position: relative;
            display: none;
        }
        
        #game-container.hidden {
            display: none;
        }
        
        #game-container:not(.hidden) {
            display: block;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 5000;
        }
        
        #login-screen.hidden {
            display: none;
        }
        
        #login-box {
            background: #111;
            border: 3px solid #f1c40f;
            padding: 40px;
            text-align: center;
        }
        
        #login-title {
            color: #f1c40f;
            font-size: 48px;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }
        
        #username-input {
            background: #000;
            border: 2px solid #444;
            color: #f1c40f;
            font-family: 'VT323', monospace;
            font-size: 24px;
            padding: 10px 20px;
            width: 300px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        #username-input:focus {
            outline: none;
            border-color: #f1c40f;
        }
        
        #login-btn {
            background: #f1c40f;
            border: none;
            color: #000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            padding: 10px 40px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        
        #login-btn:hover {
            background: #fff;
            transform: scale(1.05);
        }
        
        #login-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div id="loading-text">LOADING PLATFORMER ENGINE...</div>
    </div>
    
    <!-- Login Screen -->
    <div id="login-screen" class="hidden">
        <div id="login-box">
            <div id="login-title">VORTEX WORM</div>
            <input type="text" id="username-input" placeholder="ENTER USERNAME" maxlength="16">
            <br>
            <button id="login-btn" onclick="attemptLogin()">START</button>
        </div>
    </div>
    
    <!-- Game Container -->
    <div id="game-container" class="hidden">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <!-- Load Engine Scripts -->
    <script src="../rpg-topdown/sprites.js"></script>
    <script src="../rpg-topdown/fxSystem.js"></script>
    <script src="../../shared/DialogueSystem.js"></script>
    <script src="../../shared/QuestSystem.js"></script>
    <script src="PlatformerConfig.js"></script>
    <script src="PlatformerAssetManager.js"></script>
    <script src="ParallaxSystem.js"></script>
    <script src="Animator.js"></script>
    <script src="CombatSystem.js"></script>
    <script src="entities/Entity.js"></script>
    <script src="entities/Player.js"></script>
    <script src="entities/Enemy.js"></script>
    <script src="entities/FlyingEnemy.js"></script>
    <script src="entities/ShooterEnemy.js"></script>
    <script src="entities/Projectile.js"></script>
    <script src="entities/PushableBlock.js"></script>
    <script src="entities/MovingPlatform.js"></script>
    <script src="entities/Trigger.js"></script>
    <script src="PhysicsSystem.js"></script>
    <script src="renderer.js"></script>
    <script src="generator/SmartGenerator.js"></script>
    <script src="main.js"></script>
    
    <!-- Initialize -->
    <script>
        // Check if launched from editor with params
        const urlParams = new URLSearchParams(window.location.search);
        const levelId = urlParams.get('level');
        const project = urlParams.get('project');
        const isPlaytest = urlParams.get('playtest') === 'true';
        
        if (isPlaytest) {
            // Playtest mode - load from localStorage
            const testData = localStorage.getItem('temp_playtest_platformer');
            if (testData) {
                window.game = new PlatformerGame();
                window.game.username = 'TEST_USER';
                window.game.currentProject = 'Playtest';
                
                const loadingScreen = document.getElementById('loading-screen');
                const gameContainer = document.getElementById('game-container');
                
                window.game.init().then(() => {
                    // Load level directly from data
                    const levelData = JSON.parse(testData);
                    return window.game.loadLevelFromData(levelData);
                }).then(() => {
                    loadingScreen.classList.add('hidden');
                    gameContainer.classList.remove('hidden');
                }).catch(err => {
                    console.error('[Playtest] Failed to load:', err);
                    alert('Failed to load playtest level: ' + err.message);
                });
            } else {
                alert('No playtest data found in localStorage!');
            }
        } else if (levelId && project) {
            // Test mode - load specific level
            window.game = new PlatformerGame();
            window.game.username = 'TEST_USER';
            window.game.currentProject = project;
            
            const loadingScreen = document.getElementById('loading-screen');
            const gameContainer = document.getElementById('game-container');
            
            window.game.init().then(() => {
                const levelPath = `/projects/${project}/dunyalar/platformer/${levelId}.json`;
                return window.game.loadLevel(levelId, levelPath);
            }).then(() => {
                loadingScreen.classList.add('hidden');
                gameContainer.classList.remove('hidden');
            }).catch(err => {
                console.error('Failed to load test level:', err);
                alert('Failed to load level: ' + err.message);
            });
        } else {
            // Normal mode - show login
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }
        
        function attemptLogin() {
            const input = document.getElementById('username-input');
            if (input && input.value.trim()) {
                window.game.login(input.value.trim().toUpperCase());
            }
        }
        
        // Allow Enter key to login
        document.getElementById('username-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                attemptLogin();
            }
        });
    </script>
</body>
</html>
