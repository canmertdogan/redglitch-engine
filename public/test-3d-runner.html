<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex 3D Engine Test Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .subtitle {
            color: #aaa;
            font-size: 0.9em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        button:hover {
            background: #00ff99;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
            color: #999;
        }

        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .test-card {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #444;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }

        .test-card:hover {
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .test-card h3 {
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .test-card.loading h3::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #ffaa00;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .test-list {
            list-style: none;
        }

        .test-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid #666;
            border-radius: 3px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .test-item.pass {
            border-left-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .test-item.fail {
            border-left-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .test-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .test-status.pass {
            background: #00ff88;
            color: #000;
        }

        .test-status.fail {
            background: #ff4444;
            color: #fff;
        }

        .summary {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .summary-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            border: 1px solid #444;
        }

        .summary-item .label {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .summary-item .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00ff88;
        }

        .summary-item.failed .value {
            color: #ff4444;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.pass {
            background: #00ff88;
        }

        .status-indicator.fail {
            background: #ff4444;
        }

        .status-indicator.pending {
            background: #ffaa00;
            animation: pulse 1.5s infinite;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 0.85em;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 255, 136, 0.3);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            color: #666;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #444;
        }

        .timestamp {
            color: #888;
            font-size: 0.85em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Vortex 3D Engine Test Suite</h1>
            <p class="subtitle">Real-time validation of 3D engine systems</p>
        </header>

        <div class="controls">
            <button id="runAllBtn" onclick="runAllTests()">▶ Run All Tests</button>
            <button id="runSharedBtn" onclick="runTestCategory('shared-3d')">Test Shared</button>
            <button id="runTopdownBtn" onclick="runTestCategory('topdown-3d')">Test Top-Down 3D</button>
            <button id="runFpsBtn" onclick="runTestCategory('fps-3d')">Test FPS 3D</button>
            <button id="runPlatformerBtn" onclick="runTestCategory('platformer-3d')">Test Platformer 3D</button>
            <button id="clearBtn" onclick="clearResults()">Clear Results</button>
        </div>

        <div id="summary" class="summary" style="display: none;">
            <h2>📊 Test Summary</h2>
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="label">Total Tests</div>
                    <div class="value" id="totalCount">0</div>
                </div>
                <div class="summary-item">
                    <div class="label">Passed</div>
                    <div class="value" id="passCount" style="color: #00ff88;">0</div>
                </div>
                <div class="summary-item failed">
                    <div class="label">Failed</div>
                    <div class="value" id="failCount" style="color: #ff4444;">0</div>
                </div>
                <div class="summary-item">
                    <div class="label">Pass Rate</div>
                    <div class="value" id="passRate">0%</div>
                </div>
            </div>
            <div class="timestamp">
                Last updated: <span id="summaryTimestamp">-</span>
            </div>
        </div>

        <div class="test-grid" id="testGrid"></div>

        <div class="footer">
            <p>Vortex 3D Engine Test Suite | Status: <span id="overallStatus">Ready</span></p>
        </div>
    </div>

    <script>
        const API_BASE = '/api/test';

        async function runAllTests() {
            setUIState('testing');
            document.getElementById('summary').style.display = 'block';
            
            try {
                const response = await fetch(`${API_BASE}/run-all`, { method: 'POST' });
                const data = await response.json();
                
                await wait(500); // Brief delay to let UI update
                await loadResults();
            } catch (error) {
                showError('Failed to run all tests: ' + error.message);
            }
        }

        async function runTestCategory(category) {
            setUIState('testing');
            document.getElementById('summary').style.display = 'block';
            
            try {
                const response = await fetch(`${API_BASE}/${category}`, { method: 'POST' });
                const data = await response.json();
                
                await wait(300);
                await loadResults();
            } catch (error) {
                showError(`Failed to run ${category} tests: ` + error.message);
            }
        }

        async function loadResults() {
            try {
                const response = await fetch(`${API_BASE}/summary`);
                const summary = await response.json();
                
                updateSummary(summary);
                await loadDetailedResults();
            } catch (error) {
                showError('Failed to load results: ' + error.message);
                setUIState('ready');
            }
        }

        async function loadDetailedResults() {
            try {
                const response = await fetch(`${API_BASE}/results`);
                const data = await response.json();
                
                renderTestResults(data);
                setUIState('ready');
            } catch (error) {
                showError('Failed to load detailed results: ' + error.message);
            }
        }

        function updateSummary(summary) {
            document.getElementById('totalCount').textContent = summary.summary.total;
            document.getElementById('passCount').textContent = summary.summary.passed;
            document.getElementById('failCount').textContent = summary.summary.failed;
            document.getElementById('passRate').textContent = summary.summary.passPercentage;
            document.getElementById('summaryTimestamp').textContent = new Date(summary.timestamp).toLocaleTimeString();
            
            const statusText = summary.summary.status;
            document.getElementById('overallStatus').textContent = statusText;
            
            if (summary.summary.failed === 0 && summary.summary.total > 0) {
                document.getElementById('overallStatus').style.color = '#00ff88';
            } else if (summary.summary.failed > 0) {
                document.getElementById('overallStatus').style.color = '#ff4444';
            }
        }

        function renderTestResults(data) {
            const grid = document.getElementById('testGrid');
            grid.innerHTML = '';
            
            Object.entries(data.tests).forEach(([category, tests]) => {
                const card = createTestCard(category, tests);
                grid.appendChild(card);
            });
        }

        function createTestCard(category, tests) {
            const card = document.createElement('div');
            card.className = 'test-card';
            
            const passed = tests.filter(t => t.passed).length;
            const failed = tests.filter(t => !t.passed).length;
            
            let categoryLabel = category;
            switch(category) {
                case 'shared-3d': categoryLabel = '🔧 Shared 3D Infrastructure'; break;
                case 'topdown-3d': categoryLabel = '⬇️ Top-Down 3D Engine'; break;
                case 'fps-3d': categoryLabel = '🎯 FPS 3D Engine'; break;
                case 'platformer-3d': categoryLabel = '🏃 Platformer 3D Engine'; break;
            }
            
            const header = document.createElement('h3');
            header.innerHTML = `<span class="status-indicator ${failed === 0 ? 'pass' : 'fail'}"></span>${categoryLabel}`;
            card.appendChild(header);
            
            const stats = document.createElement('div');
            stats.style.fontSize = '0.85em';
            stats.style.color = '#aaa';
            stats.style.marginBottom = '10px';
            stats.innerHTML = `${passed}/${tests.length} passed`;
            card.appendChild(stats);
            
            const list = document.createElement('ul');
            list.className = 'test-list';
            
            tests.forEach(test => {
                const item = document.createElement('li');
                item.className = `test-item ${test.passed ? 'pass' : 'fail'}`;
                
                const name = document.createElement('span');
                name.textContent = test.name;
                
                const status = document.createElement('span');
                status.className = `test-status ${test.passed ? 'pass' : 'fail'}`;
                status.textContent = test.passed ? '✓ PASS' : '✗ FAIL';
                
                item.appendChild(name);
                item.appendChild(status);
                
                if (!test.passed && test.message) {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message';
                    errorDiv.textContent = test.message;
                    item.appendChild(errorDiv);
                }
                
                list.appendChild(item);
            });
            
            card.appendChild(list);
            return card;
        }

        function clearResults() {
            document.getElementById('testGrid').innerHTML = '';
            document.getElementById('summary').style.display = 'none';
            document.getElementById('overallStatus').textContent = 'Ready';
            document.getElementById('overallStatus').style.color = '#fff';
        }

        function setUIState(state) {
            const buttons = ['runAllBtn', 'runSharedBtn', 'runTopdownBtn', 'runFpsBtn', 'runPlatformerBtn'];
            buttons.forEach(id => {
                document.getElementById(id).disabled = state === 'testing';
            });
            
            if (state === 'testing') {
                document.getElementById('overallStatus').innerHTML = '<span class="loading-spinner"></span> Running Tests...';
                document.getElementById('overallStatus').style.color = '#ffaa00';
            }
        }

        function showError(message) {
            const grid = document.getElementById('testGrid');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.style.margin = '20px 0';
            errorDiv.innerHTML = `<strong>⚠️ Error:</strong> ${message}`;
            grid.insertBefore(errorDiv, grid.firstChild);
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Check API health on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    const data = await response.json();
                    console.log('Test API is healthy:', data);
                }
            } catch (error) {
                showError('Test API is not responding. Make sure the server is running.');
            }
        });
    </script>
</body>
</html>
