<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Launcher - RedGlitch Engine</title>
    <link rel="stylesheet" href="base_game/style.css">
    <link href="fonts/fonts.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --dark: #1a1a2e;
            --light: #eee;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            font-family: 'VT323', monospace;
            color: var(--light);
            overflow: hidden;
        }

        .stars-layer-1, .stars-layer-2 {
            position: fixed;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 0;
        }

        .stars-layer-1 {
            background-image: 
                radial-gradient(2px 2px at 20px 30px, white, transparent),
                radial-gradient(2px 2px at 60px 70px, white, transparent),
                radial-gradient(1px 1px at 50px 50px, white, transparent);
            background-size: 200px 200px;
            animation: stars-drift 20s linear infinite;
        }

        .stars-layer-2 {
            background-image: 
                radial-gradient(1px 1px at 40px 60px, white, transparent),
                radial-gradient(1px 1px at 80px 10px, white, transparent);
            background-size: 150px 150px;
            animation: stars-drift 30s linear infinite reverse;
            opacity: 0.5;
        }

        @keyframes stars-drift {
            from { background-position: 0 0; }
            to { background-position: -200px -200px; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .header .subtitle {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        .campaign-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .campaign-card {
            background: rgba(0, 0, 0, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .campaign-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
        }

        .campaign-card.selected {
            border-color: var(--accent);
            background: rgba(46, 204, 113, 0.2);
        }

        .campaign-name {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .campaign-description {
            font-size: 0.7rem;
            line-height: 1.5;
            opacity: 0.8;
            margin-bottom: 15px;
            min-height: 60px;
        }

        .campaign-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            opacity: 0.6;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }

        .campaign-engines {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .engine-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.5rem;
            font-weight: bold;
        }

        .engine-badge.rpg-topdown {
            background: #e74c3c;
            color: white;
        }

        .engine-badge.iso-pixel {
            background: #3498db;
            color: white;
        }

        .engine-badge.platformer-2d {
            background: #2ecc71;
            color: white;
        }

        .campaign-progress {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.6rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            font-family: 'VT323', monospace;
            font-size: 0.9rem;
            border: 3px solid;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent);
            color: white;
        }

        .btn-secondary {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 2px dashed rgba(255, 255, 255, 0.3);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .user-info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.7rem;
            z-index: 10;
        }

        .user-info span {
            color: var(--accent);
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
        }

        .loading::after {
            content: '...';
            animation: loading-dots 1.5s infinite;
        }

        @keyframes loading-dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .save-slot-selector {
            background: rgba(0, 0, 0, 0.4);
            border: 3px solid var(--accent);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .save-slot-selector h3 {
            margin-top: 0;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .slot-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .slot-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'VT323', monospace;
            font-size: 0.7rem;
            color: white;
        }

        .slot-btn:hover {
            border-color: var(--accent);
            background: rgba(46, 204, 113, 0.2);
        }

        .slot-btn.active {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--light);
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.8;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="stars-layer-1"></div>
    <div class="stars-layer-2"></div>

    <a href="index.html" class="back-link">← BACK TO MENU</a>

    <div class="user-info">
        USER: <span id="current-username">GUEST</span>
    </div>

    <div class="container">
        <div class="header">
            <h1>🎮 REDGLITCH ENGINE</h1>
            <p class="subtitle">SELECT A CAMPAIGN TO BEGIN YOUR ADVENTURE</p>
        </div>

        <!-- Save Slot Selector -->
        <div class="save-slot-selector">
            <h3>Save Slot:</h3>
            <div class="slot-options">
                <button class="slot-btn active" data-slot="1">SLOT 1</button>
                <button class="slot-btn" data-slot="2">SLOT 2</button>
                <button class="slot-btn" data-slot="3">SLOT 3</button>
            </div>
        </div>

        <!-- Campaign List -->
        <div id="campaign-list" class="campaign-list">
            <div class="loading">Loading campaigns</div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="btn-start" class="btn btn-primary" disabled>START CAMPAIGN</button>
            <button id="btn-continue" class="btn btn-secondary" disabled>CONTINUE</button>
            <button id="btn-delete-save" class="btn btn-danger" disabled>DELETE SAVE</button>
            <a href="campaign_editor.html" class="btn btn-secondary">CAMPAIGN EDITOR</a>
        </div>
    </div>

    <script>
        class CampaignLauncher {
            constructor() {
                this.campaigns = [];
                this.selectedCampaign = null;
                this.selectedSlot = 1;
                this.username = localStorage.getItem('redglitch_username') || 'guest';
                this.campaignState = null;
                
                this.init();
            }

            async init() {
                // Display username
                document.getElementById('current-username').textContent = this.username.toUpperCase();
                
                // Load campaigns
                await this.loadCampaigns();
                
                // Setup event listeners
                this.setupListeners();
                
                // Load save state for current slot
                await this.loadSaveState();
            }

            async loadCampaigns() {
                try {
                    const res = await fetch('/api/campaigns/list');
                    if (res.ok) {
                        const data = await res.json();
                        
                        // Load full campaign data
                        this.campaigns = [];
                        for (const campaignName of data.campaigns) {
                            try {
                                const campaignRes = await fetch(`/api/campaigns/${campaignName}`);
                                if (campaignRes.ok) {
                                    const campaignData = await campaignRes.json();
                                    this.campaigns.push({
                                        id: campaignName,
                                        ...campaignData
                                    });
                                }
                            } catch (e) {
                                console.error(`Failed to load campaign ${campaignName}:`, e);
                            }
                        }
                        
                        this.renderCampaigns();
                    } else {
                        this.renderEmpty('Failed to load campaigns');
                    }
                } catch (e) {
                    console.error('Error loading campaigns:', e);
                    this.renderEmpty('Error loading campaigns');
                }
            }

            renderCampaigns() {
                const container = document.getElementById('campaign-list');
                
                if (this.campaigns.length === 0) {
                    this.renderEmpty('No campaigns available');
                    return;
                }
                
                container.innerHTML = this.campaigns.map(campaign => {
                    const metadata = campaign.metadata || {};
                    const nodes = campaign.nodes || [];
                    
                    // Detect engine types used
                    const engineTypes = new Set();
                    nodes.forEach(node => {
                        if (node.type === 'level' && node.engineType) {
                            engineTypes.add(node.engineType);
                        }
                    });
                    
                    // Get progress if available
                    let progress = '';
                    if (this.campaignState && this.campaignState.campaignId === campaign.id) {
                        const completed = this.campaignState.completedNodes.length;
                        const total = nodes.length;
                        const percent = Math.round((completed / total) * 100);
                        progress = `${percent}%`;
                    }
                    
                    return `
                        <div class="campaign-card" data-campaign="${campaign.id}">
                            ${progress ? `<div class="campaign-progress">${progress}</div>` : ''}
                            <div class="campaign-name">${metadata.name || campaign.id}</div>
                            <div class="campaign-description">${metadata.description || 'No description available'}</div>
                            <div class="campaign-engines">
                                ${Array.from(engineTypes).map(engine => {
                                    const badge = engine === 'rpg-topdown' ? 'RPG' : 
                                                  engine === 'iso-pixel' ? 'ISO' : 'PLT';
                                    return `<span class="engine-badge ${engine}">${badge}</span>`;
                                }).join('')}
                            </div>
                            <div class="campaign-meta">
                                <span>By: ${metadata.author || 'Unknown'}</span>
                                <span>Nodes: ${nodes.length}</span>
                                <span>v${metadata.version || '1.0.0'}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                
                // Add click handlers
                container.querySelectorAll('.campaign-card').forEach(card => {
                    card.addEventListener('click', () => {
                        this.selectCampaign(card.dataset.campaign);
                    });
                });
            }

            renderEmpty(message) {
                const container = document.getElementById('campaign-list');
                container.innerHTML = `
                    <div class="empty-state">
                        <p>${message}</p>
                        <p>Create campaigns in the Campaign Editor</p>
                    </div>
                `;
            }

            selectCampaign(campaignId) {
                this.selectedCampaign = campaignId;
                
                // Update UI
                document.querySelectorAll('.campaign-card').forEach(card => {
                    card.classList.remove('selected');
                    if (card.dataset.campaign === campaignId) {
                        card.classList.add('selected');
                    }
                });
                
                // Enable buttons
                document.getElementById('btn-start').disabled = false;
                
                // Check if there's a save for this campaign
                const hasSave = this.campaignState && this.campaignState.campaignId === campaignId;
                document.getElementById('btn-continue').disabled = !hasSave;
                document.getElementById('btn-delete-save').disabled = !hasSave;
            }

            async loadSaveState() {
                try {
                    const res = await fetch(`/api/campaign-state/${this.username}`);
                    if (res.ok) {
                        this.campaignState = await res.json();
                        console.log('Loaded campaign state:', this.campaignState);
                        
                        // Re-render to show progress
                        if (this.campaigns.length > 0) {
                            this.renderCampaigns();
                        }
                    }
                } catch (e) {
                    console.log('No saved campaign state');
                }
            }

            setupListeners() {
                // Slot selection
                document.querySelectorAll('.slot-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.selectedSlot = parseInt(btn.dataset.slot);
                        this.loadSaveState();
                    });
                });
                
                // Start button
                document.getElementById('btn-start').addEventListener('click', () => {
                    if (this.selectedCampaign) {
                        this.startCampaign(false);
                    }
                });
                
                // Continue button
                document.getElementById('btn-continue').addEventListener('click', () => {
                    if (this.selectedCampaign && this.campaignState) {
                        this.startCampaign(true);
                    }
                });
                
                // Delete save button
                document.getElementById('btn-delete-save').addEventListener('click', async () => {
                    if (!confirm('Delete save data for this campaign? This cannot be undone.')) {
                        return;
                    }
                    
                    try {
                        await fetch(`/api/campaign-state/${this.username}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({})
                        });
                        
                        this.campaignState = null;
                        alert('Save data deleted');
                        this.loadSaveState();
                        this.renderCampaigns();
                    } catch (e) {
                        console.error('Failed to delete save:', e);
                        alert('Failed to delete save data');
                    }
                });
            }

            startCampaign(continueMode) {
                // Store campaign info in sessionStorage for the game to read
                sessionStorage.setItem('redglitch_campaign_id', this.selectedCampaign);
                sessionStorage.setItem('redglitch_campaign_continue', continueMode ? '1' : '0');
                sessionStorage.setItem('redglitch_save_slot', this.selectedSlot.toString());
                
                // Redirect to game
                window.location.href = 'index.html?mode=campaign';
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            new CampaignLauncher();
        });
    </script>
</body>
</html>
