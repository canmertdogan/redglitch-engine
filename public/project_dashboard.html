<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ONGONLUK COMMAND CENTER</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <style>
        :root {
            --bg-root: #050508;
            --bg-widget: #0a0e14;
            --bg-input: #000;
            
            --border: #1f2b42;
            --border-highlight: #34495e;
            
            --accent: #f1c40f;
            --cyan: #40e0d0;
            --green: #2ecc71;
            --red: #e74c3c;
            
            --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
            --font-pixel: 'VT323', monospace;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-root);
            color: #ccc;
            font-family: var(--font-mono);
            font-size: 13px;
            margin: 0; padding: 15px;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-rows: 60px 1fr 200px; /* Header, Main, Log */
            gap: 15px;
        }

        /* --- CRT EFFECT (Subtle) --- */
        body::after {
            content: " ";
            display: block;
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 2px;
            pointer-events: none;
            z-index: 100;
        }

        /* --- WIDGET CONTAINER --- */
        .widget {
            background: var(--bg-widget);
            border: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .widget:hover { border-color: var(--border-highlight); }
        
        .w-header {
            background: #020408;
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            font-family: var(--font-pixel);
            font-size: 1.1rem;
            color: #8fa0bc;
            display: flex; justify-content: space-between; align-items: center;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .w-controls { display: flex; gap: 8px; }
        .w-btn { cursor: pointer; color: #555; transition: color 0.1s; font-size: 0.9rem; }
        .w-btn:hover { color: #fff; }

        .w-body {
            flex-grow: 1; padding: 10px; overflow-y: auto;
            position: relative;
        }

        /* --- TOP ROW: TELEMETRY --- */
        #telemetry-strip {
            display: flex; gap: 15px;
            background: transparent; border: none; box-shadow: none;
        }
        
        .tele-card {
            flex: 1;
            background: var(--bg-widget); border: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px;
            gap: 15px;
        }
        .tele-icon { font-size: 1.8rem; color: #34495e; }
        .tele-data { display: flex; flex-direction: column; overflow: hidden; }
        .tele-val { 
            font-size: 1.4rem; color: #fff; font-family: var(--font-pixel); line-height: 1; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tele-label { font-size: 0.8rem; color: #666; text-transform: uppercase; margin-top: 4px; }
        .tele-card.accent .tele-icon { color: var(--accent); }
        .tele-card.accent .tele-val { color: var(--accent); }

        /* --- MIDDLE ROW: WORKSPACE --- */
        #workspace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        /* Recent Files */
        .file-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px; border-bottom: 1px solid #111;
            cursor: pointer; transition: background 0.1s;
        }
        .file-item:hover { background: #162133; }
        .file-icon { color: var(--accent); width: 16px; text-align: center; }
        .file-info { flex-grow: 1; }
        .file-name { color: #ccc; display: block; }
        .file-path { color: #555; font-size: 0.8rem; display: block; }

        /* Scratchpad */
        textarea.scratchpad {
            width: 100%; height: 100%;
            background: var(--bg-input); border: none;
            color: #ddd; font-family: var(--font-mono); font-size: 13px;
            resize: none; outline: none; padding: 5px;
            line-height: 1.5;
        }
        
        /* Asset Watcher */
        .asset-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #111;
        }
        .asset-label { color: #888; }
        .asset-bar-bg { width: 100px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .asset-bar-fill { height: 100%; background: var(--cyan); transition: width 0.5s; }
        
        .quick-action-btn {
            display: block; width: 100%; padding: 10px; margin-top: 10px;
            background: #1f2b42; border: 1px solid #34495e; color: #ccc;
            cursor: pointer; text-align: center; transition: all 0.1s;
            font-family: var(--font-pixel);
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 3px 3px 0 #000;
            border-radius: 0;
        }
        .quick-action-btn:hover { 
            background: var(--accent); color: #000; 
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #000;
        }
        .quick-action-btn.secondary {
            background: transparent;
            border-color: #333;
        }

        /* --- BOTTOM ROW: LOG --- */
        #log-terminal {
            display: flex; flex-direction: column;
        }
        #log-feed {
            flex-grow: 1; overflow-y: auto; padding: 5px;
            font-family: var(--font-mono); font-size: 12px;
            background: #000;
        }
        .log-line { margin-bottom: 2px; display: flex; gap: 10px; }
        .log-ts { color: #444; min-width: 60px; }
        .log-tag { font-weight: bold; min-width: 50px; }
        .log-tag.INFO { color: #3498db; }
        .log-tag.WARN { color: var(--accent); }
        .log-tag.ERROR { color: var(--red); }
        .log-tag.SUCCESS { color: var(--green); }
        .log-msg { color: #ccc; word-break: break-all; }

        #cmd-bar {
            height: 30px; background: #111; border-top: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 10px;
            transition: background 0.2s;
        }
        #cmd-bar:focus-within {
            background: #1a1a1a;
            border-top-color: var(--green);
        }
        #cmd-prompt { 
            color: var(--green); 
            margin-right: 10px; 
            font-weight: bold;
            user-select: none;
        }
        #cmd-input {
            background: transparent; border: none; color: #fff;
            flex-grow: 1; font-family: var(--font-mono); outline: none;
            caret-color: var(--green);
        }
        #cmd-input::placeholder {
            color: #555;
            font-style: italic;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

    </style>
</head>
<body>

    <!-- ROW 1: TELEMETRY -->
    <div id="telemetry-strip">
        <div class="tele-card accent">
            <div class="tele-icon"><i class="fas fa-cube"></i></div>
            <div class="tele-data">
                <div class="tele-val" id="proj-name">DEFAULT</div>
                <div class="tele-label">Active Project</div>
            </div>
        </div>
        <div class="tele-card">
            <div class="tele-icon"><i class="fas fa-memory"></i></div>
            <div class="tele-data">
                <div class="tele-val" id="mem-usage">-- MB</div>
                <div class="tele-label">Memory Usage</div>
            </div>
        </div>
        <div class="tele-card">
            <div class="tele-icon"><i class="fas fa-brain"></i></div>
            <div class="tele-data">
                <div class="tele-val" id="ai-mem-usage">-- MB</div>
                <div class="tele-label">AI Memory</div>
            </div>
        </div>
        <div class="tele-card">
            <div class="tele-icon"><i class="fas fa-microchip"></i></div>
            <div class="tele-data">
                <div class="tele-val" id="ai-cpu-usage">--%</div>
                <div class="tele-label">AI CPU</div>
            </div>
        </div>
        <div class="tele-card">
            <div class="tele-icon"><i class="fas fa-clock"></i></div>
            <div class="tele-data">
                <div class="tele-val" id="uptime">00:00</div>
                <div class="tele-label">Session Uptime</div>
            </div>
        </div>
    </div>

    <!-- ROW 2: WORKSPACE -->
    <div id="workspace-grid">
        
        <!-- Latest Activities -->
        <div class="widget">
            <div class="w-header">
                <span><i class="fas fa-history"></i> Latest Activities</span>
                <div class="w-controls"><i class="fas fa-sync w-btn" title="Refresh" onclick="renderActivities()"></i></div>
            </div>
            <div class="w-body" id="activity-list">
                <div style="color:#555; text-align:center; margin-top:20px;">No recent activity.</div>
            </div>
        </div>

        <!-- Scratchpad -->
        <div class="widget">
            <div class="w-header">
                <span><i class="fas fa-sticky-note"></i> Dev Scratchpad</span>
                <div class="w-controls"><i class="fas fa-save w-btn" title="Auto-saving..." style="color:var(--green)"></i></div>
            </div>
            <div class="w-body" style="padding:0;">
                <textarea id="scratchpad" class="scratchpad" placeholder="// Write notes, todos, or ideas here..."></textarea>
            </div>
        </div>

        <!-- Asset Pulse -->
        <div class="widget">
            <div class="w-header">
                <span><i class="fas fa-chart-pie"></i> Asset Pulse</span>
            </div>
            <div class="w-body">
                <div class="asset-row">
                    <span class="asset-label"><i class="fas fa-palette"></i> UI Theme</span>
                    <select id="theme-selector" onchange="setTheme(this.value)" style="background:#000; border:1px solid #333; color:var(--accent); font-family:inherit; padding:2px;">
                        <option value="modern-dark">Modern Dark</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="classic-dungeon">Dungeon</option>
                    </select>
                </div>
                <div class="asset-row">
                    <span class="asset-label"><i class="fas fa-map"></i> Levels</span>
                    <span id="count-levels" style="font-weight:bold;">0</span>
                </div>
                <div class="asset-row">
                    <span class="asset-label"><i class="fas fa-image"></i> Sprites</span>
                    <span id="count-sprites" style="font-weight:bold;">0</span>
                </div>
                <div class="asset-row">
                    <span class="asset-label"><i class="fas fa-code"></i> Scripts</span>
                    <span id="count-scripts" style="font-weight:bold;">0</span>
                </div>
                
                <button class="quick-action-btn" onclick="scanAssets()">
                    <i class="fas fa-search"></i> FORCE RE-INDEX
                </button>
                <button class="quick-action-btn secondary" onclick="openTool('asset_manager')" style="margin-top:5px;">
                    BROWSE ASSETS
                </button>
            </div>
        </div>

    </div>

    <!-- ROW 3: SYSTEM LOG -->
    <div class="widget" id="log-terminal">
        <div class="w-header">
            <span><i class="fas fa-terminal"></i> System Log</span>
            <div class="w-controls" style="font-size:0.8rem; gap:10px;">
                <span class="w-btn" onclick="Log.clear()">CLEAR</span>
                <span class="w-btn" onclick="toggleAutoScroll()">SCROLL: <span id="as-state" style="color:var(--green)">ON</span></span>
            </div>
        </div>
        <div id="log-feed">
            <!-- Logs go here -->
        </div>
        <div id="cmd-bar">
            <span id="cmd-prompt">ongonluk@sys:~$</span>
            <input type="text" id="cmd-input" placeholder="Type 'help' for commands | ↑↓ history | Tab completion | Ctrl+L clear" autocomplete="off">
        </div>
    </div>

    <!-- System Integration -->
    <script src="/shared/EventBus.js"></script>
    <script src="/shared/SharedProjectState.js"></script>
    <script src="/shared/AssetManager.js"></script>

    <script>
        // --- LOG SYSTEM ---
        const Log = {
            feed: document.getElementById('log-feed'),
            autoScroll: true,
            
            add: (msg, type = 'INFO') => {
                const line = document.createElement('div');
                line.className = 'log-line';
                const time = new Date().toLocaleTimeString('en-US', {hour12:false});
                line.innerHTML = `
                    <span class="log-ts">[${time}]</span>
                    <span class="log-tag ${type}">${type}</span>
                    <span class="log-msg">${msg}</span>
                `;
                Log.feed.appendChild(line);
                if (Log.autoScroll) Log.feed.scrollTop = Log.feed.scrollHeight;
            },
            
            clear: () => {
                Log.feed.innerHTML = '';
                Log.add('Log cleared.', 'INFO');
            },
            
            info: (msg) => Log.add(msg, 'INFO'),
            warn: (msg) => Log.add(msg, 'WARN'),
            error: (msg) => Log.add(msg, 'ERROR'),
            success: (msg) => Log.add(msg, 'SUCCESS')
        };

        function toggleAutoScroll() {
            Log.autoScroll = !Log.autoScroll;
            document.getElementById('as-state').innerText = Log.autoScroll ? 'ON' : 'OFF';
            document.getElementById('as-state').style.color = Log.autoScroll ? 'var(--green)' : '#555';
        }

        // --- COMMAND INPUT & TERMINAL ---
        const Terminal = {
            history: JSON.parse(localStorage.getItem('ketebe_cmd_history') || '[]'),
            historyIndex: -1,
            currentInput: '',
            aliases: {
                'ls': 'list',
                'cls': 'clear',
                'exit': 'close',
                'q': 'close',
                'h': 'help',
                '?': 'help'
            },
            
            saveHistory() {
                localStorage.setItem('ketebe_cmd_history', JSON.stringify(this.history.slice(-50)));
            },
            
            addToHistory(cmd) {
                if (cmd && cmd !== this.history[this.history.length - 1]) {
                    this.history.push(cmd);
                    this.saveHistory();
                }
                this.historyIndex = -1;
            },
            
            getPreviousCommand() {
                if (this.history.length === 0) return null;
                if (this.historyIndex === -1) {
                    this.currentInput = cmdInput.value;
                    this.historyIndex = this.history.length - 1;
                } else if (this.historyIndex > 0) {
                    this.historyIndex--;
                }
                return this.history[this.historyIndex];
            },
            
            getNextCommand() {
                if (this.historyIndex === -1) return null;
                if (this.historyIndex < this.history.length - 1) {
                    this.historyIndex++;
                    return this.history[this.historyIndex];
                } else {
                    this.historyIndex = -1;
                    return this.currentInput;
                }
            },
            
            getCompletions(partial) {
                const commands = Object.keys(commandRegistry);
                const matches = commands.filter(c => c.startsWith(partial.toLowerCase()));
                return matches;
            }
        };

        const cmdInput = document.getElementById('cmd-input');
        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = cmdInput.value.trim();
                if (cmd) {
                    Terminal.addToHistory(cmd);
                    executeCommand(cmd);
                }
                cmdInput.value = '';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                const prev = Terminal.getPreviousCommand();
                if (prev) cmdInput.value = prev;
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                const next = Terminal.getNextCommand();
                if (next !== null) cmdInput.value = next;
            } else if (e.key === 'Tab') {
                e.preventDefault();
                const parts = cmdInput.value.split(' ');
                const partial = parts[0];
                const completions = Terminal.getCompletions(partial);
                if (completions.length === 1) {
                    parts[0] = completions[0];
                    cmdInput.value = parts.join(' ');
                } else if (completions.length > 1) {
                    Log.info(`Options: ${completions.join(', ')}`);
                }
            } else if (e.ctrlKey && e.key === 'c') {
                e.preventDefault();
                cmdInput.value = '';
                Log.warn('Operation cancelled.');
            } else if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                Log.clear();
            }
        });

        // Command Registry
        const commandRegistry = {
            help: {
                desc: 'Show available commands',
                usage: 'help [command]',
                exec: (args) => {
                    if (args[0]) {
                        const cmd = commandRegistry[args[0]];
                        if (cmd) {
                            Log.info(`${args[0]} - ${cmd.desc}`);
                            Log.info(`Usage: ${cmd.usage}`);
                        } else {
                            Log.error(`No help available for: ${args[0]}`);
                        }
                    } else {
                        Log.info('=== ONGONLUK TERMINAL COMMANDS ===');
                        Object.keys(commandRegistry).sort().forEach(cmd => {
                            Log.info(`  ${cmd.padEnd(15)} - ${commandRegistry[cmd].desc}`);
                        });
                        Log.info('');
                        Log.info('Tips: Use UP/DOWN for history, TAB for completion, Ctrl+L to clear, Ctrl+C to cancel');
                    }
                }
            },
            
            clear: {
                desc: 'Clear terminal output',
                usage: 'clear',
                exec: () => Log.clear()
            },
            
            history: {
                desc: 'Show command history',
                usage: 'history',
                exec: () => {
                    if (Terminal.history.length === 0) {
                        Log.info('No command history yet.');
                        return;
                    }
                    Terminal.history.forEach((cmd, i) => {
                        Log.info(`  ${(i+1).toString().padStart(3)} | ${cmd}`);
                    });
                }
            },
            
            scan: {
                desc: 'Scan and index project assets',
                usage: 'scan',
                exec: () => scanAssets()
            },
            
            run: {
                desc: 'Launch game runtime',
                usage: 'run',
                exec: () => {
                    if(window.parent.playGame) {
                        Log.success("Launching game runtime...");
                        window.parent.playGame();
                    } else {
                        Log.error("Game runtime not available.");
                    }
                }
            },
            
            open: {
                desc: 'Open a tool/editor',
                usage: 'open <tool_id>',
                exec: (args) => {
                    if (!args[0]) {
                        Log.warn("Usage: open <tool_id>");
                        Log.info("Available tools: editor, script, pixel, audio, npc, iso, daw, prefab, logic, asset_manager");
                        return;
                    }
                    openTool(args[0]);
                }
            },
            
            list: {
                desc: 'List project resources',
                usage: 'list [type]',
                exec: async (args) => {
                    const type = args[0] || 'all';
                    try {
                        if (type === 'all' || type === 'tools') {
                            Log.info('=== AVAILABLE TOOLS ===');
                            if (window.parent && window.parent.tools) {
                                window.parent.tools.forEach(t => {
                                    Log.info(`  ${t.id.padEnd(15)} - ${t.title}`);
                                });
                            }
                        }
                        if (type === 'all' || type === 'assets') {
                            Log.info('=== PROJECT ASSETS ===');
                            const assets = await fetch('/api/assets/list').then(r=>r.json()).catch(()=>[]);
                            assets.slice(0, 20).forEach(a => {
                                Log.info(`  ${a.type.padEnd(10)} | ${a.name}`);
                            });
                            if (assets.length > 20) Log.info(`  ... and ${assets.length - 20} more`);
                        }
                        if (type === 'all' || type === 'scripts') {
                            Log.info('=== LOGIC SCRIPTS ===');
                            const scripts = await fetch('/api/logic/list').then(r=>r.json()).catch(()=>[]);
                            scripts.forEach(s => Log.info(`  ${s}`));
                        }
                    } catch(e) {
                        Log.error(`Failed to list ${type}: ${e.message}`);
                    }
                }
            },
            
            info: {
                desc: 'Show project information',
                usage: 'info',
                exec: async () => {
                    try {
                        const res = await fetch('/api/projects/current');
                        const data = await res.json();
                        Log.info('=== PROJECT INFO ===');
                        Log.info(`  Name:       ${data.name}`);
                        Log.info(`  Author:     ${data.author || 'Unknown'}`);
                        Log.info(`  Version:    ${data.version || '1.0.0'}`);
                        Log.info(`  Engine:     ${data.engineType || 'rpg-topdown'}`);
                        if (data.description) Log.info(`  Desc:       ${data.description}`);
                    } catch(e) {
                        Log.error('Failed to load project info.');
                    }
                }
            },
            
            status: {
                desc: 'Show system status',
                usage: 'status',
                exec: async () => {
                    try {
                        const stats = await fetch('/api/system/stats').then(r=>r.json());
                        Log.info('=== SYSTEM STATUS ===');
                        Log.info(`  Memory:     ${stats.mem || 0} MB`);
                        const uptime = stats.uptime || 0;
                        Log.info(`  Uptime:     ${Math.floor(uptime/3600)}h ${Math.floor((uptime%3600)/60)}m`);
                        Log.info(`  Platform:   ${stats.platform || 'Web'}`);
                    } catch(e) {
                        Log.warn('System stats unavailable.');
                    }
                }
            },
            
            search: {
                desc: 'Search in project',
                usage: 'search <query>',
                exec: (args) => {
                    if (!args[0]) {
                        Log.warn("Usage: search <query>");
                        return;
                    }
                    const query = args.join(' ');
                    Log.info(`Searching for: "${query}"...`);
                    openTool('search_tool');
                    // Could pass query via URL param if search_tool supports it
                }
            },
            
            alias: {
                desc: 'Show command aliases',
                usage: 'alias',
                exec: () => {
                    Log.info('=== COMMAND ALIASES ===');
                    Object.entries(Terminal.aliases).forEach(([alias, cmd]) => {
                        Log.info(`  ${alias.padEnd(10)} => ${cmd}`);
                    });
                }
            },
            
            echo: {
                desc: 'Print text to terminal',
                usage: 'echo <text>',
                exec: (args) => {
                    Log.info(args.join(' '));
                }
            },
            
            time: {
                desc: 'Show current date/time',
                usage: 'time',
                exec: () => {
                    const now = new Date();
                    Log.info(now.toLocaleString());
                }
            },
            
            theme: {
                desc: 'Change UI theme',
                usage: 'theme [name]',
                exec: (args) => {
                    if (!args[0]) {
                        const current = localStorage.getItem('ketebe_theme') || 'modern-dark';
                        Log.info(`Current theme: ${current}`);
                        Log.info('Available: modern-dark, cyberpunk, classic-dungeon');
                        return;
                    }
                    setTheme(args[0]);
                    Log.success(`Theme changed to: ${args[0]}`);
                }
            },
            
            export: {
                desc: 'Export project data',
                usage: 'export <type>',
                exec: (args) => {
                    if (!args[0]) {
                        Log.warn("Usage: export <state|logs|history>");
                        return;
                    }
                    if (args[0] === 'state') {
                        if (window.KetebeProjectState) {
                            const data = window.KetebeProjectState.export();
                            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'project-state.json';
                            a.click();
                            Log.success('State exported.');
                        }
                    } else if (args[0] === 'logs') {
                        const logs = Log.feed.innerText;
                        const blob = new Blob([logs], {type: 'text/plain'});
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'terminal-logs.txt';
                        a.click();
                        Log.success('Logs exported.');
                    } else if (args[0] === 'history') {
                        const hist = Terminal.history.join('\n');
                        const blob = new Blob([hist], {type: 'text/plain'});
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'command-history.txt';
                        a.click();
                        Log.success('History exported.');
                    }
                }
            },
            
            build: {
                desc: 'Build game for platform',
                usage: 'build [electron|android|web]',
                exec: (args) => {
                    const platform = args[0] || 'electron';
                    Log.info(`Build system not yet integrated with terminal.`);
                    Log.info(`Suggestion: Use File > Build menu in main launcher.`);
                }
            },
            
            reload: {
                desc: 'Reload dashboard',
                usage: 'reload',
                exec: () => {
                    Log.info('Reloading...');
                    setTimeout(() => location.reload(), 500);
                }
            },
            
            close: {
                desc: 'Close dashboard window',
                usage: 'close',
                exec: () => {
                    if (window.parent && window.parent.closeWindow) {
                        Log.info('Closing dashboard...');
                        setTimeout(() => window.parent.closeWindow('win-dashboard'), 500);
                    } else {
                        Log.warn('Cannot close dashboard from here.');
                    }
                }
            }
        };

        function executeCommand(cmdStr) {
            Log.add(`> ${cmdStr}`, 'INFO');
            
            // Parse command
            const parts = cmdStr.trim().split(/\s+/);
            let cmd = parts[0].toLowerCase();
            const args = parts.slice(1);
            
            // Check aliases
            if (Terminal.aliases[cmd]) {
                cmd = Terminal.aliases[cmd];
            }
            
            // Execute command
            if (commandRegistry[cmd]) {
                try {
                    commandRegistry[cmd].exec(args);
                } catch(e) {
                    Log.error(`Command failed: ${e.message}`);
                }
            } else {
                Log.error(`Unknown command: ${cmd}. Type 'help' for available commands.`);
            }
        }

        // --- SCRATCHPAD ---
        const scratchpad = document.getElementById('scratchpad');
        scratchpad.value = localStorage.getItem('ketebe_scratchpad') || '';
        scratchpad.addEventListener('input', () => {
            localStorage.setItem('ketebe_scratchpad', scratchpad.value);
        });

        // --- DATA LOADERS ---
        async function loadTelemetry() {
            // Project Name & Metadata
            try {
                const res = await fetch('/api/projects/current');
                const data = await res.json();
                
                // Name
                let display = data.name.toUpperCase();
                if (display.length > 15) {
                    display = display.substring(0, 15) + "...";
                }
                document.getElementById('proj-name').innerText = display;
                
                // Add extended info if available (hacky UI injection for now)
                if (data.author && data.version) {
                    // Update Active Project label to show version?
                    document.querySelector('.tele-card.accent .tele-label').innerText = `Active Project (v${data.version})`;
                }
                
            } catch(e) {}
            
            // System Stats
            try {
                const res = await fetch('/api/system/stats');
                const stats = await res.json();
                
                const mem = stats.mem || 0;
                document.getElementById('mem-usage').innerText = mem + ' MB';
                
                // Format Uptime
                const sec = stats.uptime || 0;
                const h = Math.floor(sec / 3600).toString().padStart(2,'0');
                const m = Math.floor((sec % 3600) / 60).toString().padStart(2,'0');
                document.getElementById('uptime').innerText = `${h}:${m}`;
            } catch(e) {
                console.warn('Failed to load system stats:', e);
            }
            
            // AI Resource Monitoring
            updateAIMetrics();
        }
        
        // AI Performance Monitoring
        async function updateAIMetrics() {
            try {
                const res = await fetch('/api/ai/metrics');
                if (!res.ok) throw new Error('Backend offline');
                const metrics = await res.json();

                if (metrics.error) throw new Error(metrics.error);

                document.getElementById('ai-mem-usage').innerText = `${metrics.mem_usage_mb} MB`;
                document.getElementById('ai-cpu-usage').innerText = `${metrics.cpu_usage_percent}%`;
                
                const status = metrics.status || 'Unknown';
                const metricsInfo = `Status: ${status}\nModel: ${metrics.model_path || 'None'}`;
                
                document.getElementById('ai-cpu-usage').title = metricsInfo;
                document.getElementById('ai-mem-usage').title = metricsInfo;

                // Color coding for usage levels
                const cpuEl = document.getElementById('ai-cpu-usage');
                const aiCpu = metrics.cpu_usage_percent;
                if (aiCpu > 80) cpuEl.style.color = 'var(--red)';
                else if (aiCpu > 30) cpuEl.style.color = 'var(--accent)';
                else if (aiCpu > 0) cpuEl.style.color = 'var(--green)';
                else cpuEl.style.color = '#666';
                
            } catch(e) {
                console.warn('AI metrics update failed:', e);
                document.getElementById('ai-mem-usage').innerText = 'OFFLINE';
                document.getElementById('ai-cpu-usage').innerText = '0%';
                document.getElementById('ai-cpu-usage').style.color = '#444';
            }
        }

        async function renderActivities() {
            const list = document.getElementById('activity-list');
            list.innerHTML = '';
            
            // Get activities from shared state or local fallback
            let activities = [];
            if (window.KetebeProjectState) {
                activities = window.KetebeProjectState.get('activities', []);
            }
            
            // Fallback to localStorage if empty (migration path)
            if (activities.length === 0) {
                const legacy = JSON.parse(localStorage.getItem('ketebe_recent_files') || '[]');
                activities = legacy.map(f => ({ type: 'file', name: f.name, data: { path: f.path }, timestamp: Date.now() }));
            }

            if (activities.length === 0) {
                list.innerHTML = '<div style="color:#555; text-align:center; margin-top:20px;">No recent activity.</div>';
                return;
            }

            activities.slice(0, 15).forEach(act => {
                const div = document.createElement('div');
                div.className = 'file-item';
                
                // Icon Logic
                let icon = 'fa-circle';
                let color = '#ccc';
                
                if (act.type === 'tool') { icon = 'fa-hammer'; color = 'var(--accent)'; }
                else if (act.type === 'file') {
                    icon = 'fa-file';
                    if (act.name.endsWith('.json')) icon = 'fa-code';
                    if (act.name.endsWith('.png')) icon = 'fa-image';
                    color = 'var(--cyan)';
                }
                
                // Click handler
                div.onclick = () => {
                    if (act.type === 'tool') openTool(act.data.id || act.name.toLowerCase().replace(/ /g,'_')); // Fallback ID
                    else if (act.type === 'file') openFileInParent(act.data.path);
                };
                
                div.innerHTML = `
                    <div class="file-icon"><i class="fas ${icon}" style="color:${color}"></i></div>
                    <div class="file-info">
                        <span class="file-name">${act.name}</span>
                        <span class="file-path">${getRelativeTime(act.timestamp)}</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function getRelativeTime(ts) {
            const now = Date.now();
            const diff = Math.floor((now - ts) / 1000); // seconds
            
            if (diff < 60) return 'Just now';
            if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
            return new Date(ts).toLocaleDateString();
        }

        async function scanAssets() {
            Log.info("Initiating asset index scan...");
            try {
                const res = await fetch('/api/assets/scan', { method: 'POST' });
                if(res.ok) {
                    const data = await res.json();
                    Log.success(`Scan complete. Indexed ${data.count} assets.`);
                    loadCounts();
                } else {
                    Log.error("Asset scan failed.");
                }
            } catch(e) { Log.error("Network error during scan."); }
        }

        async function loadCounts() {
            try {
                const [levels, assets, scripts] = await Promise.all([
                    fetch('/api/files/levels').then(r=>r.json()).catch(()=>[]),
                    fetch('/api/assets/list').then(r=>r.json()).catch(()=>[]),
                    fetch('/api/logic/list').then(r=>r.json()).catch(()=>[])
                ]);
                
                document.getElementById('count-levels').innerText = levels.length;
                
                const sprites = assets.filter(a => a.type === 'sprite').length;
                document.getElementById('count-sprites').innerText = sprites;
                
                document.getElementById('count-scripts').innerText = scripts.length;
                
            } catch(e) { Log.warn("Failed to update asset counts."); }
        }

        // --- UTILS ---
        function openTool(id) {
            if (window.parent && window.parent.openWindow) {
                const tool = window.parent.tools.find(t => t.id === id);
                if (tool) {
                    window.parent.openWindow(tool);
                    Log.info(`Opened tool: ${id}`);
                    
                    // Log Activity
                    if (window.KetebeProjectState) {
                        window.KetebeProjectState.logActivity('tool', tool.title, { id: tool.id });
                    }
                } else {
                    Log.warn(`Tool not found: ${id}`);
                }
            }
        }
        
        function openFileInParent(path) {
            // Need to implement file opening in parent IDE from here
            Log.info(`Request to open: ${path}`);
            // Log Activity (Optimistic)
            if (window.KetebeProjectState) {
                window.KetebeProjectState.logActivity('file', path.split('/').pop(), { path: path });
            }
        }
        
        function setTheme(themeName) {
            localStorage.setItem('ketebe_theme', themeName);
            const selector = document.getElementById('theme-selector');
            if (selector) selector.value = themeName;
            
            // Broadcast theme change to parent and other windows
            if (window.KetebeEventBus) {
                window.KetebeEventBus.emit('theme:changed', { theme: themeName });
            }
            
            // Apply to current window if parent has applyTheme
            if (window.parent && window.parent.applyTheme) {
                window.parent.applyTheme(themeName);
            }
        }

        // Init
        Log.info("Dashboard initialized.");
        Log.info("Connecting to Ongonluk Core...");
        Log.info("Terminal ready. Type 'help' for available commands.");
        
        // Auto-focus terminal input
        cmdInput.focus();
        
        // Focus terminal when clicking on log area
        document.getElementById('log-feed').addEventListener('click', () => {
            cmdInput.focus();
        });
        
        // Init Event Bus & State if available
        if (window.KetebeEventBus) {
            window.KetebeEventBus.on('activity:logged', () => {
                renderActivities();
            });
        }
        
        // Sync Theme Selector
        const savedTheme = localStorage.getItem('ketebe_theme') || 'modern-dark';
        if (document.getElementById('theme-selector')) {
            document.getElementById('theme-selector').value = savedTheme;
        }

        loadTelemetry();
        loadCounts();
        
        // Wait for state to load before rendering activities
        setTimeout(renderActivities, 500); 
        
        setInterval(loadTelemetry, 5000);
        setInterval(renderActivities, 60000); // Update relative times every min

    </script>
</body>
</html>
