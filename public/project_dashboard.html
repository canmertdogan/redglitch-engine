<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KETEBE COMMAND CENTER</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <style>
        :root {
            --bg-root: #050508;
            --bg-widget: #0a0e14;
            --bg-input: #000;
            
            --border: #1f2b42;
            --border-highlight: #34495e;
            
            --accent: #f1c40f;
            --cyan: #40e0d0;
            --green: #2ecc71;
            --red: #e74c3c;
            
            --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
            --font-pixel: 'VT323', monospace;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-root);
            color: #ccc;
            font-family: var(--font-mono);
            font-size: 13px;
            margin: 0; padding: 15px;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-rows: 60px 1fr 200px; /* Header, Main, Log */
            gap: 15px;
        }

        /* --- CRT EFFECT (Subtle) --- */
        body::after {
            content: " ";
            display: block;
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 2px;
            pointer-events: none;
            z-index: 100;
        }

        /* --- WIDGET CONTAINER --- */
        .widget {
            background: var(--bg-widget);
            border: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .widget:hover { border-color: var(--border-highlight); }
        
        .w-header {
            background: #020408;
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            font-family: var(--font-pixel);
            font-size: 1.1rem;
            color: #8fa0bc;
            display: flex; justify-content: space-between; align-items: center;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .w-controls { display: flex; gap: 8px; }
        .w-btn { cursor: pointer; color: #555; transition: color 0.1s; font-size: 0.9rem; }
        .w-btn:hover { color: #fff; }

        .w-body {
            flex-grow: 1; padding: 10px; overflow-y: auto;
            position: relative;
        }

        /* --- TOP ROW: TELEMETRY --- */
        #telemetry-strip {
            display: flex; gap: 15px;
            background: transparent; border: none; box-shadow: none;
        }
        
        .tele-card {
            flex: 1;
            background: var(--bg-widget); border: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px;
            gap: 15px;
        }
        .tele-icon { font-size: 1.8rem; color: #34495e; }
        .tele-data { display: flex; flex-direction: column; overflow: hidden; }
        .tele-val { 
            font-size: 1.4rem; color: #fff; font-family: var(--font-pixel); line-height: 1; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tele-label { font-size: 0.8rem; color: #666; text-transform: uppercase; margin-top: 4px; }
        .tele-card.accent .tele-icon { color: var(--accent); }
        .tele-card.accent .tele-val { color: var(--accent); }

        /* --- MIDDLE ROW: WORKSPACE --- */
        #workspace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        /* Recent Files */
        .file-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px; border-bottom: 1px solid #111;
            cursor: pointer; transition: background 0.1s;
        }
        .file-item:hover { background: #162133; }
        .file-icon { color: var(--accent); width: 16px; text-align: center; }
        .file-info { flex-grow: 1; }
        .file-name { color: #ccc; display: block; }
        .file-path { color: #555; font-size: 0.8rem; display: block; }

        /* Scratchpad */
        textarea.scratchpad {
            width: 100%; height: 100%;
            background: var(--bg-input); border: none;
            color: #ddd; font-family: var(--font-mono); font-size: 13px;
            resize: none; outline: none; padding: 5px;
            line-height: 1.5;
        }
        
        /* Asset Watcher */
        .asset-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #111;
        }
        .asset-label { color: #888; }
        .asset-bar-bg { width: 100px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .asset-bar-fill { height: 100%; background: var(--cyan); transition: width 0.5s; }
        
        .quick-action-btn {
            display: block; width: 100%; padding: 10px; margin-top: 10px;
            background: #1f2b42; border: 1px solid #34495e; color: #ccc;
            cursor: pointer; text-align: center; transition: all 0.1s;
            font-family: var(--font-pixel);
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 3px 3px 0 #000;
            border-radius: 0;
        }
        .quick-action-btn:hover { 
            background: var(--accent); color: #000; 
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #000;
        }
        .quick-action-btn.secondary {
            background: transparent;
            border-color: #333;
        }

        /* --- BOTTOM ROW: LOG --- */
        #log-terminal {
            display: flex; flex-direction: column;
        }
        #log-feed {
            flex-grow: 1; overflow-y: auto; padding: 5px;
            font-family: var(--font-mono); font-size: 12px;
            background: #000;
        }
        .log-line { margin-bottom: 2px; display: flex; gap: 10px; }
        .log-ts { color: #444; min-width: 60px; }
        .log-tag { font-weight: bold; min-width: 50px; }
        .log-tag.INFO { color: #3498db; }
        .log-tag.WARN { color: var(--accent); }
        .log-tag.ERROR { color: var(--red); }
        .log-tag.SUCCESS { color: var(--green); }
        .log-msg { color: #ccc; word-break: break-all; }

        #cmd-bar {
            height: 30px; background: #111; border-top: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 10px;
            transition: background 0.2s;
        }
        #cmd-bar:focus-within {
            background: #1a1a1a;
            border-top-color: var(--green);
        }
        #cmd-prompt { 
            color: var(--green); 
            margin-right: 10px; 
            font-weight: bold;
            user-select: none;
        }
        #cmd-input {
            background: transparent; border: none; color: #fff;
            flex-grow: 1; font-family: var(--font-mono); outline: none;
            caret-color: var(--green);
        }
        #cmd-input::placeholder {
            color: #555;
            font-style: italic;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

    </style>
</head>
<body>

    <!-- ROW 1: TELEMETRY -->
    <div id="telemetry-strip">
        <div class="tele-card accent">
            <div class="tele-icon"><i class="fas fa-cube"></i></div>
            <div class="tele-data">
                <div class="tele-val" id="proj-name">DEFAULT</div>
                <div class="tele-label">Active Project</div>
            </div>
        </div>
        <div class="tele-card">
            <div class="tele-icon"><i class="fas fa-memory"></i></div>
            <div class="tele-data">
                <div class="tele-val" id="mem-usage">-- MB</div>
                <div class="tele-label">Memory Usage</div>
            </div>
        </div>
        <div class="tele-card">
            <div class="tele-icon"><i class="fas fa-brain"></i></div>
            <div class="tele-data">
                <div class="tele-val" id="ai-mem-usage">-- MB</div>
                <div class="tele-label">AI Memory</div>
            </div>
        </div>
        <div class="tele-card">
            <div class="tele-icon"><i class="fas fa-microchip"></i></div>
            <div class="tele-data">
                <div class="tele-val" id="ai-cpu-usage">--%</div>
                <div class="tele-label">AI CPU</div>
            </div>
        </div>
        <div class="tele-card">
            <div class="tele-icon"><i class="fas fa-clock"></i></div>
            <div class="tele-data">
                <div class="tele-val" id="uptime">00:00</div>
                <div class="tele-label">Session Uptime</div>
            </div>
        </div>
    </div>

    <!-- ROW 2: WORKSPACE -->
    <div id="workspace-grid">
        
        <!-- Latest Activities -->
        <div class="widget">
            <div class="w-header">
                <span><i class="fas fa-history"></i> Latest Activities</span>
                <div class="w-controls"><i class="fas fa-sync w-btn" title="Refresh" onclick="renderActivities()"></i></div>
            </div>
            <div class="w-body" id="activity-list">
                <div style="color:#555; text-align:center; margin-top:20px;">No recent activity.</div>
            </div>
        </div>

        <!-- Scratchpad -->
        <div class="widget">
            <div class="w-header">
                <span><i class="fas fa-sticky-note"></i> Dev Scratchpad</span>
                <div class="w-controls"><i class="fas fa-save w-btn" title="Auto-saving..." style="color:var(--green)"></i></div>
            </div>
            <div class="w-body" style="padding:0;">
                <textarea id="scratchpad" class="scratchpad" placeholder="// Write notes, todos, or ideas here..."></textarea>
            </div>
        </div>

        <!-- Asset Pulse -->
        <div class="widget">
            <div class="w-header">
                <span><i class="fas fa-chart-pie"></i> Asset Pulse</span>
            </div>
            <div class="w-body">
                <div class="asset-row">
                    <span class="asset-label"><i class="fas fa-palette"></i> UI Theme</span>
                    <select id="theme-selector" onchange="setTheme(this.value)" style="background:#000; border:1px solid #333; color:var(--accent); font-family:inherit; padding:2px;">
                        <option value="modern-light">Modern Light</option>
                        <option value="modern-dark">Modern Dark</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="classic-dungeon">Dungeon</option>
                    </select>
                </div>
                <div class="asset-row">
                    <span class="asset-label"><i class="fas fa-map"></i> Levels</span>
                    <span id="count-levels" style="font-weight:bold;">0</span>
                </div>
                <div class="asset-row">
                    <span class="asset-label"><i class="fas fa-image"></i> Sprites</span>
                    <span id="count-sprites" style="font-weight:bold;">0</span>
                </div>
                <div class="asset-row">
                    <span class="asset-label"><i class="fas fa-code"></i> Scripts</span>
                    <span id="count-scripts" style="font-weight:bold;">0</span>
                </div>
                
                <button class="quick-action-btn" onclick="scanAssets()">
                    <i class="fas fa-search"></i> FORCE RE-INDEX
                </button>
                <button class="quick-action-btn secondary" onclick="openTool('asset_manager')" style="margin-top:5px;">
                    BROWSE ASSETS
                </button>
            </div>
        </div>

    </div>

    <!-- ROW 3: SYSTEM LOG -->
    <div class="widget" id="log-terminal">
        <div class="w-header">
            <span><i class="fas fa-terminal"></i> System Log</span>
            <div class="w-controls" style="font-size:0.8rem; gap:10px;">
                <span class="w-btn" onclick="Log.clear()">CLEAR</span>
                <span class="w-btn" onclick="toggleAutoScroll()">SCROLL: <span id="as-state" style="color:var(--green)">ON</span></span>
            </div>
        </div>
        <div id="log-feed">
            <!-- Logs go here -->
        </div>
        <div id="cmd-bar">
            <span id="cmd-prompt">ketebe@sys:~$</span>
            <input type="text" id="cmd-input" placeholder="Type 'help' for commands | ↑↓ history | Tab completion | Ctrl+L clear" autocomplete="off">
        </div>
    </div>

    <!-- System Integration -->
    <script src="shared/EventBus.js"></script>
    <script src="shared/SharedProjectState.js"></script>
    <script src="shared/AssetManager.js"></script>
    <script src="js/CommandCenter.js"></script>
</body>
</html>
