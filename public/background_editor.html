    <title>redglitch BACKGROUND STUDIO</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="pixel_scrollbars.css">
    <script src="lib/omggif.js"></script>
    <script src="lib/gif.js"></script>
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <style>
        :root {
            --bg-root: #050505;
            --bg-panel: #0a0a0f;
            --bg-header: #000000;
            --bg-canvas: #111;
            --accent: #ff0000;
            --text-main: #e0e0e0;
            --border: #333;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            margin: 0; padding: 0; background-color: var(--bg-root); color: var(--text-main);
            font-family: 'VT323', monospace; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; user-select: none; font-size: 20px;
            image-rendering: pixelated;
        }

        /* --- MENUBAR --- */
        #menubar {
            height: 36px; background: #000; display: flex; align-items: center; padding: 0 10px;
            font-size: 1.2rem; border-bottom: 2px solid var(--border);
            z-index: 3000; flex-shrink: 0;
        }
        
        /* --- LAYOUT --- */
        #layout { 
            flex-grow: 1; display: flex; overflow: hidden; position: relative; 
            height: calc(100vh - 36px);
        }

        .panel { display: flex; flex-direction: column; background: var(--bg-panel); border-right: 2px solid var(--border); }
        .panel-header {
            height: 32px; background: #000; display: flex; align-items: center; padding: 0 10px;
            font-weight: bold; color: var(--accent); border-bottom: 2px solid var(--border); text-transform: uppercase;
            font-size: 1.1rem; justify-content: space-between; letter-spacing: 1px; flex-shrink: 0;
        }
        .panel-content { flex-grow: 1; overflow-y: auto; padding: 15px; }

        /* LEFT PANEL (Tools) */
        #left-panel { 
            width: 50px; min-width: 50px; align-items: center; padding-top: 15px; 
            background: #080808; border-right: 2px solid var(--border);
            display: flex; flex-direction: column; gap: 8px; z-index: 10;
        }
        
        .tool-btn {
            width: 36px; height: 36px;
            background: #222; border: 2px solid #444; color: #888;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 1.1rem; border-radius: 4px; transition: all 0.1s;
        }
        .tool-btn:hover { border-color: #fff; color: #fff; background: #333; }
        .tool-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1a1a; box-shadow: 0 0 5px rgba(255, 0, 0, 0.2); }
        
        input[type="color"] {
            width: 36px; height: 36px; padding: 0; border: 2px solid #444; 
            background: none; margin-bottom: 10px; cursor: pointer;
        }

        /* CENTER (Canvas) */
        #center-panel { flex-grow: 1; position: relative; background: #111; display: flex; flex-direction: column; overflow: hidden; }
        
        #viewport {
            flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 20px;
            background-image: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%), 
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1a1a1a 75%), 
                linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #0d0d0d;
        }
        canvas { 
            box-shadow: 0 0 30px #000; border: 1px solid var(--border); 
            image-rendering: pixelated; 
            max-width: 100%; max-height: 100%;
        }

        /* TIMELINE */
        #timeline {
            height: 140px; background: #050505; border-top: 2px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        #timeline-controls {
            height: 36px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 10px; gap: 10px; flex-shrink: 0;
        }
        #frames-container {
            flex-grow: 1; overflow-x: auto; display: flex; align-items: center; padding: 10px; gap: 10px;
            /* Scrollbar styling for Webkit */
            scrollbar-width: thin; scrollbar-color: var(--accent) #000;
        }
        #frames-container::-webkit-scrollbar { height: 8px; }
        #frames-container::-webkit-scrollbar-track { background: #000; }
        #frames-container::-webkit-scrollbar-thumb { background: var(--accent); border: 1px solid #000; }
        
        .frame-thumb {
            width: 90px; height: 70px; background: #111; border: 2px solid #444;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            position: relative; flex-shrink: 0; transition: transform 0.1s;
            /* Check pattern for thumbs */
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), linear-gradient(-45deg, #222 25%, transparent 25%);
            background-size: 10px 10px;
        }
        .frame-thumb:hover { border-color: #888; transform: translateY(-2px); }
        .frame-thumb.active { border-color: var(--accent); box-shadow: 0 0 8px rgba(255, 0, 0, 0.4); z-index: 2; }
        
        .frame-thumb canvas { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        .frame-idx { 
            position: absolute; top: 2px; left: 2px; font-size: 0.8rem; 
            color: var(--accent); background: rgba(0,0,0,0.8); padding: 1px 4px; 
            font-family: 'VT323', monospace; border-radius: 2px; pointer-events: none;
        }

        /* RIGHT PANEL (Props) */
        #right-panel { width: 260px; min-width: 220px; border-left: 2px solid var(--border); }

        /* CONTROLS */
        .btn {
            background: #222; border: 2px solid #444; color: #ccc; padding: 6px 10px;
            width: 100%; cursor: pointer; font-family: inherit; font-size: 1.1rem;
            text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;
            transition: all 0.1s; border-radius: 2px;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); background: #2a2a2a; }
        .btn:active { transform: translateY(1px); }
        .btn.primary { background: rgba(255, 0, 0, 0.1); color: var(--accent); border-color: var(--accent); font-weight: bold; }
        .btn.primary:hover { background: var(--accent); color: #000; }
        
        .lbl { font-size: 1rem; color: #888; margin-bottom: 6px; display: block; letter-spacing: 1px; border-bottom: 1px solid #222; padding-bottom: 2px; margin-top: 10px;}
        .lbl:first-child { margin-top: 0; }
        
        .row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        input[type="number"] { 
            background: #000; border: 1px solid #444; color: var(--accent); 
            padding: 6px; width: 100%; font-family: inherit; font-size: 1.1rem;
            text-align: center;
        }
        input[type="number"]:focus { border-color: var(--accent); }

    </style>
</head>
<body>

    <div id="menubar">
        <div style="color:var(--accent); font-weight:bold; padding:0 15px; border-right:2px solid var(--border); margin-right:10px; font-size:1.4rem; letter-spacing:2px; display:flex; align-items:center; gap:10px;">
            <i class="fas fa-image"></i> BACKGROUND STUDIO
        </div>
        <div style="flex-grow:1"></div>
        <button class="btn primary" style="width:auto; padding: 0 20px; height: 28px; margin:0;" onclick="saveGif()">EXPORT & SAVE</button>
    </div>

    <div id="layout">
        
        <!-- LEFT: TOOLS -->
        <div id="left-panel">
            <div class="tool-btn active" id="t-pen" onclick="setTool('pen')" title="Pen"><i class="fas fa-pencil-alt"></i></div>
            <div class="tool-btn" id="t-eraser" onclick="setTool('eraser')" title="Eraser"><i class="fas fa-eraser"></i></div>
            <div class="tool-btn" id="t-fill" onclick="setTool('fill')" title="Bucket"><i class="fas fa-fill-drip"></i></div>
            <div class="tool-btn" id="t-picker" onclick="setTool('picker')" title="Picker"><i class="fas fa-eye-dropper"></i></div>
            <div style="height:10px;"></div>
            <input type="color" id="color-picker" value="#ffffff">
            <div class="tool-btn" onclick="undo()" title="Undo"><i class="fas fa-undo"></i></div>
        </div>

        <!-- CENTER: VIEWPORT & TIMELINE -->
        <div id="center-panel">
            <div id="viewport">
                <canvas id="editor-canvas"></canvas>
            </div>
            <div id="timeline">
                <div id="timeline-controls">
                    <button class="btn" style="width:auto;" onclick="togglePlay()"><i class="fas fa-play" id="play-icon"></i></button>
                    <span class="lbl" style="margin:0;">FPS:</span>
                    <input type="number" id="fps-input" value="10" style="width:50px;">
                    <div style="flex-grow:1;"></div>
                    <button class="btn" style="width:auto;" onclick="addFrame()"><i class="fas fa-plus"></i> ADD FRAME</button>
                    <button class="btn" style="width:auto;" onclick="duplicateFrame()"><i class="fas fa-copy"></i> DUP</button>
                    <button class="btn" style="width:auto; border-color:#c0392b; color:#c0392b;" onclick="deleteFrame()"><i class="fas fa-trash"></i></button>
                </div>
                <div id="frames-container">
                    <!-- Frame Thumbs -->
                </div>
            </div>
        </div>

        <!-- RIGHT: PROPS -->
        <div id="right-panel" class="panel">
            <div class="panel-header">PROPERTIES</div>
            <div class="panel-content">
                
                <span class="lbl">CANVAS SIZE</span>
                <div class="row">
                    <input type="number" id="c-w" value="320"> x <input type="number" id="c-h" value="180">
                </div>
                <button class="btn" onclick="resizeCanvas()">RESIZE</button>

                <div style="height:15px; border-bottom:1px solid #333; margin-bottom:15px;"></div>

                <span class="lbl">FILE OPERATIONS</span>
                <input type="file" id="file-input" style="display:none;" accept="image/gif,image/png">
                <button class="btn" onclick="document.getElementById('file-input').click()">📂 IMPORT FILE</button>
                
                <div style="height:15px; border-bottom:1px solid #333; margin-bottom:15px;"></div>
                
                <span class="lbl">FILTERS</span>
                <button class="btn" onclick="applyFilter('grayscale')">GRAYSCALE</button>
                <button class="btn" onclick="applyFilter('invert')">INVERT</button>
                <button class="btn" onclick="applyFilter('noise')">NOISE</button>

            </div>
        </div>

    </div>

    <!-- Integration System -->
    <script src="/shared/EventBus.js"></script>
    <script src="/shared/SharedProjectState.js"></script>
    <script src="/shared/AssetManager.js"></script>
    
    <script src="background_editor.js"></script>
</body>
</html>
