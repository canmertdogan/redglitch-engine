<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>redglitch SOUND DIRECTOR</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --panel-bg: #222;
            --text-main: #ecf0f1;
            --accent: #9b59b6; /* Purple for Sound Director */
            --item-bg: #333;
            --item-hover: #444;
            --selected: #8e44ad;
        }
        body {
            background-color: #111;
            color: var(--text-main);
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Layout */
        .column {
            display: flex;
            flex-direction: column;
            padding: 10px;
            border-right: 2px solid #444;
        }
        
        #col-contexts { width: 300px; background: var(--bg-dark); }
        #col-library { width: 250px; background: #222; }
        #col-details { flex-grow: 1; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        h2 { margin: 0 0 10px 0; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
        
        .list-container {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #444;
            background: #181818;
        }

        .item {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }
        .item:hover { background: var(--item-hover); }
        .item.active { background: var(--selected); color: white; }
        .item span.assigned { color: #aaa; font-size: 0.8rem; }
        
        .group-header {
            background: #444;
            padding: 5px 10px;
            font-weight: bold;
            color: #fff;
        }

        button {
            background: #333; color: white; border: 2px solid #555;
            font-family: inherit; font-size: 1.2rem; padding: 5px 15px; cursor: pointer;
            margin: 5px;
        }
        button:hover { border-color: var(--accent); color: var(--accent); }
        
        #now-playing-info { font-size: 2rem; margin-bottom: 20px; color: #888; }
        #now-playing-info.active { color: var(--accent); }

        .assigned-badge {
            background: #e67e22; color: #000; padding: 2px 4px; border-radius: 4px; font-size: 0.8rem;
        }
    </style>
</head>
<body>

<!-- COLUMN 1: CONTEXTS -->
<div id="col-contexts" class="column">
    <h2>GAME CONTEXTS</h2>
    <div id="context-list" class="list-container">
        <!-- Populated by JS -->
    </div>
    <div style="margin-top:10px;">
        <button id="btn-add-level">Add Level</button>
        <button id="btn-add-event">Add Event</button>
    </div>
</div>

<!-- COLUMN 2: LIBRARY -->
<div id="col-library" class="column">
    <h2>MUSIC LIBRARY</h2>
    <div id="library-list" class="list-container">
        <!-- Populated by JS -->
    </div>
    <div style="margin-top:10px; text-align:center;">
        <small>Place files in public/muzikler</small>
        <button onclick="loadLibrary()">REFRESH</button>
    </div>
</div>

<!-- COLUMN 3: DETAILS & ACTIONS -->
<div id="col-details" class="column">
    <div id="now-playing-info">SELECT A TRACK</div>
    
    <div style="display:flex; gap:10px; margin-bottom:30px;">
        <button id="btn-play">▶ PLAY</button>
        <button id="btn-stop">⏹ STOP</button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5">
    </div>

    <div style="border: 2px solid #444; padding: 20px; text-align: center; width: 80%;">
        <h3 style="color:var(--text-main); margin-top:0;">ASSIGNMENT</h3>
        <p id="assign-status">Select a Context and a Track to link them.</p>
        <button id="btn-assign" style="background:var(--accent); color:white; border:none; padding:10px 30px; font-size:1.5rem;" disabled>LINK TRACK</button>
        <br><br>
        <button id="btn-clear-assign" style="background:#c0392b;">CLEAR ASSIGNMENT</button>
    </div>

    <div style="margin-top:auto; padding:20px; width:100%; box-sizing:border-box; display:flex; justify-content:space-between;">
        <a href="tools.html" style="color:#aaa; text-decoration:none;">← BACK</a>
        <button id="btn-save-config" style="background:#27ae60; border-color:#2ecc71;">💾 SAVE CONFIG</button>
    </div>
</div>

<script src="base_game/audioSystem.js"></script>
<script>
    const audioSys = new window.AudioSystem();
    let config = { global: {}, levels: {}, events: {} };
    let library = [];
    
    let selectedContext = null; // { group: 'global', key: 'main_menu' }
    let selectedTrack = null;   // "menu_theme.mp3"
    let isPlaying = false;

    async function init() {
        await loadConfig();
        await loadLibrary();
        renderContexts();
        renderLibrary();
    }

    async function loadConfig() {
        try {
            const res = await fetch('dunyalar/definitions/music.json');
            if (res.ok) config = await res.json();
            // Ensure structure
            if (!config.global) config.global = {};
            if (!config.levels) config.levels = {};
            if (!config.events) config.events = {};
        } catch (e) { console.error("No config found, using defaults"); }
    }

    async function loadLibrary() {
        try {
            const res = await fetch('/api/files/music');
            if (res.ok) library = await res.json();
        } catch (e) { console.error(e); }
        renderLibrary();
    }

    function renderContexts() {
        const container = document.getElementById('context-list');
        container.innerHTML = '';

        const groups = ['global', 'levels', 'events'];
        groups.forEach(group => {
            const header = document.createElement('div');
            header.className = 'group-header';
            header.innerText = group.toUpperCase();
            container.appendChild(header);

            Object.keys(config[group]).forEach(key => {
                const val = config[group][key];
                const item = document.createElement('div');
                item.className = 'item';
                if (selectedContext && selectedContext.group === group && selectedContext.key === key) item.classList.add('active');
                
                item.innerHTML = `
                    <div style="display:flex; flex-direction:column;">
                        <strong>${key}</strong>
                        <span class="assigned">${val || '<em>(None)</em>'}</span>
                    </div>
                `;
                item.onclick = () => selectContext(group, key);
                container.appendChild(item);
            });
        });
    }

    function renderLibrary() {
        const container = document.getElementById('library-list');
        container.innerHTML = '';
        
        library.forEach(file => {
            const item = document.createElement('div');
            item.className = 'item';
            if (selectedTrack === file) item.classList.add('active');
            item.innerText = file;
            item.onclick = () => selectTrack(file);
            container.appendChild(item);
        });
    }

    function selectContext(group, key) {
        selectedContext = { group, key };
        renderContexts();
        updateAssignUI();
    }

    function selectTrack(file) {
        selectedTrack = file;
        renderLibrary();
        
        // Auto-play preview
        playFile(file);
        
        updateAssignUI();
    }

    function updateAssignUI() {
        const btn = document.getElementById('btn-assign');
        const status = document.getElementById('assign-status');
        
        if (selectedContext && selectedTrack) {
            btn.disabled = false;
            status.innerHTML = `Assign <strong>${selectedTrack}</strong> to <strong>${selectedContext.key}</strong>?`;
        } else if (selectedContext) {
            btn.disabled = true;
            status.innerText = `Select a track from the library.`;
        } else {
            btn.disabled = true;
            status.innerText = `Select a Context first.`;
        }
    }

    document.getElementById('btn-assign').onclick = () => {
        if (!selectedContext || !selectedTrack) return;
        config[selectedContext.group][selectedContext.key] = selectedTrack;
        renderContexts();
        // Visual feedback
        const status = document.getElementById('assign-status');
        status.innerHTML = `<span style="color:#2ecc71">LINKED!</span>`;
    };

    document.getElementById('btn-clear-assign').onclick = () => {
        if (!selectedContext) return;
        config[selectedContext.group][selectedContext.key] = "";
        renderContexts();
    };

    // --- PLAYBACK ---
    async function playFile(filename) {
        stop();
        
        const vol = parseFloat(document.getElementById('vol-slider').value);
        audioSys.masterGain.gain.value = vol;

        document.getElementById('now-playing-info').innerText = filename;
        document.getElementById('now-playing-info').classList.add('active');

        if (filename.endsWith('.json')) {
            try {
                const res = await fetch(`muzikler/${filename}`);
                if (res.ok) {
                    const songData = await res.json();
                    audioSys.playSong(songData);
                    isPlaying = true;
                }
            } catch(e) {}
        } else {
            if (window.currentAudio) window.currentAudio.pause();
            window.currentAudio = new Audio(`muzikler/${filename}`);
            window.currentAudio.volume = vol;
            window.currentAudio.play();
            isPlaying = true;
        }
        updateButtons();
    }

    function stop() {
        audioSys.stop();
        if (window.currentAudio) {
            window.currentAudio.pause();
            window.currentAudio = null;
        }
        isPlaying = false;
        document.getElementById('now-playing-info').classList.remove('active');
        updateButtons();
    }

    function updateButtons() {
        document.getElementById('btn-play').innerText = isPlaying ? '⏸' : '▶ PLAY';
    }

    document.getElementById('btn-stop').onclick = stop;
    document.getElementById('btn-play').onclick = () => {
        if (isPlaying) stop();
        else if (selectedTrack) playFile(selectedTrack);
    };
    
    document.getElementById('vol-slider').oninput = (e) => {
        const val = parseFloat(e.target.value);
        audioSys.masterGain.gain.value = val;
        if (window.currentAudio) window.currentAudio.volume = val;
    };

    // --- SAVE ---
    document.getElementById('btn-save-config').onclick = async () => {
        try {
            const res = await fetch('/api/music-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
            if (res.ok) alert("CONFIGURATION SAVED!");
            else alert("ERROR SAVING!");
        } catch(e) { console.error(e); alert("ERROR!"); }
    };

    // --- ADD BUTTONS ---
    document.getElementById('btn-add-level').onclick = () => {
        const id = prompt("Enter Level ID (e.g., level3):");
        if(id) {
            if(!config.levels[id]) config.levels[id] = "";
            renderContexts();
        }
    };
    document.getElementById('btn-add-event').onclick = () => {
        const id = prompt("Enter Event ID (e.g., secret_room):");
        if(id) {
            if(!config.events[id]) config.events[id] = "";
            renderContexts();
        }
    };

    init();
</script>
</body>
</html>
