<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Studio - Vortex Engine</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/platformer_studio.css">
</head>
<body>
    <div id="editor-container">
        <!-- Top Menu Bar -->
        <div id="top-bar">
            <div class="logo">PLATFORMER STUDIO</div>
            <div class="menu-items">
                <button class="menu-btn" id="btn-new"><i class="fas fa-file"></i> NEW</button>
                <button class="menu-btn" id="btn-save"><i class="fas fa-save"></i> SAVE</button>
                <button class="menu-btn" id="btn-load"><i class="fas fa-folder-open"></i> LOAD</button>
                <div class="divider"></div>
                <button class="menu-btn" id="btn-undo"><i class="fas fa-undo"></i></button>
                <button class="menu-btn" id="btn-redo"><i class="fas fa-redo"></i></button>
                <div class="divider"></div>
                <button class="menu-btn primary" id="btn-play"><i class="fas fa-play"></i> PLAY</button>
            </div>
            <div class="project-info">
                PROJECT: <span id="project-name">DEFAULT</span>
            </div>
        </div>

        <div id="main-workbench">
            <!-- Left Sidebar: Tools -->
            <div id="left-sidebar" class="panel">
                <div class="panel-header">TOOLS</div>
                <div class="tool-grid">
                    <button class="tool-btn active" id="tool-brush" title="Brush [B]"><i class="fas fa-paint-brush"></i></button>
                    <button class="tool-btn" id="tool-eraser" title="Eraser [E]"><i class="fas fa-eraser"></i></button>
                    <button class="tool-btn" id="tool-fill" title="Bucket Fill [F]"><i class="fas fa-fill-drip"></i></button>
                    <button class="tool-btn" id="tool-select" title="Select [S]"><i class="fas fa-mouse-pointer"></i></button>
                </div>
                <div class="divider"></div>
                <div class="panel-header">LAYERS</div>
                <div class="layer-list" id="layer-list">
                    <div class="layer-item active" data-layer="main">MAIN</div>
                    <div class="layer-item" data-layer="collision">COLLISION</div>
                    <div class="layer-item" data-layer="background">BACKGROUND</div>
                    <div class="layer-item" data-layer="foreground">FOREGROUND</div>
                    <div class="layer-item" data-layer="decorations">DECORATIONS</div>
                </div>
            </div>

            <!-- Central Viewport -->
            <div id="viewport-container">
                <canvas id="editorCanvas"></canvas>
                <div id="status-bar">
                    <span id="coords">X: 0, Y: 0</span>
                    <span id="zoom-level">ZOOM: 100%</span>
                    <span id="map-size">50x20</span>
                </div>
            </div>

            <!-- Right Sidebar: Properties -->
            <div id="right-sidebar" class="panel">
                <div id="properties-panel">
                    <div class="panel-header">PROPERTIES</div>
                    <div class="panel-content" id="props-content">
                        <div class="empty-state">Select an object to edit properties</div>
                    </div>
                </div>
                <div id="world-config-panel">
                    <div class="panel-header">WORLD CONFIG</div>
                    <div class="panel-content">
                        <div class="prop-group">
                            <label>Gravity</label>
                            <input type="number" id="cfg-gravity" step="0.1" value="0.5">
                        </div>
                        <div class="prop-group">
                            <label>Friction</label>
                            <input type="number" id="cfg-friction" step="0.1" value="0.8">
                        </div>
                        <div class="prop-group">
                            <label>Background</label>
                            <input type="color" id="cfg-bg" value="#87CEEB">
                        </div>
                        <div class="prop-group">
                            <label>Auto-Tiling</label>
                            <input type="checkbox" id="cfg-autotile" checked>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Panel: Assets -->
        <div id="bottom-panel" class="panel">
            <div class="tabs">
                <div class="tab active" data-tab="tiles">TILES</div>
                <div class="tab" data-tab="entities">ENTITIES</div>
                <div class="tab" data-tab="generator">GENERATOR</div>
            </div>
            <div class="tab-content" id="asset-browser">
                <div id="tiles-grid" class="asset-grid">
                    <!-- Tiles injected here -->
                </div>
                <div id="entities-grid" class="asset-grid hidden">
                    <div class="asset-card" data-entity="player">
                        <div class="icon"><i class="fas fa-user"></i></div>
                        <div class="label">PLAYER</div>
                    </div>
                    <div class="asset-card" data-entity="enemy">
                        <div class="icon"><i class="fas fa-skull"></i></div>
                        <div class="label">ENEMY</div>
                    </div>
                    <div class="asset-card" data-entity="coin">
                        <div class="icon"><i class="fas fa-coins"></i></div>
                        <div class="label">COIN</div>
                    </div>
                    <div class="asset-card" data-entity="block_push">
                        <div class="icon"><i class="fas fa-box"></i></div>
                        <div class="label">PUSH BLOCK</div>
                    </div>
                    <div class="asset-card" data-entity="switch">
                        <div class="icon"><i class="fas fa-toggle-on"></i></div>
                        <div class="label">SWITCH</div>
                    </div>
                    <div class="asset-card" data-entity="pressure_plate">
                        <div class="icon"><i class="fas fa-compress"></i></div>
                        <div class="label">PLATE</div>
                    </div>
                    <div class="asset-card" data-entity="zone">
                        <div class="icon"><i class="fas fa-vector-square"></i></div>
                        <div class="label">ZONE</div>
                    </div>
                </div>
                <div id="generator-panel" class="hidden">
                    <div class="gen-controls">
                        <div class="prop-group">
                            <label>Theme/Biome</label>
                            <select id="gen-theme">
                                <option value="forest">FOREST</option>
                                <option value="cave">CAVE</option>
                                <option value="castle">CASTLE</option>
                                <option value="flow">FLOW (Classic)</option>
                                <option value="spire">SPIRE (Classic)</option>
                            </select>
                        </div>
                        <div class="prop-group">
                            <label>Difficulty</label>
                            <input type="range" id="gen-diff" min="1" max="10" value="5">
                        </div>
                        <button class="retro-btn" id="btn-generate" style="width: 100%;">GENERATE LEVEL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="engines/platformer-2d/PlatformerConfig.js"></script>
    <script src="engines/platformer-2d/PlatformerAssetManager.js"></script>
    <script src="engines/platformer-2d/ParallaxSystem.js"></script>
    <script src="engines/platformer-2d/renderer.js"></script>
    <script src="engines/platformer-2d/generator/SmartGenerator.js"></script>
    <script src="engines/platformer-2d/generator/AdvancedGenerator.js"></script>
    
    <script src="js/platformer_editor/EditorCore.js"></script>
</body>
</html>
