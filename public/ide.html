<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ONGONLUK CODE STUDIO</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="lib/monaco/vs/editor/editor.main.min.css">
    <style>
        :root {
            --bg-darker: #05050a;
            --bg-sidebar: #111;
            --accent: #f1c40f;
            --text: #40e0d0;
            --border: #333;
        }
        body {
            background-color: var(--bg-darker);
            color: var(--text);
            font-family: 'VT323', monospace;
            margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Sidebar Styling */
        #ide-sidebar {
            width: 300px; background: var(--bg-sidebar);
            border-right: 2px solid var(--border); display: flex; flex-direction: column;
            flex-shrink: 0;
        }
        #sidebar-header { 
            padding: 12px 15px; background: #000; border-bottom: 2px solid var(--border); 
            color: var(--accent); font-size: 1.1rem; text-transform: uppercase;
            display: flex; justify-content: space-between; align-items: center;
            letter-spacing: 1px;
        }

        #file-tree { flex-grow: 1; overflow-y: auto; padding: 5px; font-size: 14px; line-height: 1.6; }
        .tree-item { 
            cursor: pointer; padding: 2px 8px; white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis; 
            border-radius: 3px; margin: 1px 0;
            display: flex; align-items: center;
            color: #ccc;
            transition: all 0.1s;
        }
        .tree-item:hover { background: #222; color: #fff; }
        .tree-item.dir { color: var(--accent); font-weight: 500; }
        .tree-item.active { background: #2a2a2a; color: var(--accent); font-weight: bold; }

        /* Main Editor Area */
        #editor-container { 
            flex-grow: 1; display: flex; flex-direction: column; 
            background: #1e1e1e; min-width: 0;
        }
        
        #tabs-bar {
            height: 40px; background: #0a0a0a; display: flex; align-items: center;
            border-bottom: 1px solid var(--border); overflow-x: auto;
            padding: 0 5px; gap: 2px;
        }
        .tab {
            padding: 0 12px; height: 32px; display: flex; align-items: center;
            background: #151515; border: 1px solid #222; cursor: pointer;
            font-size: 13px; color: #888; white-space: nowrap;
            border-radius: 4px 4px 0 0; position: relative;
            transition: background 0.2s, color 0.2s;
            gap: 8px;
        }
        .tab:hover { background: #222; color: #ccc; }
        .tab.active { 
            background: #1e1e1e; color: var(--accent); 
            border-bottom: 2px solid var(--accent);
            border-top: 1px solid #333;
        }
        .close-btn {
            font-size: 16px; opacity: 0.5; width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 3px;
        }
        .close-btn:hover { background: #444; opacity: 1; color: #ff5555; }

        #monaco-editor { 
            flex-grow: 1; 
            width: 100%;
            height: 100%;
        }

        /* Bottom Dock Styling */
        #bottom-dock {
            height: 200px;
            background: #0a0a0a;
            border-top: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #dock-tabs {
            height: 30px;
            background: #000;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 15px;
            border-bottom: 1px solid #1a1a1a;
        }
        .dock-tab {
            font-size: 12px;
            color: #555;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .dock-tab.active {
            color: var(--accent);
            font-weight: bold;
        }
        #dock-content {
            flex-grow: 1;
            overflow: hidden;
            padding: 5px 10px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
        }
        .terminal-output {
            height: calc(100% - 30px);
            overflow-y: auto;
            color: #aaa;
            white-space: pre-wrap;
            margin-bottom: 5px;
        }
        .terminal-input-line {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .terminal-input-line input {
            background: transparent;
            border: none;
            color: #fff;
            flex-grow: 1;
            outline: none;
            font-family: inherit;
            font-size: inherit;
        }

        #status-bar {
            height: 25px; background: #000; border-top: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 10px; font-size: 12px;
            color: #666; justify-content: space-between;
        }

        button {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 4px 10px; font-family: 'VT323', monospace; cursor: pointer;
            border-radius: 3px;
        }
        button:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div id="ide-sidebar">
        <div id="sidebar-header">
            <span>EXPLORER</span>
            <button onclick="toggleSearch()" title="Search Across Project">🔍</button>
        </div>
        <div id="file-tree"></div>
        <div style="padding:10px; border-top:1px solid var(--border); display:flex; gap:5px; background: #0a0a0a;">
            <button onclick="saveCurrentFile()" style="flex:2; background:var(--accent); color:#000; font-weight:bold;">💾 SAVE</button>
            <button onclick="loadTree()" title="Refresh Tree" style="flex:1;">🔄</button>
        </div>
    </div>

    <div id="editor-container">
        <div id="tabs-bar"></div>
        <div style="flex-grow: 1; display: flex; flex-direction: column; min-height: 0;">
            <div id="monaco-editor"></div>
            <div id="bottom-dock">
                <div id="dock-tabs">
                    <div class="dock-tab active" onclick="switchDock('terminal')">Terminal</div>
                    <div class="dock-tab" onclick="switchDock('output')">Output</div>
                    <div class="dock-tab" onclick="switchDock('stats')">System Stats</div>
                </div>
                <div id="dock-content">
                    <div id="terminal-pane">
                        <div id="terminal-log" class="terminal-output">Ongonluk Shell v0.1.0\nReady for input...</div>
                        <div class="terminal-input-line">
                            <span style="color:var(--accent)">$</span>
                            <input type="text" id="terminal-input" placeholder="Enter command...">
                        </div>
                    </div>
                    <div id="stats-pane" style="display:none; color:#40e0d0; padding-top:10px;">
                        <div>Server RAM: <span id="stat-mem">0</span> MB</div>
                        <div>CPU Load: <span id="stat-cpu">0</span>%</div>
                        <div>System Uptime: <span id="stat-uptime">0</span>s</div>
                    </div>
                </div>
            </div>
        </div>
        <div id="status-bar">
            <div id="status-left">Initializing Engine...</div>
            <div id="status-right">Line: 1, Col: 1</div>
        </div>
    </div>

    <!-- Integration System -->
    <script src="/shared/EventBus.js"></script>
    <script src="/shared/SharedProjectState.js"></script>
    <script src="/shared/AssetManager.js"></script>

    <script src="lib/monaco/vs/loader.min.js"></script>
    <script src="ide.js"></script>
</body>
</html>
