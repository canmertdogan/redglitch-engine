<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KETEBE TERMINAL</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <style>
        :root {
            --bg: #05080f;
            --accent: #f1c40f;
            --text: #cfd8dc;
            --dim: #546e7a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'VT323', monospace; font-size: 1.2rem;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }
        #output {
            flex-grow: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 4px;
            scrollbar-width: thin;
        }
        .line { white-space: pre-wrap; word-break: break-all; display: flex; gap: 8px; align-items: flex-start; margin-bottom: 2px; }
        .ts { color: #546e7a; font-size: 0.9em; min-width: 85px; }
        .src { color: #cfd8dc; font-weight: bold; min-width: 40px; }
        .icon { width: 20px; text-align: center; }
        .msg { flex-grow: 1; }
        
        .line.system .icon { color: #40c4ff; }
        .line.error .icon { color: #ff5252; }
        .line.success .icon { color: #69f0ae; }
        .line.warning .icon { color: #ffd740; }
        .line.input-line .icon { color: var(--accent); }
        
        .line.system .msg { color: #40c4ff; }
        .line.error .msg { color: #ff5252; }
        .line.success .msg { color: #69f0ae; }
        .line.warning .msg { color: #ffd740; }
        .line.input-line .msg { color: var(--accent); }
        .dim { color: var(--dim); }

        #input-area {
            background: #000; border-top: 2px solid #1f2b42;
            padding: 10px 15px; display: flex; align-items: center;
        }
        #prompt { color: var(--accent); margin-right: 10px; white-space: nowrap; }
        #input {
            flex-grow: 1; background: transparent; border: none;
            color: #fff; font-family: inherit; font-size: inherit; outline: none;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #1f2b42; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>
    <div id="output">
        <div class="line system">KETEBE TERMINAL v1.0 // MULTI-ARCH KERNEL</div>
        <div class="line dim">Type 'help' for available commands. Prefix with 'sh ' for system shell.</div>
    </div>
    <div id="input-area">
        <div id="prompt">ide@ketebe:~$</div>
        <input type="text" id="input" autofocus spellcheck="false">
    </div>
    <script src="console.js"></script>
</body>
</html>
