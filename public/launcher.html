<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ketebe Engine Launcher</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="transitions.css">
    <style>
        :root {
            --accent: #f1c40f;
            --bg: #0a0a0f;
            --text: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'VT323', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #atmosphere-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        .terminal-window {
            background: rgba(10, 10, 15, 0.95);
            border: 3px solid var(--accent);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
            min-width: 400px;
        }

        .terminal-window h1 {
            color: var(--accent);
            margin-bottom: 20px;
            text-align: center;
            font-size: 2.5rem;
        }

        .terminal-window p {
            color: #888;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            color: var(--accent);
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .retro-btn {
            width: 100%;
            padding: 15px;
            background: rgba(241, 196, 15, 0.1);
            border: 2px solid var(--accent);
            color: var(--accent);
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .retro-btn:hover {
            background: rgba(241, 196, 15, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .retro-btn:active {
            transform: translateY(0);
        }

        .menu-container {
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .menu-title {
            font-size: 3.5rem;
            color: var(--accent);
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .menu-subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 40px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .user-display {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 1.2rem;
        }

        .user-display span {
            color: var(--accent);
        }

        .exit-btn {
            border-color: #555 !important;
            color: #888 !important;
        }

        .exit-btn:hover {
            border-color: #777 !important;
            color: #aaa !important;
        }
    </style>
</head>
<body>
    <!-- ENGINE LOADING SPLASH -->
    <div id="splash-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:flex; align-items:center; justify-content:center; overflow:hidden;">
        <div id="blackhole-container-launcher" style="position:absolute; top:0; left:0; width:100%; height:100%;"></div>
        <canvas id="mesh-canvas-launcher" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:2; opacity:0.2; pointer-events:none;"></canvas>
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.9) 100%); pointer-events:none; z-index:3;"></div>
        <div style="position:fixed; top:100px; left:40px; color:rgba(64,224,208,0.4); font-size:10px; z-index:100; letter-spacing:1px;" id="hud-coords-launcher">LAT: 45.9206° N<br>LON: 63.3422° E</div>
        <div style="position:fixed; top:100px; right:40px; color:rgba(64,224,208,0.4); font-size:10px; z-index:100; letter-spacing:1px; text-align:right;">SYSTEM: NOMINAL<br>CORE: STABLE</div>
        <div style="position:relative; z-index:4; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div style="margin-top:40px; width:300px; text-align:center;">
                <div id="splash-progress-text" style="color:#888; font-size:14px; margin-bottom:10px; letter-spacing:2px; text-transform:uppercase;">INITIALIZING SINGULARITY...</div>
                <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden;">
                    <div id="splash-progress-bar" style="width:0%; height:100%; background:var(--accent); box-shadow:0 0 10px var(--accent); transition:width 0.3s;"></div>
                </div>
            </div>
        </div>
        <div style="position:fixed; bottom:25px; right:45px; font-size:10px; color:rgba(255,255,255,0.1); letter-spacing:4px; z-index:100; pointer-events:none;">РОСКОСМОС</div>
    </div>

    <script src="lib/three.min.js"></script>
    <script>
        (function() {
            const container = document.getElementById('blackhole-container-launcher');
            if (!container) return;
            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const uniforms = {
                iTime: { value: 0 },
                iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
            };
            const fragmentShader = `
                uniform float iTime;
                uniform vec2 iResolution;
                float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453123); }
                float noise(vec2 p) {
                    vec2 i = floor(p); vec2 f = fract(p);
                    f = f*f*(3.0-2.0*f);
                    return mix(mix(hash(i + vec2(0,0)), hash(i + vec2(1,0)), f.x),
                               mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
                }
                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * iResolution.xy) / min(iResolution.y, iResolution.x);
                    float d = length(uv);
                    float shadow = smoothstep(0.08, 0.085, d);
                    float photon = exp(-pow(d - 0.09, 2.0) * 5000.0) * 1.5;
                    float angle = atan(uv.y, uv.x);
                    float disk_h = exp(-pow(uv.y, 2.0) * 200.0) * smoothstep(0.1, 0.5, d) * exp(-d * 1.5);
                    float lens_r = abs(d - 0.22);
                    float disk_v = exp(-pow(lens_r, 2.0) * 1000.0) * 0.5;
                    float turb = noise(vec2(angle * 5.0 - iTime * 1.5, d * 20.0));
                    float final_disk = (disk_h + disk_v) * (0.7 + 0.3 * turb);
                    float glow = exp(-d * 6.0) * 0.15;
                    vec3 col = vec3(0.0);
                    vec2 star_uv = uv * (1.0 + 0.03 / (d + 0.01));
                    float stars = pow(noise(star_uv * 100.0), 40.0);
                    col += vec3(stars) * 0.4 * shadow;
                    vec3 gold = vec3(1.0, 0.7, 0.2);
                    col += gold * final_disk * 1.8 + vec3(1.0) * photon + gold * glow;
                    col *= shadow;
                    col = pow(col, vec3(1.1));
                    gl_FragColor = vec4(col, 1.0);
                }
            `;
            const material = new THREE.ShaderMaterial({ uniforms, fragmentShader });
            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));
            function animate(time) {
                requestAnimationFrame(animate);
                uniforms.iTime.value = time * 0.001;
                renderer.render(scene, camera);
            }
            animate();

            const meshCanvas = document.getElementById('mesh-canvas-launcher');
            const mctx = meshCanvas.getContext('2d');
            let mw, mh, particles = [];
            function mresize() { mw = meshCanvas.width = window.innerWidth; mh = meshCanvas.height = window.innerHeight; }
            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
                mresize();
            });
            mresize();
            class P { constructor(){this.x=Math.random()*mw;this.y=Math.random()*mh;this.vx=(Math.random()-0.5)*0.4;this.vy=(Math.random()-0.5)*0.4;} update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>mw)this.vx*=-1;if(this.y<0||this.y>mh)this.vy*=-1;}}
            for(let i=0;i<50;i++) particles.push(new P());
            function mdraw(){
                mctx.clearRect(0,0,mw,mh); mctx.strokeStyle='rgba(64,224,208,0.1)'; mctx.lineWidth=0.5;
                for(let i=0;i<particles.length;i++){
                    particles[i].update();
                    for(let j=i+1;j<particles.length;j++){
                        let dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, dist=Math.sqrt(dx*dx+dy*dy);
                        if(dist<150){mctx.beginPath();mctx.moveTo(particles[i].x,particles[i].y);mctx.lineTo(particles[j].x,particles[j].y);mctx.stroke();}
                    }
                }
                requestAnimationFrame(mdraw);
            }
            mdraw();

            let progress = 0;
            const pBar = document.getElementById('splash-progress-bar');
            const pText = document.getElementById('splash-progress-text');
            const steps = ["STABILIZING SINGULARITY", "CALIBRATING PHOTON SPHERE", "IGNITING FORGE", "FORGE READY"];
            const interval = setInterval(() => {
                progress += Math.random() * 2.5;
                if (progress >= 100) { progress = 100; clearInterval(interval); }
                if (pBar) pBar.style.width = progress + '%';
                if (pText) pText.innerText = steps[Math.floor((progress / 101) * steps.length)];
                const coords = document.getElementById('hud-coords-launcher');
                if (coords) {
                    const lat = (45.9206 + (Math.random()-0.5)*0.001).toFixed(4);
                    const lon = (63.3422 + (Math.random()-0.5)*0.001).toFixed(4);
                    coords.innerHTML = `LAT: ${lat}° N<br>LON: ${lon}° E<br>ALT: ${(408.2 + (Math.random()-0.5)*0.5).toFixed(1)} KM`;
                }
                if (progress >= 100) {
                    setTimeout(() => {
                        const s = document.getElementById('splash-screen');
                        if (s) { s.style.transition = 'opacity 0.6s'; s.style.opacity = '0'; setTimeout(() => s.remove(), 650); }
                    }, 300);
                }
            }, 80);
        })();
    </script>

    <!-- Animated Background -->
    <canvas id="atmosphere-canvas"></canvas>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen active">
        <div class="terminal-window">
            <h1>KETEBE TERMINAL</h1>
            <p id="login-prompt">Identify yourself, Traveler.</p>
            <input type="text" id="username-input" placeholder="ENTER NAME..." maxlength="12" autocomplete="off">
            <button class="retro-btn" onclick="attemptLogin()">
                <i class="fas fa-sign-in-alt"></i> CONNECT
            </button>
        </div>
    </div>

    <!-- MAIN MENU SCREEN -->
    <div id="main-menu" class="screen">
        <div class="menu-container">
            <h1 class="menu-title">KETEBE ENGINE</h1>
            <p class="menu-subtitle">Multi-Engine Game Platform</p>

            <div class="menu-buttons">
                <button class="retro-btn" onclick="smoothNavigate('slot_selection.html')">
                    <i class="fas fa-gamepad"></i> CAMPAIGN MODE
                </button>
                <button class="retro-btn" onclick="smoothNavigate('campaign_editor.html')">
                    <i class="fas fa-edit"></i> CAMPAIGN EDITOR
                </button>
                <button class="retro-btn" onclick="smoothNavigate('tools.html')">
                    <i class="fas fa-tools"></i> TOOLS
                </button>
                <button class="retro-btn exit-btn" onclick="quitGame()">
                    <i class="fas fa-power-off"></i> EXIT
                </button>
            </div>

            <div class="user-display">
                USER: <span id="current-user-display">GUEST</span>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/smooth-nav.js"></script>
    <script>
        // Atmosphere canvas animation
        const canvas = document.getElementById('atmosphere-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Simple star field
        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(241, 196, 15, 0.8)';

            stars.forEach(star => {
                ctx.fillRect(star.x, star.y, star.size, star.size);
                star.y += star.speed;

                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(animateStars);
        }

        animateStars();

        // Login functionality
        function attemptLogin() {
            const username = document.getElementById('username-input').value.trim();
            if (!username) {
                if (window.showError) {
                    window.showError('Please enter a username');
                } else {
                    alert('Please enter a username');
                }
                return;
            }

            // Store username
            localStorage.setItem('ketebe_username', username);
            document.getElementById('current-user-display').textContent = username;

            // Hide login, show main menu
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('main-menu').classList.add('active');
        }

        // Auto-login if username exists
        window.addEventListener('load', () => {
            const savedUsername = localStorage.getItem('ketebe_username');
            if (savedUsername) {
                document.getElementById('username-input').value = savedUsername;
                document.getElementById('current-user-display').textContent = savedUsername;
            }

            // Allow Enter key on username input
            document.getElementById('username-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    attemptLogin();
                }
            });
        });

        // Quit game function
        function quitGame() {
            if (typeof window !== 'undefined' && window.process && window.process.type) {
                // Electron environment
                const { ipcRenderer } = require('electron');
                ipcRenderer.send('window-close');
            } else {
                // Web environment - go back or close
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.close();
                }
            }
        }

        // Smooth navigate helper
        function smoothNavigate(url) {
            // Check if smooth-nav.js is loaded (it sets window.smoothNavigate initially)
            // But since we're defining it here, we need to check differently
            // Just use direct navigation - smooth-nav.js will intercept if loaded
            document.body.classList.add('page-exit');
            setTimeout(() => {
                window.location.href = url;
            }, 300);
        }
    </script>
</body>
</html>
