<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RedGlitch Engine Launcher</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="transitions.css">
    <style>
        :root {
            --accent: #f1c40f;
            --bg: #0a0a0f;
            --text: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'VT323', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        .terminal-window {
            background: rgba(10, 10, 15, 0.95);
            border: 3px solid var(--accent);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
            min-width: 400px;
        }

        .terminal-window h1 {
            color: var(--accent);
            margin-bottom: 20px;
            text-align: center;
            font-size: 2.5rem;
        }

        .terminal-window p {
            color: #888;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            color: var(--accent);
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .retro-btn {
            width: 100%;
            padding: 15px;
            background: rgba(241, 196, 15, 0.1);
            border: 2px solid var(--accent);
            color: var(--accent);
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .retro-btn:hover {
            background: rgba(241, 196, 15, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .retro-btn:active {
            transform: translateY(0);
        }

        .menu-container {
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .menu-title {
            font-size: 3.5rem;
            color: var(--accent);
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .menu-subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 40px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .user-display {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 1.2rem;
        }

        .user-display span {
            color: var(--accent);
        }

        .exit-btn {
            border-color: #555 !important;
            color: #888 !important;
        }

        .exit-btn:hover {
            border-color: #777 !important;
            color: #aaa !important;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: #fff;
            overflow: hidden;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <!-- ENGINE LOADING SPLASH -->
    <div id="splash-screen">
        <div style="position:relative; z-index:4; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div style="margin-top:40px; width:300px; text-align:center;">
                <div id="splash-progress-text" style="color:#888; font-size:14px; margin-bottom:10px; letter-spacing:2px; text-transform:uppercase;">LOADING REDGLITCH...</div>
                <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden;">
                    <div id="splash-progress-bar" style="width:0%; height:100%; background:var(--accent); box-shadow:0 0 10px var(--accent); transition:width 0.3s;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen active">
        <div class="terminal-window">
            <h1>REDGLITCH TERMINAL</h1>
            <p id="login-prompt">Identify yourself, Traveler.</p>
            <input type="text" id="username-input" placeholder="ENTER NAME..." maxlength="12" autocomplete="off">
            <button class="retro-btn" onclick="attemptLogin()">
                <i class="fas fa-sign-in-alt"></i> CONNECT
            </button>
        </div>
    </div>

    <!-- MAIN MENU SCREEN -->
    <div id="main-menu" class="screen">
        <div class="menu-container">
            <h1 class="menu-title">REDGLITCH ENGINE</h1>
            <p class="menu-subtitle">Multi-Engine Game Platform</p>

            <div class="menu-buttons">
                <button class="retro-btn" onclick="smoothNavigate('slot_selection.html')">
                    <i class="fas fa-gamepad"></i> CAMPAIGN MODE
                </button>
                <button class="retro-btn" onclick="smoothNavigate('campaign_editor.html')">
                    <i class="fas fa-edit"></i> CAMPAIGN EDITOR
                </button>
                <button class="retro-btn" onclick="smoothNavigate('tools.html')">
                    <i class="fas fa-tools"></i> TOOLS
                </button>
                <button class="retro-btn exit-btn" onclick="quitGame()">
                    <i class="fas fa-power-off"></i> EXIT
                </button>
            </div>

            <div class="user-display">
                USER: <span id="current-user-display">GUEST</span>
            </div>
        </div>
    </div>

    <script src="shared/LoggerHook.js"></script>
    <script src="shared/EventBus.js"></script>
    <script src="shared/SharedProjectState.js"></script>
    <script src="shared/AssetManager.js"></script>
    <script src="shared/LocalizationSystem.js"></script>
    <script src="js/smooth-nav.js"></script>
    <script src="js/Launcher.js"></script>
    
    <script>
        // Global safety: remove splash
        const clearSplash = () => {
            const splash = document.getElementById('splash-screen');
            if (splash) {
                splash.style.transition = 'opacity 0.6s';
                splash.style.opacity = '0';
                setTimeout(() => { if(splash.parentNode) splash.remove(); }, 650);
            }
        };

        window.addEventListener('load', () => {
            let progress = 0;
            const pBar = document.getElementById('splash-progress-bar');
            const pText = document.getElementById('splash-progress-text');
            const steps = ["BOOTING CORE", "MOUNTING SYSTEMS", "READY"];
            
            const interval = setInterval(() => {
                progress += Math.random() * 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    clearSplash();
                }
                if (pBar) pBar.style.width = progress + '%';
                if (pText) pText.innerText = steps[Math.floor((progress/101) * steps.length)];
            }, 50);
        });
    </script>
</body>
</html>
