<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ONGONLUK SHADER LAB</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="pixel_scrollbars.css">
    <style>
        :root {
            --bg-dark: #05050a;
            --bg-panel: #111;
            --border: 2px solid #333;
            --accent: #00f3ff; /* Shader Blue */
            --gold: #f1c40f;
            --text: #eee;
            --input-bg: #000;
        }
        body {
            margin: 0; background: var(--bg-dark); color: var(--text);
            font-family: 'VT323', monospace; height: 100vh; font-size: 18px;
            display: flex; flex-direction: column; overflow: hidden;
            image-rendering: pixelated;
        }

        /* TOOLBAR */
        #toolbar {
            height: 44px; background: #000; display: flex; align-items: center; padding: 0 10px; gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .title { color: var(--accent); font-size: 1.5rem; margin-right: 20px; text-shadow: 2px 2px 0 #000; }
        
        /* MAIN LAYOUT */
        #main { flex-grow: 1; display: flex; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 350px; background: var(--bg-panel); border-right: var(--border);
            display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 10px; border-bottom: var(--border); background: #1a1a1a; color: #888; }
        
        /* CODE EDITOR */
        #code-container { flex-grow: 1; position: relative; display: flex; flex-direction: column; }
        #editor {
            flex-grow: 1; background: #000; color: #00f3ff; border: none;
            padding: 15px; font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; line-height: 1.4;
            outline: none; resize: none; white-space: pre; overflow: auto;
        }

        /* VIEWPORT */
        .viewport {
            flex-grow: 1; background: #080808; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            background-image: radial-gradient(#111 1px, transparent 1px); background-size: 20px 20px;
        }
        #gl-canvas {
            border: 4px solid #333; box-shadow: 0 0 40px rgba(0,243,255,0.1);
            max-width: 90%; max-height: 80%;
        }

        /* CONTROLS */
        .panel-box { background: #111; border: 2px solid #333; padding: 15px; position: relative; margin: 10px; }
        .panel-title { position: absolute; top: -12px; left: 10px; background: #111; padding: 0 5px; color: var(--accent); font-size: 1.1rem; }

        .btn {
            background: #222; border: 2px solid #444; color: #ccc; padding: 4px 12px; cursor: pointer;
            font-family: inherit; font-size: 1.1rem; transition: all 0.1s;
        }
        .btn:hover { background: #333; color: #fff; border-color: #fff; }
        .btn.primary { color: var(--accent); border-color: var(--accent); }
        .btn.gold { color: var(--gold); border-color: var(--gold); }

        .row { display: flex; gap: 5px; align-items: center; margin-bottom: 8px; }
        select, input {
            background: #000; border: 1px solid #444; color: #fff;
            padding: 4px; font-family: inherit; font-size: 1rem; flex-grow: 1;
        }

        #error-log {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(231, 76, 60, 0.95); color: #fff; padding: 10px;
            font-size: 14px; display: none; border: 2px solid #000; font-family: monospace;
        }

        .status-badge {
            position: absolute; top: 10px; right: 10px; padding: 2px 8px;
            background: #27ae60; color: #fff; font-size: 0.8rem; border-radius: 2px;
        }
        .status-badge.error { background: #c0392b; }

    </style>
</head>
<body>

    <div id="toolbar">
        <span class="title">SHADER LAB PRO</span>
        <div style="flex-grow:1"></div>
        <button class="btn gold" onclick="saveShader()">💾 SAVE TO PROJECT</button>
    </div>

    <div id="main">
        <!-- LEFT: CODE & PARAMS -->
        <div class="sidebar">
            <div class="sidebar-header">FRAGMENT SHADER (.FRAG)</div>
            <div id="code-container">
                <textarea id="editor" spellcheck="false" spellcheck="false">
precision mediump float;
varying vec2 vTexCoord;
uniform sampler2D uTexture;
uniform float uTime;

void main() {
    vec2 uv = vTexCoord;
    gl_FragColor = texture2D(uTexture, uv);
}</textarea>
                <div id="status-badge" class="status-badge">READY</div>
            </div>

            <div class="panel-box">
                <div class="panel-title">LIBRARY & TEMPLATES</div>
                <div class="row">
                    <select id="file-list"><option value="">-- Load Project --</option></select>
                    <button class="btn" onclick="loadShader()" style="flex-grow:0;">LOAD</button>
                </div>
                <div class="row">
                    <select id="template-select">
                        <option value="">-- Choose Template --</option>
                        <option value="default">Standard</option>
                        <option value="crt">Retro CRT</option>
                        <option value="wave">Underwater</option>
                        <option value="chromatic">Chromatic</option>
                        <option value="glitch">Glitch</option>
                    </select>
                </div>
            </div>

            <div class="panel-box" id="params-panel">
                <div class="panel-title">LIVE PARAMETERS</div>
                <div id="dynamic-params" style="color:#666; font-style:italic; text-align:center;">
                    No custom uniforms detected.
                </div>
            </div>
        </div>

        <!-- RIGHT: VIEWPORT -->
        <div class="viewport">
            <canvas id="gl-canvas"></canvas>
            
            <div id="error-log"></div>

            <div style="margin-top:20px; display:flex; gap:20px; color:#555;">
                <label><input type="radio" name="preview-img" value="helper" checked> HELPER</label>
                <label><input type="radio" name="preview-img" value="grid"> GRID</label>
                <label><input type="radio" name="preview-img" value="noise"> NOISE</label>
            </div>
        </div>
    </div>

    <!-- Integration System -->
    <script src="/shared/EventBus.js"></script>
    <script src="/shared/SharedProjectState.js"></script>
    <script src="/shared/AssetManager.js"></script>
    
    <script src="shader_editor.js"></script>
</body>
</html>
