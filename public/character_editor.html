<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ketebe HERO STUDIO</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="pixel_scrollbars.css">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <style>
        :root {
            --bg-root: #050505;
            --bg-panel: #0a0a0f;
            --bg-header: #000000;
            --bg-canvas: #080808;
            --bg-input: #000000;
            --border: #333;
            --accent: #f1c40f;
            --text-main: #e0e0e0;
            --text-muted: #888;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            margin: 0; padding: 0; background-color: var(--bg-root); color: var(--text-main);
            font-family: 'VT323', monospace; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; user-select: none; font-size: 18px;
            image-rendering: pixelated;
        }

        /* --- MENUBAR --- */
        #menubar {
            height: 32px; background: #000; display: flex; align-items: center; padding: 0 10px;
            font-size: 1.1rem; border-bottom: 1px solid var(--border);
            z-index: 3000; flex-shrink: 0;
        }
        .menu-item { padding: 0 15px; cursor: pointer; color: #888; text-transform: uppercase; height: 100%; display: flex; align-items: center; }
        .menu-item:hover { background: var(--accent); color: #000; }

        /* --- TOOLBAR --- */
        #toolbar {
            height: 44px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 10px; gap: 8px; flex-shrink: 0;
        }
        .tool-btn {
            background: #111; border: 1px solid #444; color: #aaa;
            width: 32px; height: 32px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 1rem; border-radius: 3px;
        }
        .tool-btn:hover { background: #222; border-color: var(--accent); color: var(--accent); }
        .tool-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .tool-sep { width: 1px; height: 20px; background: #333; margin: 0 5px; }

        input, select {
            background: #000; border: 1px solid #444; color: var(--accent);
            padding: 4px 8px; font-family: inherit; font-size: 1rem; outline: none; width: 100%;
        }
        input:focus { border-color: var(--accent); }

        /* --- LAYOUT --- */
        #layout { flex-grow: 1; display: flex; overflow: hidden; position: relative; }

        /* --- PANELS --- */
        .panel { display: flex; flex-direction: column; background: var(--bg-panel); border-right: 1px solid var(--border); }
        .panel-header {
            height: 32px; background: #000; display: flex; align-items: center; padding: 0 10px;
            font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--border); 
            text-transform: uppercase; font-size: 1rem; justify-content: space-between; letter-spacing: 1px; flex-shrink: 0;
        }
        .panel-content { padding: 15px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }

        /* --- SIDEBAR --- */
        #sidebar { width: 260px; border-right: 1px solid var(--border); }
        
        .list-item {
            padding: 8px 10px; cursor: pointer; border-bottom: 1px solid #1a1a1a;
            color: #888; display: flex; justify-content: space-between; align-items: center;
        }
        .list-item:hover { background: #111; color: #fff; }
        .list-item.active { background: #1a1a1a; color: var(--accent); border-left: 3px solid var(--accent); }

        /* --- CENTER (EDITOR) --- */
        #center-panel { flex-grow: 1; background: var(--bg-canvas); }
        
        .form-section { background: #111; border: 1px solid #333; padding: 15px; position: relative; margin-bottom: 10px; }
        .section-title {
            position: absolute; top: -10px; left: 10px; background: #111; padding: 0 5px;
            color: #888; font-size: 0.9rem; text-transform: uppercase;
        }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .form-full { margin-bottom: 10px; }
        label { display: block; color: #666; font-size: 0.8rem; margin-bottom: 4px; text-transform: uppercase; }

        /* --- RIGHT (PREVIEW) --- */
        #preview-panel { width: 300px; border-left: 1px solid var(--border); border-right: none; }
        
        #preview-box {
            width: 100%; aspect-ratio: 1; background: #000; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
            background-image: radial-gradient(#222 1px, transparent 1px); background-size: 10px 10px; cursor: pointer;
        }
        #preview-box:hover { border-color: var(--accent); }
        #previewCanvas { width: 100%; height: 100%; image-rendering: pixelated; }

        input[type="range"] { -webkit-appearance: none; background: #333; height: 4px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; }

    </style>
    <script src="theme.js"></script>
</head>
<body>

    <div id="menubar">
        <div style="color:var(--accent); font-weight:bold; margin-right:20px; letter-spacing:2px;">
            <i class="fas fa-user-astronaut"></i> HERO STUDIO
        </div>
        <div class="menu-item" onclick="saveToBrowser()">File</div>
        <div class="menu-item">View</div>
    </div>

    <div id="toolbar">
        <button class="tool-btn" onclick="saveToBrowser()" title="Save"><i class="fas fa-save"></i></button>
        <div class="tool-sep"></div>
        <button class="tool-btn" onclick="downloadJSON()" title="Export"><i class="fas fa-download"></i></button>
    </div>

    <div id="layout">
        
        <!-- LEFT: TABS -->
        <div id="sidebar" class="panel">
            <div class="panel-header">SECTIONS</div>
            <div class="panel-content" style="padding:0;">
                <div class="list-item active" onclick="showTab('stats')"><i class="fas fa-chart-bar"></i> CORE STATS</div>
                <div class="list-item" onclick="showTab('visuals')"><i class="fas fa-eye"></i> VISUALS</div>
                <div class="list-item" onclick="showTab('slither')"><i class="fas fa-snake"></i> SLITHER PHYSICS</div>
            </div>
        </div>

        <!-- CENTER: EDITOR -->
        <div id="center-panel" class="panel">
            <div class="panel-header">CONFIGURATION</div>
            <div class="panel-content">
                
                <!-- STATS TAB -->
                <div id="tab-stats" class="tab-content">
                    <div class="form-section">
                        <div class="section-title">Identity</div>
                        <div class="form-full"><label>Name</label><input type="text" id="char-name"></div>
                    </div>
                    <div class="form-section">
                        <div class="section-title">Attributes</div>
                        <div class="form-row">
                            <div><label>HP</label><input type="number" id="stat-hp"></div>
                            <div><label>Stamina</label><input type="number" id="stat-stamina"></div>
                        </div>
                        <div class="form-row">
                            <div><label>Mana</label><input type="number" id="stat-mana"></div>
                            <div><label>Speed</label><input type="number" id="stat-speed"></div>
                        </div>
                        <div class="form-full"><label>Jump Force</label><input type="number" id="stat-jump"></div>
                    </div>
                </div>

                <!-- VISUALS TAB -->
                <div id="tab-visuals" class="tab-content" style="display:none;">
                    <div class="form-section">
                        <div class="section-title">Sprites</div>
                        <div class="form-full">
                            <label>Head Sprite</label>
                            <input type="file" id="head-input">
                            <button class="tool-btn" style="width:100%; margin-top:5px;" onclick="resetSprite('head')">RESET TO DEFAULT</button>
                        </div>
                        <div class="form-full">
                            <label>Body Sprite</label>
                            <input type="file" id="body-input">
                            <button class="tool-btn" style="width:100%; margin-top:5px;" onclick="resetSprite('body')">RESET TO DEFAULT</button>
                        </div>
                        <div class="form-full">
                            <label>Glow Color</label>
                            <input type="color" id="glow-color" style="height:40px;">
                        </div>
                    </div>
                </div>

                <!-- SLITHER TAB -->
                <div id="tab-slither" class="tab-content" style="display:none;">
                    <div class="form-section">
                        <div class="section-title">Physics</div>
                        <div class="form-full">
                            <label>Segments: <span id="val-segments">8</span></label>
                            <input type="range" id="cfg-segments" min="1" max="30">
                        </div>
                        <div class="form-full">
                            <label>Spacing: <span id="val-spacing">8</span></label>
                            <input type="range" id="cfg-spacing" min="2" max="24">
                        </div>
                        <div class="form-full">
                            <label>Tapering</label>
                            <input type="range" id="cfg-taper" min="0" max="100">
                        </div>
                        <div class="form-full">
                            <label>Wobble</label>
                            <input type="range" id="cfg-wobble" min="0" max="20">
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- RIGHT: PREVIEW -->
        <div id="preview-panel" class="panel">
            <div class="panel-header">SIMULATION</div>
            <div class="panel-content">
                <div id="preview-box">
                    <canvas id="previewCanvas"></canvas>
                </div>
                
                <div style="display:flex; gap:5px;">
                    <button class="tool-btn active anim-btn" style="flex:1;" onclick="setPreviewState('idle')">IDLE</button>
                    <button class="tool-btn anim-btn" style="flex:1;" onclick="setPreviewState('move')">MOVE</button>
                </div>
                
                <p style="font-size:0.8rem; color:#666; margin-top:10px;">
                    Preview shows real-time rendering of the slither system.
                </p>
            </div>
        </div>

    </div>

    <script src="base_game/sprites.js"></script>
    <script src="character_editor.js"></script>
    <script>
        // Tab Switching Logic
        window.showTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById('tab-' + tabId).style.display = 'block';
            
            document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
            // This relies on order, or we can find by click. Just a simple visual update for now.
            event.currentTarget.classList.add('active');
        };
    </script>
    
    <!-- Integration System -->
    <script src="/shared/EventBus.js"></script>
    <script src="/shared/SharedProjectState.js"></script>
    <script src="/shared/AssetManager.js"></script>
    <!-- Kai AI Assistant -->
    <iframe id="kai-ai-panel" src="ai/ui/assistant-panel.html" 
            style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                   border: none; pointer-events: none; z-index: 9999;">
    </iframe>
    <script>
        window.addEventListener('load', () => {
            const iframe = document.getElementById('kai-ai-panel');
            if (iframe) {
                iframe.addEventListener('load', () => {
                    try {
                        const doc = iframe.contentWindow.document;
                        doc.body.style.background = 'transparent';
                        doc.body.style.pointerEvents = 'none';
                        const clickableElements = doc.querySelectorAll('#ai-assistant-container, #ai-chat-panel, #xp-ai-loading, #xp-settings');
                        clickableElements.forEach(el => { if (el) el.style.pointerEvents = 'auto'; });
                    } catch (e) { console.warn('Kai: Could not access iframe:', e); }
                });
            }
        });
    </script>
</body>
</html>
