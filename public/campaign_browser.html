<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Browser - RedGlitch Engine</title>
    <link rel="stylesheet" href="base_game/style.css">
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="transitions.css">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --dark: #1a1a2e;
            --light: #eee;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'VT323', 'Press Start 2P', monospace;
            color: var(--light);
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        body::-webkit-scrollbar {
            width: 12px;
        }

        body::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        body::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
            border: 2px solid rgba(0, 0, 0, 0.8);
        }

        body::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #2ecc71 0%, #27ae60 100%);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        /* Firefox Scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: #667eea rgba(0, 0, 0, 0.8);
        }

        /* Animated Starry Background */
        .stars-layer {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 0;
        }

        .stars-layer::before,
        .stars-layer::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, white, transparent),
                radial-gradient(2px 2px at 60px 70px, white, transparent),
                radial-gradient(1px 1px at 50px 50px, white, transparent),
                radial-gradient(1px 1px at 130px 80px, white, transparent),
                radial-gradient(2px 2px at 90px 10px, white, transparent),
                radial-gradient(1px 1px at 150px 120px, white, transparent),
                radial-gradient(2px 2px at 180px 40px, white, transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
        }

        .stars-layer::before {
            animation: stars-drift 40s linear infinite;
        }

        .stars-layer::after {
            opacity: 0.5;
            animation: stars-drift 60s linear infinite reverse;
        }

        @keyframes stars-drift {
            from { background-position: 0 0; }
            to { background-position: -200px 200px; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 0, 0, 0.5);
            color: #ff0000;
            letter-spacing: 4px;
        }

        .header .subtitle {
            font-size: 1.4rem;
            opacity: 0.9;
            color: #3498db;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.8);
        }

        .header .slot-info {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            border: 2px solid var(--accent);
            font-size: 1.2rem;
        }

        .slot-info i {
            color: var(--accent);
            margin-right: 10px;
        }

        /* Search Bar */
        .search-bar {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            flex: 1;
            min-width: 300px;
            max-width: 500px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--primary);
            border-radius: 8px;
            color: var(--light);
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.5);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--primary);
            border-radius: 8px;
            color: var(--light);
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--dark);
        }

        /* Campaign Grid */
        .campaigns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .campaign-card {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .campaign-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.2) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .campaign-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.5), 0 0 40px rgba(46, 204, 113, 0.2);
        }

        .campaign-card:hover::before {
            opacity: 1;
        }

        .campaign-header {
            position: relative;
            z-index: 1;
            margin-bottom: 15px;
        }

        .campaign-name {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            color: #ff0000;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.8), 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .campaign-author {
            font-size: 1.1rem;
            color: #95a5a6;
        }

        .campaign-author i {
            margin-right: 5px;
            color: var(--primary);
        }

        .campaign-description {
            position: relative;
            z-index: 1;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ecf0f1;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .campaign-meta {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: #bdc3c7;
        }

        .meta-item i {
            color: var(--accent);
            font-size: 1.2rem;
        }

        .campaign-tags {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            padding: 5px 12px;
            background: rgba(52, 152, 219, 0.3);
            border: 1px solid #3498db;
            border-radius: 12px;
            font-size: 1rem;
            color: #3498db;
        }

        .tag.pattern {
            background: rgba(46, 204, 113, 0.3);
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .tag.difficulty {
            background: rgba(255, 0, 0, 0.3);
            border-color: #ff0000;
            color: #ff0000;
        }

        .campaign-select-btn {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent) 0%, #27ae60 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .campaign-select-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.6), 0 0 30px rgba(46, 204, 113, 0.3);
        }

        .campaign-select-btn i {
            margin-right: 10px;
        }

        /* Loading/Empty States */
        .loading-container,
        .empty-container {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 1.4rem;
            color: #95a5a6;
        }

        /* Back Button */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--danger);
            border-radius: 8px;
            color: var(--light);
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }

        .back-button:hover {
            background: var(--danger);
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }

        .back-button i {
            margin-right: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .campaigns-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2.5rem;
            }

            .header .subtitle {
                font-size: 1.2rem;
            }

            .search-input {
                min-width: 100%;
            }

            .campaign-name {
                font-size: 1.5rem;
            }

            .campaign-description {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars-layer"></div>

    <button class="back-button" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> BACK
    </button>

    <div class="container">
        <div class="header">
            <h1>SELECT CAMPAIGN</h1>
            <p class="subtitle">Choose a campaign to start in your save slot</p>
            <div class="slot-info">
                <i class="fas fa-save"></i>
                <span>SLOT <span id="slot-number">-</span></span>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" 
                   class="search-input" 
                   id="search-input" 
                   placeholder="Search campaigns..."
                   oninput="filterCampaigns()">
            
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="setDifficultyFilter('all')">ALL</button>
                <button class="filter-btn" onclick="setDifficultyFilter('easy')">EASY</button>
                <button class="filter-btn" onclick="setDifficultyFilter('normal')">NORMAL</button>
                <button class="filter-btn" onclick="setDifficultyFilter('hard')">HARD</button>
            </div>
        </div>

        <div id="campaigns-container">
            <!-- Loading state -->
            <div class="loading-container" id="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading Campaigns...</p>
            </div>

            <!-- Campaigns will be rendered here -->
            <div class="campaigns-grid" id="campaigns-grid" style="display: none;"></div>

            <!-- Empty state -->
            <div class="empty-container" id="empty-state" style="display: none;">
                <div class="empty-icon"><i class="fas fa-folder-open"></i></div>
                <p class="empty-text">No campaigns found</p>
            </div>
        </div>
    </div>

    <script src="js/smooth-nav.js"></script>
    <script src="js/CampaignSlot.js"></script>
    <script src="js/SlotManager.js"></script>
    <script src="campaign_browser.js"></script>
</body>
</html>
