<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Browser - RedGlitch Engine</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="transitions.css">
    <style>
        :root {
            --bg: #050508;
            --bg-card: rgba(12, 12, 20, 0.8);
            --bg-card-hover: rgba(20, 18, 30, 0.95);
            --border: rgba(255, 255, 255, 0.05);
            --accent: #ff1e27;
            --accent-glow: rgba(255, 30, 39, 0.35);
            --accent-soft: rgba(255, 30, 39, 0.1);
            --text: #e0e0e0;
            --text-muted: #777;
            --text-dim: #444;
            --gold: #ffd700;
            --success: #2ecc71;
            --danger: #e74c3c;
            --info: #3498db;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: var(--bg);
            font-family: 'VT323', monospace;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ═══════════ BACKGROUND ═══════════ */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                linear-gradient(rgba(255, 30, 39, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 30, 39, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: grid-drift 50s linear infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; height: 50vh; z-index: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 30, 39, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        @keyframes grid-drift {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        /* ═══════════ SCROLLBAR ═══════════ */
        body::-webkit-scrollbar { width: 6px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb { background: rgba(255, 30, 39, 0.2); border-radius: 3px; }
        body::-webkit-scrollbar-thumb:hover { background: rgba(255, 30, 39, 0.4); }
        * { scrollbar-width: thin; scrollbar-color: rgba(255,30,39,0.2) transparent; }

        /* ═══════════ BACK BUTTON ═══════════ */
        .back-button {
            position: fixed; top: 24px; left: 24px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            letter-spacing: 2px;
        }

        .back-button:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateX(-3px);
        }

        .back-button i { margin-right: 8px; }

        /* ═══════════ CONTAINER ═══════════ */
        .container {
            position: relative; z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 32px 60px;
        }

        /* ═══════════ HEADER ═══════════ */
        .header {
            text-align: center;
            margin-bottom: 48px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 2.4rem;
            margin: 0 0 8px 0;
            color: var(--accent);
            letter-spacing: 8px;
            text-shadow: 0 0 40px var(--accent-glow);
        }

        .header .subtitle {
            font-size: 1.2rem;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-bottom: 24px;
        }

        .header .slot-info {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 28px;
            background: rgba(255, 30, 39, 0.05);
            border: 1px solid rgba(255, 30, 39, 0.15);
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--text-muted);
        }

        .slot-info i {
            color: var(--accent);
        }

        .slot-info span {
            color: var(--text);
        }

        /* ═══════════ SEARCH & FILTERS ═══════════ */
        .search-bar {
            margin-bottom: 36px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 280px;
            max-width: 480px;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .search-input::placeholder {
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(255, 30, 39, 0.3);
            box-shadow: 0 0 20px rgba(255, 30, 39, 0.08);
        }

        .filter-buttons {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px;
            border: 1px solid var(--border);
        }

        .filter-btn {
            padding: 10px 18px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-family: 'VT323', monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 2px;
            position: relative;
        }

        .filter-btn:hover {
            color: var(--text-muted);
        }

        .filter-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* ═══════════ CAMPAIGN GRID ═══════════ */
        .campaigns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* ═══════════ CAMPAIGN CARD ═══════════ */
        .campaign-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Top accent line */
        .campaign-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        /* Inner glow on hover */
        .campaign-card::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 30, 39, 0.04), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .campaign-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 30, 39, 0.2);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4), 0 0 50px rgba(255, 30, 39, 0.06);
            transform: translateY(-3px);
        }

        .campaign-card:hover::before { opacity: 1; }
        .campaign-card:hover::after { opacity: 1; }

        .campaign-card-inner {
            position: relative; z-index: 1;
            padding: 28px;
        }

        /* ─── Card header ─── */
        .campaign-header {
            margin-bottom: 14px;
        }

        .campaign-name {
            font-size: 1.6rem;
            margin: 0 0 6px 0;
            color: #fff;
            letter-spacing: 1px;
        }

        .campaign-author {
            font-size: 0.95rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .campaign-author i {
            margin-right: 6px;
            color: rgba(255, 30, 39, 0.4);
        }

        /* ─── Description ─── */
        .campaign-description {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 20px;
            min-height: 48px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ─── Meta row ─── */
        .campaign-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .meta-item i {
            color: rgba(255, 30, 39, 0.35);
            font-size: 0.85rem;
        }

        /* ─── Tags ─── */
        .campaign-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
        }

        .tag {
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .tag.pattern {
            border-color: rgba(255, 30, 39, 0.2);
            color: rgba(255, 30, 39, 0.6);
            background: rgba(255, 30, 39, 0.04);
        }

        .tag.difficulty {
            border-color: rgba(255, 215, 0, 0.2);
            color: rgba(255, 215, 0, 0.7);
            background: rgba(255, 215, 0, 0.04);
        }

        .tag.difficulty[data-d="easy"] {
            border-color: rgba(46, 204, 113, 0.2);
            color: rgba(46, 204, 113, 0.7);
            background: rgba(46, 204, 113, 0.04);
        }

        .tag.difficulty[data-d="hard"] {
            border-color: rgba(231, 76, 60, 0.3);
            color: rgba(231, 76, 60, 0.8);
            background: rgba(231, 76, 60, 0.05);
        }

        /* ─── Start button ─── */
        .campaign-select-btn {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 30, 39, 0.06);
            border: 1px solid rgba(255, 30, 39, 0.2);
            border-top: 1px solid var(--border);
            color: var(--accent);
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }

        .campaign-select-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--accent), #cc1520);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .campaign-select-btn span {
            position: relative; z-index: 1;
        }

        .campaign-card:hover .campaign-select-btn {
            border-color: var(--accent);
        }

        .campaign-card:hover .campaign-select-btn::before {
            opacity: 1;
        }

        .campaign-card:hover .campaign-select-btn {
            color: #fff;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .campaign-select-btn i {
            margin-right: 8px;
        }

        /* ═══════════ LOADING / EMPTY ═══════════ */
        .loading-container,
        .empty-container {
            text-align: center;
            padding: 80px 20px;
        }

        .loading-spinner {
            width: 40px; height: 40px;
            border: 2px solid rgba(255, 30, 39, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-container p {
            color: var(--text-dim);
            font-size: 1.2rem;
            letter-spacing: 3px;
        }

        .empty-icon {
            font-size: 3rem;
            color: var(--text-dim);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 1.3rem;
            color: var(--text-dim);
            letter-spacing: 3px;
        }

        /* ═══════════ CARD STAGGER ANIM ═══════════ */
        .campaign-card {
            animation: card-in 0.5s cubic-bezier(0.4, 0, 0.2, 1) backwards;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* JS applies animation-delay via data-index */

        /* ═══════════ DIVIDER ═══════════ */
        .header-divider {
            width: 100px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 20px auto 0;
        }

        /* ═══════════ RESPONSIVE ═══════════ */
        @media (max-width: 768px) {
            .campaigns-grid {
                grid-template-columns: 1fr;
            }

            .container { padding: 24px 16px 40px; }

            .header h1 {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }

            .header .subtitle { font-size: 1rem; }

            .search-input { min-width: 100%; }

            .campaign-name { font-size: 1.3rem; }

            .campaign-description { font-size: 0.95rem; }

            .back-button { top: 12px; left: 12px; padding: 8px 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> BACK
    </button>

    <div class="container">
        <div class="header">
            <h1>SELECT CAMPAIGN</h1>
            <p class="subtitle">Choose a campaign to start in your save slot</p>
            <div class="header-divider"></div>
            <div class="slot-info">
                <i class="fas fa-save"></i>
                <span>SLOT <span id="slot-number">-</span></span>
            </div>
        </div>

        <div class="search-bar">
            <input type="text"
                   class="search-input"
                   id="search-input"
                   placeholder="Search campaigns..."
                   oninput="filterCampaigns()">

            <div class="filter-buttons">
                <button class="filter-btn active" onclick="setDifficultyFilter('all')">ALL</button>
                <button class="filter-btn" onclick="setDifficultyFilter('easy')">EASY</button>
                <button class="filter-btn" onclick="setDifficultyFilter('normal')">NORMAL</button>
                <button class="filter-btn" onclick="setDifficultyFilter('hard')">HARD</button>
            </div>
        </div>

        <div id="campaigns-container">
            <!-- Loading state -->
            <div class="loading-container" id="loading-state">
                <div class="loading-spinner"></div>
                <p>LOADING CAMPAIGNS...</p>
            </div>

            <!-- Campaigns will be rendered here -->
            <div class="campaigns-grid" id="campaigns-grid" style="display: none;"></div>

            <!-- Empty state -->
            <div class="empty-container" id="empty-state" style="display: none;">
                <div class="empty-icon"><i class="fas fa-folder-open"></i></div>
                <p class="empty-text">NO CAMPAIGNS FOUND</p>
            </div>
        </div>
    </div>

    <script src="js/smooth-nav.js"></script>
    <script src="js/CampaignSlot.js"></script>
    <script src="js/SlotManager.js"></script>
    <script src="campaign_browser.js"></script>
</body>
</html>
