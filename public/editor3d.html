<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified 3D Editor — RedGlitch Engine</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-root:      #050508;
            --bg-widget:    #0a0e14;
            --bg-input:     #000;
            --border:       #1f2b42;
            --border-highlight: #34495e;
            --accent:       #40e0d0;
            --accent-hover: #50f0e0;
            --text:         #ccc;
            --text-dim:     #8fa0bc;
            --font-pixel:   'VT323', monospace;
            --font-mono:    'Consolas', 'Monaco', 'Courier New', monospace;
        }

        body {
            background: var(--bg-root);
            font-family: var(--font-mono);
            color: var(--text);
            font-size: 13px;
            overflow: hidden;
            user-select: none;
        }

        /* --- CRT EFFECT (Subtle) --- */
        body::after {
            content: " ";
            display: block;
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 2px;
            pointer-events: none;
            z-index: 100;
        }

        /* ── Layout ────────────────────────────────────────────── */
        #editor-root {
            display: grid;
            grid-template-columns: 240px 1fr 260px;
            grid-template-rows: 50px 1fr 30px;
            grid-template-areas:
                "toolbar toolbar toolbar"
                "left    viewport right"
                "status  status   status";
            width: 100vw;
            height: 100vh;
            gap: 15px;
            padding: 15px;
            position: relative;
            z-index: 1;
        }

        /* Widget base */
        .widget {
            background: var(--bg-widget);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
            transition: border-color 0.15s;
        }
        .widget:hover { border-color: var(--border-highlight); }

        .w-header {
            background: #020408;
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            font-family: var(--font-pixel);
            font-size: 1.1rem;
            color: var(--text-dim);
            display: flex; justify-content: space-between; align-items: center;
            text-transform: uppercase; letter-spacing: 1px;
            flex-shrink: 0;
        }

        /* ── Toolbar ───────────────────────────────────────────── */
        #toolbar {
            grid-area: toolbar;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            padding: 0 16px;
        }

        #toolbar-title {
            color: var(--accent);
            font-family: var(--font-pixel);
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-right: 16px;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--font-pixel);
            font-size: 1.1rem;
            padding: 4px 12px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toolbar-btn:hover { border-color: var(--accent); color: #fff; }
        .toolbar-btn.active { border-color: var(--accent); background: rgba(64,224,208,0.15); color: var(--accent); }

        #mode-selector {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--accent);
            font-family: var(--font-pixel);
            font-size: 1.1rem;
            padding: 4px 8px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s;
        }
        #mode-selector:hover { border-color: var(--accent); }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 6px;
        }

        /* ── Left Panel ────────────────────────────────────────── */
        #left-panel {
            grid-area: left;
        }

        #scene-tree {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
        }

        .tree-group { margin-bottom: 8px; }
        .tree-group-label {
            font-size: 0.9rem;
            color: var(--text-dim);
            padding: 4px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tree-item {
            padding: 4px 8px;
            font-size: 13px;
            cursor: pointer;
            border-left: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tree-item:hover { background: rgba(255,255,255,0.04); }
        .tree-item.selected { border-left-color: var(--accent); background: rgba(64,224,208,0.08); color: #fff; }

        .panel-empty {
            color: var(--text-dim);
            padding: 16px;
            font-size: 13px;
            text-align: center;
            font-style: italic;
        }

        /* ── Viewport ──────────────────────────────────────────── */
        #viewport-container {
            grid-area: viewport;
            padding: 0;
        }

        #viewport {
            width: 100%;
            height: 100%;
            background: #000;
        }

        #viewport canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* ── Right Panel ───────────────────────────────────────── */
        #right-panel {
            grid-area: right;
        }

        #properties-panel, #mode-tools {
            padding: 10px;
        }
        #properties-panel {
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            max-height: 50%;
            overflow-y: auto;
        }
        #mode-tools {
            flex: 1;
            overflow-y: auto;
        }

        /* Asset Card style for Prop Groups & Tool Sections */
        .asset-card {
            background: #0f151f;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .asset-card:last-child { margin-bottom: 0; }

        .prop-group { margin-bottom: 10px; }
        .prop-group:last-child { margin-bottom: 0; }

        .prop-label {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .prop-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 6px 8px;
            outline: none;
            transition: border-color 0.1s;
        }
        .prop-input:focus { border-color: var(--accent); }
        .prop-vec3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }
        .prop-vec3 input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 4px;
            width: 100%;
            outline: none;
        }
        .prop-vec3 input:focus { border-color: var(--accent); }

        /* ── Mode Tools styling ────────────────────────────────── */
        .tool-section {
            background: #0f151f;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .tool-section:last-child { margin-bottom: 0; }

        .tool-section-title {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .tool-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tool-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 16px;
            padding: 6px 12px;
            cursor: pointer;
            transition: all 0.1s;
            border-radius: 2px;
        }
        .tool-btn:hover { border-color: var(--accent); }
        .tool-btn.active { border-color: var(--accent); background: rgba(64,224,208,0.15); color: var(--accent); }

        .draw-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-pixel);
            font-size: 1.1rem;
            padding: 4px 10px;
            cursor: pointer;
        }
        .draw-btn.active { border-color: var(--accent); background: rgba(64,224,208,0.15); color: var(--accent); }

        .tool-select, .tool-select-sm {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 6px 8px;
            outline: none;
        }
        .tool-select-sm { width: auto; padding: 4px 6px; }

        .tool-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            margin-top: 6px;
        }

        .tool-input-sm {
            width: 50px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 4px;
            outline: none;
        }

        .tool-buttons-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .action-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-pixel);
            font-size: 1.1rem;
            padding: 6px 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        .action-btn:hover { border-color: var(--accent); color: #fff; }

        /* ── Status Bar ────────────────────────────────────────── */
        #status-bar {
            grid-area: status;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            padding: 0;
            font-family: var(--font-pixel);
            font-size: 1.1rem;
            color: var(--text-dim);
            gap: 24px;
        }

        #status-mode { color: var(--accent); font-weight: bold; }
        #status-dirty { color: #e74c3c; font-weight: bold; }

        /* ── Scrollbar ─────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-highlight); }
    </style>
</head>
<body>
    <div id="editor-root">
        <!-- Toolbar -->
        <div id="toolbar" class="widget">
            <span id="toolbar-title"><i class="fas fa-cube" style="margin-right:8px;"></i>REDGLITCH 3D</span>
            <select id="mode-selector">
                <option value="fps-3d">FPS 3D</option>
                <option value="topdown-3d">TOP-DOWN 3D</option>
                <option value="platformer-3d">PLATFORMER 3D</option>
            </select>
            <div class="toolbar-sep"></div>
            <div class="toolbar-group">
                <button class="toolbar-btn" id="btn-new" title="New Level"><i class="fas fa-file"></i> New</button>
                <button class="toolbar-btn" id="btn-save" title="Save (Ctrl+S)"><i class="fas fa-save"></i> Save</button>
                <button class="toolbar-btn" id="btn-load" title="Load Level"><i class="fas fa-folder-open"></i> Load</button>
                <button class="toolbar-btn" id="btn-import" title="Import Tri-Mesh GLTF"><i class="fas fa-file-import"></i> Import</button>
            </div>
            <div class="toolbar-sep"></div>
            <div class="toolbar-group">
                <button class="toolbar-btn" id="btn-undo" title="Undo (Ctrl+Z)"><i class="fas fa-undo"></i></button>
                <button class="toolbar-btn" id="btn-redo" title="Redo (Ctrl+Y)"><i class="fas fa-redo"></i></button>
            </div>
            <div class="toolbar-sep"></div>
            <div class="toolbar-group">
                <button class="toolbar-btn" id="btn-playtest" title="Playtest (F5)"><i class="fas fa-play"></i> Play</button>
            </div>
        </div>

        <!-- Left Panel: Scene Tree -->
        <div id="left-panel" class="widget">
            <div class="w-header">
                <span><i class="fas fa-sitemap"></i> Scene Tree</span>
            </div>
            <div id="scene-tree">
                <div class="panel-empty">No level loaded</div>
            </div>
        </div>

        <!-- 3D Viewport -->
        <div id="viewport-container" class="widget">
            <div id="viewport"></div>
        </div>

        <!-- Right Panel: Properties + Mode Tools -->
        <div id="right-panel" class="widget">
            <div class="w-header">
                <span><i class="fas fa-sliders-h"></i> Properties</span>
            </div>
            <div id="properties-panel">
                <div class="panel-empty">No selection</div>
            </div>
            <div class="w-header" style="border-top: 1px solid var(--border);">
                <span><i class="fas fa-tools"></i> Mode Tools</span>
            </div>
            <div id="mode-tools">
                <div class="panel-empty">Select a mode</div>
            </div>
        </div>

        <!-- Status Bar -->
        <div id="status-bar">
            <span id="status-mode">FPS 3D</span>
            <span id="status-project">No project</span>
            <span id="status-dirty"></span>
            <span style="flex:1"></span>
            <span id="status-info">Ctrl+S: Save | F5: Play | Del: Delete</span>
        </div>
    </div>

    <script src="/shared/EventBus.js"></script>
    <script type="module">
        import Editor3DCore from '/engines/unified-3d/editor/Editor3DCore.js';

        // ── Mode panel registry ───────────────────────────────────────────
        const PANEL_REGISTRY = {
            'fps-3d':        () => import('/engines/unified-3d/editor/FPSEditorPanel.js'),
            'topdown-3d':    () => import('/engines/unified-3d/editor/TopDownEditorPanel.js'),
            'platformer-3d': () => import('/engines/unified-3d/editor/PlatformerEditorPanel.js'),
        };

        const MODE_NAMES = {
            'fps-3d':        'FPS 3D',
            'topdown-3d':    'TOP-DOWN 3D',
            'platformer-3d': 'PLATFORMER 3D',
        };

        // ── URL params ────────────────────────────────────────────────────
        const params  = new URLSearchParams(window.location.search);
        const mode    = params.get('mode')    || 'fps-3d';
        const project = params.get('project') || '';
        const level   = params.get('level')   || '';

        // ── DOM refs ──────────────────────────────────────────────────────
        const modeSelector = document.getElementById('mode-selector');
        const statusMode   = document.getElementById('status-mode');
        const statusProject = document.getElementById('status-project');

        // ── Init editor ───────────────────────────────────────────────────
        const viewport = document.getElementById('viewport');
        const editor = new Editor3DCore(viewport, { mode, project, levelId: level });

        editor.init().then(async () => {
            console.log('[Editor3D] Core initialised');

            // Set initial mode
            modeSelector.value = mode;
            statusMode.textContent = MODE_NAMES[mode] || mode;
            statusProject.textContent = project ? `Project: ${project}` : 'No project';

            // Load mode panel
            await loadModePanel(mode);

            // Load level if specified
            if (project && level) {
                await editor.loadLevel(project, level);
            }
        });

        // ── Mode switching ────────────────────────────────────────────────
        async function loadModePanel(modeId) {
            const loader = PANEL_REGISTRY[modeId];
            if (!loader) return;
            const mod = await loader();
            const PanelClass = mod.default;
            editor.setModePanel(new PanelClass());
            await editor.setMode(modeId);
        }

        modeSelector.addEventListener('change', async () => {
            const newMode = modeSelector.value;
            statusMode.textContent = MODE_NAMES[newMode] || newMode;
            await loadModePanel(newMode);
            // Update URL without reload
            const url = new URL(window.location);
            url.searchParams.set('mode', newMode);
            history.replaceState(null, '', url);
        });

        // ── Toolbar buttons ───────────────────────────────────────────────
        document.getElementById('btn-new')?.addEventListener('click', () => {
            editor.newLevel();
        });
        document.getElementById('btn-save')?.addEventListener('click', () => {
            editor.saveLevel();
        });
        document.getElementById('btn-undo')?.addEventListener('click', () => {
            editor.undo();
        });
        document.getElementById('btn-redo')?.addEventListener('click', () => {
            editor.redo();
        });
        document.getElementById('btn-playtest')?.addEventListener('click', () => {
            editor.playtest();
        });
        document.getElementById('btn-load')?.addEventListener('click', () => {
            const proj = prompt('Project name:');
            const lvl  = prompt('Level ID:');
            if (proj && lvl) editor.loadLevel(proj, lvl);
        });
        document.getElementById('btn-import')?.addEventListener('click', () => {
            editor.importGLTF();
        });

        // ── Keyboard shortcuts ────────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 's') { e.preventDefault(); editor.saveLevel(); }
                if (e.key === 'z') { e.preventDefault(); editor.undo(); }
                if (e.key === 'y') { e.preventDefault(); editor.redo(); }
            }
            if (e.key === 'F5') { e.preventDefault(); editor.playtest(); }
            if (e.key === 'Delete') { editor.deleteSelected?.(); }
        });

        // ── Expose for debugging ──────────────────────────────────────────
        window.editor3d = editor;
    </script>
</body>
</html>
