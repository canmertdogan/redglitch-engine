<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketebe AI Assistant - Test Page</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #fff;
        }
        h1 { color: #667eea; }
        .test-section {
            background: #252526;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #454545;
        }
        .test-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .test-btn:hover { background: #5568d3; }
        #test-results {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e1e;
            border-radius: 6px;
            max-height: 400px;
            overflow-y: auto;
        }
        .test-result {
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
        }
        .test-result.success { background: #2d4a2d; border-left: 3px solid #4caf50; }
        .test-result.error { background: #4a2d2d; border-left: 3px solid #f44336; }
        .test-result.info { background: #2d3a4a; border-left: 3px solid #2196f3; }

        /* Sample editor mockup */
        #mock-editor {
            background: #252526;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        #mock-editor input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            background: #3c3c3c;
            border: 1px solid #454545;
            color: #fff;
            border-radius: 4px;
        }
        #mock-editor button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>🤖 Ketebe AI Assistant - Test Page</h1>
    
    <div class="test-section">
        <h2>Safety Tests</h2>
        <button class="test-btn" onclick="testProtectedFiles()">Test Protected File Blocking</button>
        <button class="test-btn" onclick="testAuditLog()">Test Audit Logging</button>
        <button class="test-btn" onclick="testPermissionGate()">Test Permission Gate</button>
    </div>

    <div class="test-section">
        <h2>Knowledge Base Tests</h2>
        <button class="test-btn" onclick="testKnowledgeLoad()">Test Knowledge Base Loading</button>
        <button class="test-btn" onclick="testEditorDocs()">Test Editor Documentation</button>
        <button class="test-btn" onclick="testTutorials()">Test Tutorials</button>
    </div>

    <div class="test-section">
        <h2>AI Assistant Tests</h2>
        <button class="test-btn" onclick="testQueryProcessing()">Test Query Processing</button>
        <button class="test-btn" onclick="testActionParsing()">Test Action Parsing</button>
        <button class="test-btn" onclick="testContextAwareness()">Test Context Awareness</button>
    </div>

    <div class="test-section">
        <h2>Editor Tools Tests</h2>
        <button class="test-btn" onclick="testOpenEditor()">Test Open Editor</button>
        <button class="test-btn" onclick="testFillField()">Test Fill Field (Safe)</button>
        <button class="test-btn" onclick="testCreateAsset()">Test Create Asset (Permission)</button>
    </div>

    <div class="test-section">
        <h2>Mock Editor (for testing)</h2>
        <div id="mock-editor">
            <input type="text" id="npcName" placeholder="NPC Name">
            <input type="text" id="npcSprite" placeholder="Sprite ID">
            <button id="saveBtn">Save NPC</button>
            <button id="newNpcBtn">New NPC</button>
        </div>
    </div>

    <div class="test-section">
        <h2>Test Results</h2>
        <div id="test-results"></div>
    </div>

    <!-- Include the AI Assistant -->
    <iframe src="ui/assistant-panel.html" id="ai-assistant-test-frame"
            style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                   border: none; pointer-events: auto; z-index: 9999;">
    </iframe>

    <script type="module">
        import { PermissionGate } from './permission-gate.js';
        import { EditorTools } from './tools/editor-tools.js';
        import { KetebeAIAssistant } from './ketebe-ai-assistant.js';

        // Setup globals for tests
        window.testResults = [];
        window.permissionGate = new PermissionGate();
        window.editorTools = new EditorTools(window.permissionGate);
        window.aiAssistant = new KetebeAIAssistant();

        function logResult(type, message) {
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${type}`;
            resultDiv.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            resultsDiv.appendChild(resultDiv);
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
            console.log(`[Test ${type}]`, message);
        }

        // Safety Tests
        window.testProtectedFiles = function() {
            logResult('info', 'Testing protected file detection...');
            
            const testCases = [
                { path: '/public/engines/rpg-topdown/main.js', shouldBlock: true },
                { path: '/public/ai/permission-gate.js', shouldBlock: true },
                { path: '/server.js', shouldBlock: true },
                { path: '/public/npc_editor.js', shouldBlock: false },
                { path: '/projects/MyGame/data/npc.json', shouldBlock: false }
            ];

            testCases.forEach(test => {
                const result = PermissionGate.canModifyFile(test.path);
                const passed = (result.allowed === !test.shouldBlock);
                logResult(
                    passed ? 'success' : 'error',
                    `${test.path}: ${passed ? '✓ PASS' : '✗ FAIL'} (${result.allowed ? 'allowed' : 'blocked'})`
                );
            });
        };

        window.testAuditLog = function() {
            logResult('info', 'Testing audit log...');
            
            window.permissionGate.logAction('test', 'testTool', { foo: 'bar' }, 'success');
            const log = window.permissionGate.getAuditLog(1);
            
            if (log.length > 0) {
                logResult('success', `✓ Audit log working: ${log.length} entries`);
            } else {
                logResult('error', '✗ Audit log not recording');
            }
        };

        window.testPermissionGate = async function() {
            logResult('info', 'Testing permission gate (will show modal)...');
            
            const allowed = await window.permissionGate.requestPermission(
                'testAction',
                { test: true },
                true
            );
            
            logResult(allowed ? 'success' : 'info', `Permission ${allowed ? 'granted' : 'denied'}`);
        };

        // Knowledge Base Tests
        window.testKnowledgeLoad = async function() {
            logResult('info', 'Testing knowledge base loading...');
            
            try {
                await window.aiAssistant.initialize();
                const kb = window.aiAssistant.knowledgeBase;
                
                if (kb && kb.docs) {
                    logResult('success', `✓ Knowledge base loaded: ${Object.keys(kb).length} categories`);
                } else {
                    logResult('error', '✗ Knowledge base not loaded');
                }
            } catch (error) {
                logResult('error', `✗ Error: ${error.message}`);
            }
        };

        window.testEditorDocs = async function() {
            logResult('info', 'Testing editor documentation...');
            
            try {
                const response = await fetch('/ai/knowledge/studio-docs.json');
                const docs = await response.json();
                
                if (docs.editors && docs.editors.length > 0) {
                    logResult('success', `✓ Found ${docs.editors.length} editor docs`);
                } else {
                    logResult('error', '✗ No editor docs found');
                }
            } catch (error) {
                logResult('error', `✗ Error: ${error.message}`);
            }
        };

        window.testTutorials = async function() {
            logResult('info', 'Testing tutorials...');
            
            try {
                const response = await fetch('/ai/knowledge/tutorials.json');
                const tutorials = await response.json();
                
                if (tutorials && tutorials.length > 0) {
                    logResult('success', `✓ Found ${tutorials.length} tutorials`);
                } else {
                    logResult('error', '✗ No tutorials found');
                }
            } catch (error) {
                logResult('error', `✗ Error: ${error.message}`);
            }
        };

        // AI Assistant Tests
        window.testQueryProcessing = async function() {
            logResult('info', 'Testing query processing...');
            
            try {
                await window.aiAssistant.initialize();
                const response = await window.aiAssistant.processQuery('What is Ketebe?');
                
                if (response && response.text) {
                    logResult('success', `✓ Query processed: ${response.text.substring(0, 50)}...`);
                } else {
                    logResult('error', '✗ No response from AI');
                }
            } catch (error) {
                logResult('error', `✗ Error: ${error.message}`);
            }
        };

        window.testActionParsing = function() {
            logResult('info', 'Testing action parsing...');
            
            const testQueries = [
                'open npc editor',
                'create npc named Bob',
                'build game for android'
            ];

            testQueries.forEach(query => {
                const action = window.aiAssistant.parseAction(query);
                logResult(
                    action ? 'success' : 'info',
                    `"${query}": ${action ? action.type : 'not parsed'}`
                );
            });
        };

        window.testContextAwareness = function() {
            logResult('info', 'Testing context awareness...');
            
            const context = window.editorTools.getContext();
            logResult('success', `✓ Context: ${JSON.stringify(context)}`);
        };

        // Editor Tools Tests
        window.testOpenEditor = function() {
            logResult('info', 'Testing open editor (will navigate)...');
            // Don't actually navigate in test
            logResult('success', '✓ Open editor method available');
        };

        window.testFillField = async function() {
            logResult('info', 'Testing fill field...');
            
            const result = await window.editorTools.fillField('npcName', 'Test NPC');
            logResult(
                result.success ? 'success' : 'error',
                `Fill field: ${result.success ? '✓ Success' : '✗ Failed'}`
            );
        };

        window.testCreateAsset = async function() {
            logResult('info', 'Testing create asset (requires permission)...');
            
            const result = await window.editorTools.createAsset('npc', { name: 'Test NPC' });
            logResult(
                result.success ? 'success' : 'info',
                `Create asset: ${result.success ? '✓ Success' : result.reason}`
            );
        };

        // Run initial tests
        setTimeout(() => {
            logResult('info', '=== Starting automated tests ===');
            testProtectedFiles();
            testAuditLog();
            logResult('info', '=== Automated tests complete. Use buttons for interactive tests ===');
        }, 1000);
    </script>
</body>
</html>
