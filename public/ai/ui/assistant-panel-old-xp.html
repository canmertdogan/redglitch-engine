<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRAB - Vortex Studio Assistant</title>
    <style>
        /* MSN Messenger Style for IRAB */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Tahoma, Verdana, sans-serif;
            font-size: 11px;
            background: transparent;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeSpeed;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        /* Floating Assistant Container */
        #ai-assistant-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            pointer-events: auto;
        }

        /* IRAB Character */
        #ai-clippy {
            width: 64px;
            height: 64px;
            background-image: url('/sprite-art/helper.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        #ai-clippy:hover {
            transform: translateY(-5px) scale(1.05);
        }

        #ai-clippy.thinking {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Speech Bubble - Authentic Windows XP Balloon Style */
        #ai-speech-bubble {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 250px;
            background: #FFFFE1;
            border: 1px solid #000000;
            border-radius: 8px;
            padding: 12px 14px;
            color: #000;
            display: none;
            animation: slideIn 0.3s ease;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        #ai-speech-bubble.show {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* XP Balloon Tail - Triangular Pointer */
        #ai-speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -9px;
            right: 20px;
            width: 0;
            height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-top: 9px solid #000000;
            z-index: 1;
        }

        #ai-speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -7px;
            right: 21px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #FFFFE1;
            z-index: 2;
        }

        .ai-speech-header {
            display: none; /* XP balloons don't have headers */
        }

        .ai-speech-close {
            display: none; /* XP balloons auto-dismiss */
        }

        #ai-speech-text {
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
            font-size: 11px;
            line-height: 1.4;
            color: #000;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeSpeed;
        }

        #ai-speech-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .ai-action-btn {
            background: #ECE9D8;
            color: #000;
            border: 1px solid #000;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
            transition: background 0.1s;
            box-shadow: 1px 1px 0 #808080;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeSpeed;
        }

        .ai-action-btn:hover {
            background: #F0EDE3;
        }

        .ai-action-btn:active {
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2);
        }

        .ai-action-btn.secondary {
            background: #D4D0C8;
        }

        /* Chat Panel - Windows XP Style */
        #ai-chat-panel {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 450px;
            height: 600px;
            background: #ECE9D8; /* Windows XP beige */
            border: 3px solid #0054E3; /* XP blue border */
            box-shadow: -4px 0 20px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            z-index: 9998;
        }

        #ai-chat-panel.show {
            display: flex;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        #ai-chat-header {
            background: linear-gradient(180deg, #0997FF 0%, #0053EE 100%);
            padding: 4px 8px;
            border-bottom: 1px solid #0054E3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        #ai-chat-title {
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #ai-chat-title::before {
            content: '';
            width: 16px;
            height: 16px;
            background-image: url('/sprite-art/helper.png');
            background-size: contain;
            background-repeat: no-repeat;
            image-rendering: pixelated;
        }

        #ai-chat-close {
            background: #ECE9D8;
            border: 1px solid #000;
            color: #000;
            font-size: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: 'Marlett', sans-serif;
            box-shadow: 1px 1px 0 #808080;
        }

        #ai-chat-close:hover {
            background: #FF6B6B;
            color: white;
        }

        #ai-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: white;
            border: 1px solid #7F9DB9;
            margin: 8px;
        }

        .ai-message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-message.user {
            text-align: right;
        }

        .ai-message-bubble {
            display: inline-block;
            max-width: 80%;
            padding: 8px 12px;
            color: #000;
            font-size: 11px;
            line-height: 1.4;
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
            border: 1px solid #000;
            border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeSpeed;
        }

        .ai-message.user .ai-message-bubble {
            background: #D4E7FF;
        }

        .ai-message.assistant .ai-message-bubble {
            background: #FFFFE1;
        }

        .ai-message.system .ai-message-bubble {
            background: #D4FFD4;
            border-left: 3px solid #4caf50;
        }

        .ai-message.error .ai-message-bubble {
            background: #FFD4D4;
            border-left: 3px solid #f44336;
        }

        #ai-chat-input-container {
            border-top: 1px solid #7F9DB9;
            padding: 8px;
            display: flex;
            gap: 6px;
            background: #ECE9D8;
        }

        #ai-chat-input {
            flex: 1;
            background: white;
            border: 1px solid #7F9DB9;
            color: #000;
            padding: 6px 8px;
            font-size: 11px;
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeSpeed;
        }

        #ai-chat-input:focus {
            outline: none;
            border-color: #0078D7;
        }

        #ai-chat-send {
            background: #ECE9D8;
            color: #000;
            border: 1px solid #000;
            padding: 6px 16px;
            cursor: pointer;
            font-weight: normal;
            font-size: 11px;
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
            box-shadow: 1px 1px 0 #808080;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeSpeed;
        }

        #ai-chat-send:hover {
            background: #F0EDE3;
        }

        #ai-chat-send:active {
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* Tutorial Overlay - Windows XP Style */
        #ai-tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 61, 130, 0.8);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        #ai-tutorial-overlay.show {
            display: flex;
        }

        #ai-tutorial-content {
            background: #ECE9D8;
            border: 3px solid #003D82;
            padding: 0;
            max-width: 600px;
            color: #000;
            box-shadow: 4px 4px 12px rgba(0,0,0,0.6);
        }

        .ai-tutorial-header {
            background: linear-gradient(180deg, #0078D7 0%, #003D82 100%);
            color: white;
            padding: 8px 12px;
            font-weight: bold;
            border-bottom: 3px solid #003D82;
        }

        #ai-tutorial-step {
            font-size: 14px;
            margin: 20px;
            padding: 15px;
            background: white;
            border: 2px solid #003D82;
            font-family: 'Courier New', monospace;
        }

        #ai-tutorial-progress {
            font-size: 12px;
            color: #666;
            margin: 0 20px;
        }

        #ai-tutorial-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            padding: 20px;
        }

        #ai-tutorial-actions button {
            background: linear-gradient(180deg, #E5E5E5 0%, #CCCCCC 100%);
            border: 2px solid #003D82;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            box-shadow: 1px 1px 0 #003D82;
        }

        #ai-tutorial-actions button:hover {
            background: linear-gradient(180deg, #F5F5F5 0%, #DDDDDD 100%);
        }

        /* Highlight Element - Windows XP Style */
        .ai-highlight {
            position: relative;
            outline: 3px solid #FFD700 !important;
            outline-offset: 4px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6) !important;
            z-index: 9997 !important;
        }
    </style>
</head>
<body>
    <!-- Floating IRAB Assistant -->
    <div id="ai-assistant-container">
        <div id="ai-clippy" title="IRAB - Studio Assistant"></div>
        
        <div id="ai-speech-bubble">
            <div class="ai-speech-header">
                <span>💬 IRAB Says:</span>
                <span class="ai-speech-close" onclick="AIChatUI.dismiss()">✕</span>
            </div>
            <div id="ai-speech-text">GRRR... IRAB IS READY TO HELP!</div>
            <div id="ai-speech-actions">
                <button class="ai-action-btn" onclick="AIChatUI.openChat()">Open Chat</button>
                <button class="ai-action-btn secondary" onclick="AIChatUI.dismiss()">Dismiss</button>
            </div>
        </div>
    </div>

    <!-- Expanded Chat Panel -->
    <div id="ai-chat-panel">
        <div id="ai-chat-header">
            <span id="ai-chat-title">IRAB Assistant</span>
            <button id="ai-chat-close" onclick="AIChatUI.closeChat()">✕</button>
        </div>
        <div id="ai-chat-messages"></div>
        <div id="ai-chat-input-container">
            <input type="text" id="ai-chat-input" placeholder="Ask IRAB anything... GRRR..." />
            <button id="ai-chat-send" onclick="AIChatUI.sendMessage()">Send</button>
        </div>
    </div>

    <!-- Tutorial Overlay -->
    <div id="ai-tutorial-overlay">
        <div id="ai-tutorial-content">
            <div class="ai-tutorial-header">📚 IRAB Tutorial</div>
            <div id="ai-tutorial-progress">Step 1 of 6</div>
            <div id="ai-tutorial-step">Click the 'New NPC' button to create your first character</div>
            <div id="ai-tutorial-actions">
                <button onclick="AITutorial.skip()">Skip Tutorial</button>
                <button onclick="AITutorial.next()">Next</button>
            </div>
        </div>
    </div>

    <!-- Load dependencies first -->
    <script src="../irab-personality.js"></script>
    <script src="../cerebras-adapter.js"></script>
    <script src="../ketebe-ai-assistant.js"></script>
    
    <!-- Then load UI controller -->
    <script src="assistant-panel.js"></script>
</body>
</html>
