<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai - Retro Future Assistant</title>
    <!-- Import VT323 Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* Retro-Futuristic / Nerd Style for Kai */
        :root {
            --kai-bg: #000080; /* Navy Blue */
            --kai-bg-dark: #000040;
            --kai-text: #FFFF00; /* Yellow */
            --kai-accent: #00FF00; /* Green Terminal */
            --kai-border: #FFFF00;
            --kai-font: 'VT323', monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--kai-font);
            font-size: 20px; /* VT323 needs to be larger */
            background: transparent;
            color: var(--kai-text);
            /* Crisp pixels */
            image-rendering: pixelated; 
            -webkit-font-smoothing: none;
        }

        /* Float Kai sprite */
        #ai-assistant-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            pointer-events: auto;
        }

        #ai-clippy {
            width: 64px;
            height: 64px;
            /* Use existing helper sprite but filter it */
            background-image: url('/sprite-art/helper.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: all 0.2s ease;
            filter: hue-rotate(180deg) drop-shadow(2px 2px 0px #000); 
        }

        #ai-clippy:hover {
            transform: scale(1.1);
            filter: hue-rotate(200deg) drop-shadow(4px 4px 0px var(--kai-text));
        }

        /* Speech Bubble - Retro Terminal Style */
        #ai-speech-bubble {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 320px;
            background: var(--kai-bg);
            border: 2px solid var(--kai-border);
            box-shadow: 6px 6px 0px rgba(0,0,0,0.8);
            display: none;
        }

        #ai-speech-bubble.show {
            display: block;
            animation: glitchIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes glitchIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .ai-speech-header {
            background: var(--kai-text);
            color: var(--kai-bg);
            padding: 4px 8px;
            font-weight: bold;
            font-size: 22px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-speech-close {
            cursor: pointer;
            font-weight: bold;
        }

        .ai-speech-close:hover {
            color: #FF0000;
        }

        #ai-speech-text {
            padding: 12px;
            line-height: 1.2;
        }

        #ai-speech-actions {
            padding: 8px;
            border-top: 1px dashed var(--kai-text);
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .ai-action-btn {
            background: var(--kai-bg-dark);
            color: var(--kai-text);
            border: 1px solid var(--kai-text);
            padding: 4px 12px;
            cursor: pointer;
            font-family: var(--kai-font);
            font-size: 20px;
            text-transform: uppercase;
        }

        .ai-action-btn:hover {
            background: var(--kai-text);
            color: var(--kai-bg);
        }

        /* Chat Window - Terminal Style */
        #ai-chat-panel {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 450px;
            height: 550px;
            background: var(--kai-bg);
            border: 4px double var(--kai-text);
            box-shadow: 8px 8px 0px rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            z-index: 9998;
        }

        #ai-chat-panel.show {
            display: flex;
        }

        /* Title Bar */
        #ai-chat-header {
            background: var(--kai-text);
            color: var(--kai-bg);
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--kai-bg-dark);
        }

        #ai-chat-title {
            font-weight: bold;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        #ai-chat-title::before {
            content: '>';
            font-weight: bold;
        }

        /* Window Controls */
        .msn-controls {
            display: flex;
            gap: 6px;
        }

        .msn-btn {
            width: 24px;
            height: 24px;
            background: var(--kai-bg);
            border: 1px solid var(--kai-bg-dark);
            color: var(--kai-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--kai-font);
            font-size: 20px;
            font-weight: bold;
        }

        .msn-btn:hover {
            background: var(--kai-text);
            color: var(--kai-bg);
        }

        /* Conversation Area */
        #ai-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #000020; /* Very dark blue for terminal screen */
            border-bottom: 2px solid var(--kai-text);
        }

        /* Message Style */
        .ai-message {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
            animation: fadeInMsg 0.2s steps(5, end);
        }

        @keyframes fadeInMsg {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .ai-message-avatar {
            width: 40px;
            height: 40px;
            border: 1px solid var(--kai-text);
            flex-shrink: 0;
            image-rendering: pixelated;
            background: var(--kai-bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .ai-message-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ai-message-name {
            font-weight: bold;
            font-size: 20px;
            color: var(--kai-accent);
            text-transform: uppercase;
        }

        .ai-message.user .ai-message-name {
            color: #00FFFF; /* Cyan */
        }

        .ai-message.assistant .ai-message-name {
            color: var(--kai-text);
        }

        .ai-message-timestamp {
            font-size: 16px;
            color: #666;
            margin-left: 6px;
        }

        .ai-message-bubble {
            background: transparent;
            padding: 0;
            font-size: 20px;
            line-height: 1.3;
            color: #EEE;
            word-wrap: break-word;
            border: none;
            font-family: var(--kai-font);
        }
        
        .ai-message.user .ai-message-bubble::before {
            content: '>> ';
            color: #00FFFF;
        }

        .ai-message.assistant .ai-message-bubble::before {
            content: '> ';
            color: var(--kai-text);
        }
        
        .ai-message.system .ai-message-bubble {
             color: #FFFF00;
             font-style: italic;
        }

        /* Input Area */
        #ai-chat-input-container {
            padding: 10px;
            background: var(--kai-bg);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #ai-chat-input {
            width: 100%;
            background: #000020;
            border: 1px solid var(--kai-text);
            color: var(--kai-accent);
            padding: 8px;
            font-size: 20px;
            font-family: var(--kai-font);
            resize: none;
            height: 70px;
            line-height: 1.2;
        }

        #ai-chat-input:focus {
            outline: none;
            box-shadow: 0 0 5px var(--kai-accent);
        }

        .msn-input-toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: space-between;
        }

        .msn-tool-btn {
            background: var(--kai-bg-dark);
            border: 1px solid var(--kai-text);
            color: var(--kai-text);
            padding: 4px 10px;
            cursor: pointer;
            font-size: 18px;
            font-family: var(--kai-font);
        }

        .msn-tool-btn:hover {
            background: var(--kai-text);
            color: var(--kai-bg);
        }

        #ai-chat-send {
            background: var(--kai-text);
            color: var(--kai-bg);
            border: 1px solid var(--kai-bg-dark);
            padding: 6px 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            font-family: var(--kai-font);
            text-transform: uppercase;
        }

        #ai-chat-send:hover {
            background: white;
            color: black;
        }

        /* Status Bar */
        .msn-status-bar {
            border-top: 1px solid var(--kai-text);
            background: var(--kai-bg);
            padding: 4px 10px;
            font-size: 18px;
            color: var(--kai-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .msn-status-dot {
            width: 12px;
            height: 12px;
            background: var(--kai-accent);
            box-shadow: 0 0 5px var(--kai-accent);
        }

        .msn-status-dot.thinking {
            background: #FF0000;
            box-shadow: 0 0 5px #FF0000;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Settings Panel */
        #msn-settings {
            position: absolute;
            top: 40px;
            right: 0;
            width: 320px;
            background: var(--kai-bg);
            border: 2px solid var(--kai-text);
            box-shadow: 8px 8px 0px rgba(0,0,0,0.8);
            display: none;
            z-index: 10000;
        }

        #msn-settings.show {
            display: block;
        }

        .msn-settings-header {
            background: var(--kai-text);
            color: var(--kai-bg);
            padding: 6px 10px;
            font-weight: bold;
            font-size: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .msn-settings-content {
            padding: 14px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 18px;
        }

        .msn-setting-group {
            margin-bottom: 16px;
            border-bottom: 1px dashed var(--kai-text);
            padding-bottom: 12px;
        }

        .msn-setting-label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--kai-accent);
        }

        .msn-setting-control {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 6px;
        }
        
        /* Custom Checkbox */
        .msn-setting-control input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid var(--kai-text);
            background: var(--kai-bg-dark);
            cursor: pointer;
            position: relative;
        }

        .msn-setting-control input[type="checkbox"]:checked::after {
            content: 'X';
            color: var(--kai-text);
            position: absolute;
            top: -4px;
            left: 2px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .msn-setting-control select, 
        .msn-setting-control input[type="text"], 
        .msn-setting-control input[type="number"] {
            background: var(--kai-bg-dark); 
            color: var(--kai-text); 
            border: 1px solid var(--kai-text);
            font-family: var(--kai-font);
            font-size: 18px;
            padding: 4px;
        }

        .msn-setting-desc {
            font-size: 16px;
            color: #AAA;
            margin-left: 24px;
        }
    </style>
</head>
<body>
    <!-- Kai Avatar -->
    <div id="ai-assistant-container">
        <div id="ai-clippy" title="Kai - Click to initialize!"></div>
        
        <!-- Retro Speech Bubble -->
        <div id="ai-speech-bubble">
            <div class="ai-speech-header">
                <span>> Kai.exe</span>
                <span class="ai-speech-close" onclick="AIChatUI.dismiss()">[X]</span>
            </div>
            <div id="ai-speech-text">SYSTEM ONLINE. READY?</div>
            <div id="ai-speech-actions">
                <button class="ai-action-btn" onclick="AIChatUI.openChat()">EXECUTE</button>
                <button class="ai-action-btn" onclick="AIChatUI.dismiss()">IGNORE</button>
            </div>
        </div>
    </div>

    <!-- Retro Terminal Chat Window -->
    <div id="ai-chat-panel">
        <div id="ai-chat-header">
            <span id="ai-chat-title">Kai Assistant v2.0</span>
            <div class="msn-controls">
                <button class="msn-btn" onclick="AISettings.toggle()" title="Config">[C]</button>
                <button class="msn-btn" onclick="AIChatUI.closeChat()" title="Term">[X]</button>
            </div>
        </div>

        <div id="ai-chat-messages"></div>

        <div id="ai-chat-input-container">
            <textarea id="ai-chat-input" placeholder="Enter command or query..."></textarea>
            <div class="msn-input-toolbar">
                <div style="display: flex; gap: 6px;">
                    <button class="msn-tool-btn" title="Emoticons">[:)]</button>
                    <button class="msn-tool-btn" title="Help">[?]</button>
                </div>
                <button id="ai-chat-send" onclick="AIChatUI.sendMessage()">TRANSMIT</button>
            </div>
        </div>

        <div class="msn-status-bar">
            <div class="msn-status-indicator">
                <div class="msn-status-dot"></div>
                <span id="msn-status-text">SYSTEM: ONLINE</span>
            </div>
            <div id="msn-char-count" style="font-size: 16px;">0/500</div>
        </div>

        <!-- Settings Panel -->
        <div id="msn-settings">
            <div class="msn-settings-header">
                <span>> CONFIGURATION</span>
                <span class="ai-speech-close" onclick="AISettings.toggle()">[X]</span>
            </div>
            <div class="msn-settings-content">
                <div class="msn-setting-group">
                    <div class="msn-setting-label">AI CORE</div>
                    <div class="msn-setting-control">
                        <select id="setting-provider">
                            <option value="local">Local (WebGPU)</option>
                            <option value="cerebras">Cerebras (Cloud)</option>
                        </select>
                    </div>
                </div>

                <div class="msn-setting-group">
                    <div class="msn-setting-label">PERSONALITY MODULE</div>
                    <div class="msn-setting-control">
                        <input type="checkbox" id="setting-irab-personality" checked>
                        <label for="setting-irab-personality">Enable Kai Mode (Nerdy/Cool)</label>
                    </div>
                </div>
                
                <div class="msn-setting-group">
                    <div class="msn-setting-label">Automation</div>
                    <div class="msn-setting-control">
                        <input type="checkbox" id="setting-auto-suggestions" checked>
                        <label for="setting-auto-suggestions">Auto-Suggestions</label>
                    </div>
                    <div class="msn-setting-control">
                        <input type="checkbox" id="setting-require-permission">
                        <label for="setting-require-permission">Confirm Actions</label>
                    </div>
                </div>
                
                 <div class="msn-setting-group">
                    <div class="msn-setting-label">Max Tokens</div>
                    <div class="msn-setting-control">
                        <input type="number" id="setting-max-tokens" value="500" min="100" max="2000" step="100">
                    </div>
                </div>

                 <div style="text-align: center; padding-top: 10px;">
                    <button class="ai-action-btn" onclick="AISettings.save()">SAVE CONFIG</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load dependencies -->
    <script src="../irab-personality.js"></script>
    <script src="../cerebras-adapter.js"></script>
    <script src="../redglitch-ai-assistant.js"></script>
    <script src="assistant-panel.js"></script>
</body>
</html>
