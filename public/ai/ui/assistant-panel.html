<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAI // SYSTEM ONLINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --kai-bg: #020b1c; /* Deep Navy */
            --kai-panel: #051630; /* Slightly Lighter Navy */
            --kai-border: #ffd700; /* Retro Yellow */
            --kai-accent: #ffd700;
            --kai-text: #d0e0ff;
            --kai-user-bg: #003366;
            --kai-system-bg: #1a1a1a;
            --kai-font: 'VT323', monospace;
            --kai-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--kai-accent) var(--kai-bg);
        }

        body {
            font-family: var(--kai-font);
            font-size: 20px;
            background: transparent;
            color: var(--kai-text);
            -webkit-font-smoothing: none;
        }

        /* === SCROLLBARS === */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--kai-bg);
            border-left: 1px solid var(--kai-border);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--kai-accent);
            border: 1px solid var(--kai-bg);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #fff;
        }

        /* === FLOATING CHARACTER (KAI ICON) === */
        #ai-assistant-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            pointer-events: auto;
        }

        #ai-clippy {
            width: 64px;
            height: 64px;
            background: var(--kai-panel);
            border: 2px solid var(--kai-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        #ai-clippy::before {
            content: ">_";
            font-size: 32px;
            color: var(--kai-accent);
            animation: blink 1s step-end infinite;
        }

        #ai-clippy:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* === SPEECH BUBBLE (TERMINAL POPUP) === */
        #ai-speech-bubble {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 300px;
            background: var(--kai-bg);
            border: 2px solid var(--kai-accent);
            padding: 15px;
            display: none;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.3s ease-out;
        }

        #ai-speech-bubble.show { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-speech-header {
            color: var(--kai-accent);
            font-size: 22px;
            border-bottom: 1px dashed var(--kai-accent);
            margin-bottom: 10px;
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        #ai-speech-text {
            color: var(--kai-text);
            line-height: 1.2;
            margin-bottom: 15px;
            font-size: 20px;
        }

        #ai-speech-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* === RETRO BUTTONS === */
        .xp-button {
            background: var(--kai-bg);
            border: 2px solid var(--kai-accent);
            color: var(--kai-accent);
            font-family: var(--kai-font);
            font-size: 18px;
            padding: 5px 15px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .xp-button:hover {
            background: var(--kai-accent);
            color: var(--kai-bg);
            box-shadow: 0 0 10px var(--kai-accent);
        }

        .xp-button:active {
            transform: translateY(2px);
        }

        .xp-button.secondary {
            border-color: #666;
            color: #aaa;
        }
        .xp-button.secondary:hover {
            background: #666;
            color: #000;
            box-shadow: none;
        }

        /* === CHAT WINDOW (TERMINAL) === */
        #ai-chat-panel {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 600px;
            height: 500px;
            background: var(--kai-bg);
            border: 2px solid var(--kai-accent);
            display: none;
            flex-direction: column;
            z-index: 9998;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        #ai-chat-panel.show {
            display: flex;
            animation: termOpen 0.2s ease-out;
        }

        @keyframes termOpen {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* HEADER */
        #ai-chat-header {
            background: var(--kai-accent);
            color: var(--kai-bg);
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 22px;
            cursor: move;
        }

        #ai-chat-title::before {
            content: '>> ';
        }

        .xp-window-controls { display: flex; gap: 10px; }
        .xp-control-btn {
            background: transparent;
            border: none;
            color: var(--kai-bg);
            font-family: var(--kai-font);
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
        }
        .xp-control-btn:hover { color: #fff; }

        /* MESSAGES */
        #ai-chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: rgba(0, 20, 46, 0.9);
            font-family: var(--kai-font);
        }

        .ai-message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            animation: fadeIn 0.2s;
        }

        .ai-message-avatar {
            width: 40px;
            height: 40px;
            background: var(--kai-panel);
            border: 1px solid var(--kai-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--kai-accent);
        }

        .ai-message-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .ai-message-name {
            font-size: 16px;
            color: #666;
            margin-bottom: 2px;
        }

        .ai-message-bubble {
            background: transparent;
            border: 1px solid #334455;
            padding: 8px 12px;
            color: var(--kai-text);
            font-size: 20px;
            line-height: 1.3;
            position: relative;
        }
        
        /* Message Variants */
        .ai-message.assistant .ai-message-bubble {
            border-color: var(--kai-accent);
            color: var(--kai-accent);
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.1);
        }
        .ai-message.assistant .ai-message-name { color: var(--kai-accent); }

        .ai-message.user .ai-message-bubble {
            border-color: #0088ff;
            color: #aaddff;
        }
        .ai-message.user .ai-message-name { color: #0088ff; }

        .ai-message.system .ai-message-bubble {
            border: 1px dashed #666;
            color: #888;
            font-style: italic;
        }

        .ai-message.error .ai-message-bubble {
            border-color: #ff3333;
            color: #ff3333;
        }

        /* INPUT */
        #ai-chat-input-container {
            background: var(--kai-panel);
            padding: 10px;
            border-top: 2px solid var(--kai-accent);
        }

        #ai-chat-input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: var(--kai-accent);
            font-family: var(--kai-font);
            font-size: 20px;
            padding: 10px;
            resize: none;
            height: 60px;
        }
        #ai-chat-input:focus {
            outline: none;
            border-color: var(--kai-accent);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .xp-input-toolbar {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
        }

        .xp-tool-btn {
            background: transparent;
            border: 1px solid #333;
            color: #666;
            font-family: var(--kai-font);
            font-size: 18px;
            cursor: pointer;
            padding: 2px 8px;
        }
        .xp-tool-btn:hover { border-color: var(--kai-accent); color: var(--kai-accent); }

        #ai-chat-send {
            background: var(--kai-accent);
            color: var(--kai-bg);
            border: none;
            font-family: var(--kai-font);
            font-size: 20px;
            font-weight: bold;
            padding: 5px 20px;
            cursor: pointer;
            text-transform: uppercase;
        }
        #ai-chat-send:hover {
            background: #fff;
            box-shadow: 0 0 15px var(--kai-accent);
        }

        /* STATUS BAR */
        .xp-status-bar {
            background: var(--kai-bg);
            border-top: 1px solid #333;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 16px;
        }

        .xp-status-dot {
            width: 10px;
            height: 10px;
            background: #33ff33;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 5px #33ff33;
        }
        .xp-status-dot.thinking {
            background: var(--kai-accent);
            box-shadow: 0 0 5px var(--kai-accent);
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* LOADING */
        #xp-ai-loading {
            background: rgba(0, 0, 0, 0.9);
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .xp-loading-window {
            width: 500px;
            background: var(--kai-bg);
            border: 2px solid var(--kai-accent);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
        }
        .xp-loading-header {
            background: var(--kai-accent);
            color: var(--kai-bg);
            padding: 10px;
            font-size: 24px;
            font-weight: bold;
        }
        .xp-loading-content { padding: 30px; text-align: center; }
        .xp-progress-bar {
            height: 20px;
            background: #111;
            border: 1px solid #333;
            margin: 20px 0;
            position: relative;
        }
        .xp-progress-fill {
            height: 100%;
            background: var(--kai-accent);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px var(--kai-accent);
        }

        /* SETTINGS */
        #xp-settings {
            background: var(--kai-bg);
            border: 2px solid var(--kai-accent);
            color: var(--kai-text);
            position: absolute;
            top: 40px; right: 0;
            width: 350px;
            z-index: 10000;
            display: none;
            box-shadow: -10px 10px 20px rgba(0,0,0,0.8);
        }
        #xp-settings.show { display: block; }
        .xp-settings-header {
            background: var(--kai-accent);
            color: var(--kai-bg);
            padding: 5px 10px;
            font-size: 22px;
            display: flex; justify-content: space-between;
        }
        .xp-settings-content { padding: 15px; }
        .xp-setting-group { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .xp-setting-label { color: var(--kai-accent); font-size: 20px; margin-bottom: 5px; }
        
        input, select {
            background: #000;
            border: 1px solid #444;
            color: var(--kai-text);
            font-family: var(--kai-font);
            font-size: 18px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <!-- KAI Avatar Floating Character -->
    <div id="ai-assistant-container">
        <div id="ai-clippy" title="KAI - Studio Assistant"></div>
        
        <!-- Speech Bubble -->
        <div id="ai-speech-bubble">
            <div class="ai-speech-header">>> INCOMING_TRANSMISSION</div>
            <div id="ai-speech-text">SYSTEM READY. AWAITING INPUT.</div>
            <div id="ai-speech-actions">
                <button class="xp-button" onclick="AIChatUI.openChat()">ACCESS</button>
                <button class="xp-button secondary" onclick="AIChatUI.dismiss()">IGNORE</button>
            </div>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="xp-ai-loading" style="display: none;">
        <div class="xp-loading-window">
            <div class="xp-loading-header">
                <span>>> SYSTEM_BOOT_SEQUENCE</span>
            </div>
            <div class="xp-loading-content">
                <div class="xp-loading-text">
                    <div id="xp-loading-status" style="color: var(--kai-accent); font-size: 24px;">INITIALIZING KAI...</div>
                    <div id="xp-loading-details" style="color: #666;">Loading neural matrix...</div>
                </div>
                <div class="xp-progress-container">
                    <div class="xp-progress-bar">
                        <div id="xp-progress-fill" class="xp-progress-fill"></div>
                    </div>
                    <div class="xp-progress-text">
                        <span id="xp-progress-percent">0%</span>
                        <span id="xp-progress-size"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Window -->
    <div id="ai-chat-panel">
        <div id="ai-chat-header">
            <span id="ai-chat-title">KAI_TERMINAL v2.0</span>
            <div class="xp-window-controls">
                <button class="xp-control-btn settings" onclick="AISettings.toggle()" title="Settings">[*]</button>
                <button class="xp-control-btn" onclick="AIChatUI.closeChat()" title="Close">[X]</button>
            </div>
        </div>

        <div id="ai-chat-messages"></div>

        <div id="ai-chat-input-container">
            <textarea id="ai-chat-input" placeholder="Enter command or query..."></textarea>
            <div class="xp-input-toolbar">
                <div class="xp-toolbar-section">
                    <button class="xp-tool-btn" title="Clear">[CLR]</button>
                    <button class="xp-tool-btn" title="Help">[?]</button>
                </div>
                <button id="ai-chat-send" onclick="AIChatUI.sendMessage()">EXECUTE</button>
            </div>
        </div>

        <div class="xp-status-bar">
            <div class="xp-status-indicator">
                <div class="xp-status-dot"></div>
                <span id="xp-status-text">ONLINE</span>
            </div>
            <div id="xp-char-count">0/500</div>
        </div>

        <!-- Settings Panel -->
        <div id="xp-settings">
            <div class="xp-settings-header">
                <span>>> CONFIG</span>
                <span style="cursor: pointer;" onclick="AISettings.toggle()">[X]</span>
            </div>
            <div class="xp-settings-content">
                <div class="xp-setting-group">
                    <div class="xp-setting-label">AI CORE</div>
                    <div class="xp-setting-control">
                        <select id="setting-provider">
                            <option value="local">LOCAL (TRANSFORMERS.JS)</option>
                            <option value="cerebras">CLOUD (CEREBRAS)</option>
                        </select>
                    </div>
                </div>

                <div class="xp-setting-group">
                    <div class="xp-setting-label">PERSONALITY_MATRIX</div>
                    <div class="xp-setting-control">
                        <input type="checkbox" id="setting-irab-personality" checked>
                        <label for="setting-irab-personality">KAI MODE (NERDY)</label>
                    </div>
                </div>

                <div class="xp-setting-group">
                    <div class="xp-setting-label">AUDIO</div>
                    <div class="xp-setting-control">
                        <input type="checkbox" id="setting-sounds" checked>
                        <label for="setting-sounds">SFX ENABLED</label>
                    </div>
                </div>

                <div class="xp-settings-buttons" style="display: flex; gap: 10px; justify-content: center;">
                    <button class="xp-button" onclick="AISettings.save()">SAVE</button>
                    <button class="xp-button secondary" onclick="AISettings.toggle()">CANCEL</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load AI Scripts -->
    <script src="../irab-personality.js"></script>
    <script src="../cerebras-adapter.js"></script>
    <!-- Core AI Engine (Module) -->
    <script type="module" src="../ketebe-ai.js"></script>
    <!-- Compatibility Layer -->
    <script src="../ketebe-ai-assistant.js"></script>
    <!-- UI Controller -->
    <script src="assistant-panel.js"></script>

    <script>
        // Loading Bar Test (Hidden Feature)
        window.testKaiLoading = async function() {
            const loading = document.getElementById('xp-ai-loading');
            loading.style.display = 'flex';
            
            const fill = document.getElementById('xp-progress-fill');
            const percent = document.getElementById('xp-progress-percent');
            const status = document.getElementById('xp-loading-status');
            
            for (let i = 0; i <= 100; i += 5) {
                await new Promise(r => setTimeout(r, 100));
                fill.style.width = i + '%';
                percent.textContent = i + '%';
                if(i > 50) status.textContent = "LOADING KNOWLEDGE BASE...";
            }
            
            setTimeout(() => { loading.style.display = 'none'; }, 500);
        };

        // Character Counter
        const input = document.getElementById('ai-chat-input');
        if (input) {
            input.addEventListener('input', () => {
                const counter = document.getElementById('xp-char-count');
                if (counter) counter.textContent = `${input.value.length}/500`;
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (window.AIChatUI) window.AIChatUI.sendMessage();
                }
            });
        }
        console.log('KAI // SYSTEM ONLINE');
    </script>
</body>
</html>
