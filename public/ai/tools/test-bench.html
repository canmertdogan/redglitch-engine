<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KAP Protocol Test Bench</title>
    <link rel="stylesheet" href="../../fonts/fonts.css">
    <style>
        body {
            background: #050508;
            color: #cfd8dc;
            font-family: 'VT323', monospace;
            padding: 20px;
            font-size: 18px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .panel {
            background: #0c121e;
            border: 1px solid #1f2b42;
            padding: 15px;
            border-radius: 4px;
        }
        h2 { color: #f1c40f; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            background: #1f2b42;
            color: #fff;
            border: 1px solid #2c3e50;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
        }
        button:hover { background: #2c3e50; border-color: #f1c40f; }
        button.primary { background: #f1c40f; color: #000; font-weight: bold; }
        textarea, input {
            background: #000;
            color: #2ecc71;
            border: 1px solid #333;
            padding: 8px;
            font-family: monospace;
            width: 100%;
            box-sizing: border-box;
        }
        .log {
            background: #000;
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #333;
            font-size: 14px;
            color: #8fa0bc;
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-entry.in { color: #2ecc71; }
        .log-entry.out { color: #f1c40f; }
        .log-entry.err { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛠️ KAP Protocol Test Bench</h2>

        <!-- Register Mock Tool -->
        <div class="panel">
            <h3>1. Register Mock Tool</h3>
            <div class="grid">
                <input type="text" id="tool-ns" placeholder="Namespace (e.g. test)">
                <input type="text" id="tool-name" placeholder="Method (e.g. hello)">
            </div>
            <p style="font-size:14px; color:#666;">Description:</p>
            <input type="text" id="tool-desc" placeholder="What this tool does..." value="A test tool that says hello.">
            <button onclick="registerMock()" style="margin-top:10px;">Register with StudioBridge</button>
        </div>

        <!-- Execute AI Command -->
        <div class="panel">
            <h3>2. Emit AI Command Request</h3>
            <p style="font-size:14px; color:#666;">Simulate IRAB sending a command request:</p>
            <div class="grid">
                <input type="text" id="exec-method" placeholder="Method (e.g. isopixel.drawRect)">
                <input type="text" id="exec-params" placeholder='Params JSON (e.g. {"x": 10})' value='{}'>
            </div>
            <button onclick="emitRequest()" class="primary" style="margin-top:10px;">Emit ai:command:request</button>
        </div>

        <!-- Event Log -->
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>3. Global Event Log</h3>
                <button onclick="clearLog()" style="font-size:12px; padding:2px 8px;">Clear</button>
            </div>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script src="../../shared/EventBus.js"></script>
    <script type="module">
        import { StudioBridge } from '../studio-bridge.js';
        
        window.log = (msg, type = 'info') => {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        };

        const bridges = new Map();

        window.registerMock = () => {
            const ns = document.getElementById('tool-ns').value || 'test';
            const name = document.getElementById('tool-name').value || 'hello';
            const desc = document.getElementById('tool-desc').value;

            if (!bridges.has(ns)) {
                bridges.set(ns, new StudioBridge(ns, window.VortexEventBus));
            }

            const bridge = bridges.get(ns);
            bridge.register({
                name: name,
                description: desc,
                securityLevel: 'safe',
                parameters: { type: 'object', properties: {} },
                execute: async (args) => {
                    log(`MOCK EXECUTE: ${ns}.${name} called with ${JSON.stringify(args)}`, 'in');
                    return { message: `Hello from ${ns}.${name}!`, timestamp: Date.now() };
                }
            });
            log(`Registered ${ns}.${name} via StudioBridge`, 'out');
        };

        window.emitRequest = () => {
            const method = document.getElementById('exec-method').value;
            let params = {};
            try {
                params = JSON.parse(document.getElementById('exec-params').value);
            } catch(e) {
                alert("Invalid Params JSON");
                return;
            }

            const requestId = 'test_' + Math.random().toString(36).substr(2, 5);
            log(`Emitting request ${requestId} for ${method}`, 'out');
            
            window.VortexEventBus.emit('ai:command:request', {
                id: requestId,
                method: method,
                params: params
            });
        };

        window.clearLog = () => {
            document.getElementById('log').innerHTML = '';
        };

        // Listen for all protocol events
        const bus = window.VortexEventBus;
        const events = [
            'studio:tool:announce',
            'ai:tool:registered',
            'ai:command:request',
            'ai:command:result',
            'studio:action:execute',
            'studio:action:result',
            'ai:tool:success',
            'ai:tool:error'
        ];

        events.forEach(evt => {
            bus.on(evt, (data) => {
                log(`EVENT [${evt}]: ${JSON.stringify(data)}`, 'in');
            });
        });

        log("Test Bench Ready. VortexEventBus connected.");
    </script>
</body>
</html>
