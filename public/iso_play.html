<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedGlitch IsoPixel Game</title>
    <script src="/ai/error-watcher.js"></script>
    <link href="fonts/fonts.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            overflow: hidden;
            font-family: 'VT323', monospace;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-text {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ff0000;
            font-size: 20px;
            text-shadow: 1px 1px 0 #000;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-overlay">
        <div class="hud-text">ISOPIXEL PLAYTEST MODE</div>
    </div>

    <div id="loading-screen">
        <div class="loading-content">
            <h1>LOADING WORLD...</h1>
            <div id="loading-bar-container">
                <div id="loading-bar"></div>
            </div>
            <div id="loading-text">Initializing...</div>
        </div>
    </div>

    <style>
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        .loading-content {
            text-align: center;
            width: 300px;
        }
        .loading-content h1 {
            color: #ff0000;
            margin-bottom: 20px;
            font-size: 24px;
        }
        #loading-bar-container {
            width: 100%;
            height: 10px;
            background: #333;
            border: 2px solid #555;
            margin-bottom: 10px;
        }
        #loading-bar {
            width: 0%;
            height: 100%;
            background: #ff0000;
            transition: width 0.1s;
        }
        #loading-text {
            color: #888;
            font-size: 14px;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>

    <!-- Sprites (shared with 2D engine for caterpillar worm) -->
    <script src="engines/rpg-topdown/sprites.js"></script>
    
    <!-- Core Dependencies -->
    <script src="engines/iso-pixel/fxSystem.js"></script> <!-- Isometric FX System -->
    <script src="engines/iso-pixel/hudSystem.js"></script> <!-- HUD System -->
    <script src="engines/iso-pixel/shaderSystem.js"></script> <!-- WebGL Post-Processing -->
    <script src="strategies/IsoStrategy.js"></script>
    
    <!-- Engine -->
    <script src="engines/iso-pixel/renderer.js"></script>
    <script src="engines/iso-pixel/main.js"></script>
</body>
</html>
