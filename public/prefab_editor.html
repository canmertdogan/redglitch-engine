<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>redglitch PREFAB CONSTRUCTOR</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="pixel_scrollbars.css">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <style>
        :root {
            --bg-root: #050505;
            --bg-panel: #0a0a0f;
            --bg-header: #000000;
            --bg-canvas: #080808;
            --bg-input: #000000;
            --border: #333;
            --accent: #ff0000;
            --text-main: #e0e0e0;
            --text-muted: #888;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            margin: 0; padding: 0; background-color: var(--bg-root); color: var(--text-main);
            font-family: 'VT323', monospace; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; user-select: none; font-size: 18px;
            image-rendering: pixelated;
        }

        /* --- MENUBAR --- */
        #menubar {
            height: 32px; background: #000; display: flex; align-items: center; padding: 0 10px;
            font-size: 1.1rem; border-bottom: 1px solid var(--border);
            z-index: 3000; flex-shrink: 0;
        }
        .menu-item { padding: 0 15px; cursor: pointer; color: #888; text-transform: uppercase; height: 100%; display: flex; align-items: center; }
        .menu-item:hover { background: var(--accent); color: #000; }

        /* --- TOOLBAR --- */
        #toolbar {
            height: 44px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 10px; gap: 8px; flex-shrink: 0;
        }
        .tool-btn {
            background: #111; border: 1px solid #444; color: #aaa;
            width: 32px; height: 32px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 1rem; border-radius: 3px;
        }
        .tool-btn:hover { background: #222; border-color: var(--accent); color: var(--accent); }
        .tool-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .tool-sep { width: 1px; height: 20px; background: #333; margin: 0 5px; }

        input[type="text"], input[type="number"], select {
            background: #000; border: 1px solid #444; color: var(--accent);
            padding: 4px 8px; font-family: inherit; font-size: 1rem; outline: none; flex-grow: 1;
        }
        input:focus { border-color: var(--accent); }

        /* --- LAYOUT --- */
        #layout { flex-grow: 1; display: flex; overflow: hidden; position: relative; }

        /* --- PANELS --- */
        .panel { display: flex; flex-direction: column; background: var(--bg-panel); border-right: 1px solid var(--border); }
        .panel-header {
            height: 32px; background: #000; display: flex; align-items: center; padding: 0 10px;
            font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--border); 
            text-transform: uppercase; font-size: 1rem; cursor: pointer;
            justify-content: space-between; letter-spacing: 1px; flex-shrink: 0;
        }
        .panel-content { flex-grow: 1; overflow-y: auto; padding: 0; }

        /* --- SIDEBAR (COMPONENTS) --- */
        #sidebar { width: 280px; border-right: 1px solid var(--border); }
        
        .comp-item {
            padding: 8px 15px; cursor: pointer; color: #888; border-bottom: 1px solid #1a1a1a;
            display: flex; align-items: center; justify-content: space-between; font-size: 1.1rem;
        }
        .comp-item:hover { background: #111; color: #fff; }
        .comp-item i { width: 20px; text-align: center; }

        /* --- HIERARCHY --- */
        .active-comp {
            padding: 8px 10px; background: #111; border-bottom: 1px solid #222;
            cursor: pointer;
        }
        .active-comp.selected { border-left: 3px solid var(--accent); background: #1a1a1a; }
        .active-comp-header { display: flex; justify-content: space-between; align-items: center; color: #ccc; }
        .active-comp.selected .active-comp-header { color: var(--accent); }

        /* --- CENTER (CANVAS) --- */
        #center-panel { 
            flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-canvas);
            position: relative;
        }
        #canvas-wrapper {
            flex-grow: 1; overflow: hidden; display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px;
        }
        canvas { box-shadow: 0 0 30px #000; }
        
        /* --- INSPECTOR --- */
        #inspector { width: 320px; border-left: 1px solid var(--border); border-right: none; }
        
        .inspector-group { margin-bottom: 10px; border-bottom: 1px solid #222; }
        .inspector-label { 
            padding: 5px 10px; background: #000; color: #666; font-size: 0.9rem; text-transform: uppercase;
        }
        .inspector-fields { padding: 10px; }
        
        .field-row { display: flex; align-items: center; margin-bottom: 5px; gap: 10px; }
        .field-name { width: 40%; color: #aaa; font-size: 1rem; }
        .field-input-wrap { flex-grow: 1; }
        .f-val { width: 100%; }

        /* --- MODAL --- */
        #file-browser {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 5000; display: none;
            align-items: center; justify-content: center;
        }
        .modal-box {
            width: 500px; height: 400px; background: var(--bg-panel); border: 1px solid var(--accent);
            display: flex; flex-direction: column;
        }

    </style>
    <script src="theme.js"></script>
</head>
<body>

    <!-- MENUBAR -->
    <div id="menubar">
        <div style="color:var(--accent); font-weight:bold; margin-right:20px; letter-spacing:2px;">
            <i class="fas fa-cube"></i> PREFAB CONSTRUCTOR
        </div>
        <div class="menu-item" onclick="editor.showLoadDialog()">File</div>
        <div class="menu-item">View</div>
        <div class="menu-item">Help</div>
    </div>

    <!-- TOOLBAR -->
    <div id="toolbar">
        <button class="tool-btn" title="Save" onclick="editor.save()"><i class="fas fa-save"></i></button>
        <button class="tool-btn" title="Load" onclick="editor.showLoadDialog()"><i class="fas fa-folder-open"></i></button>
        <div class="tool-sep"></div>
        <button class="tool-btn" title="New" onclick="editor.createNew()"><i class="fas fa-file"></i></button>
        <div class="tool-sep"></div>
        <input type="text" id="prefab-name" placeholder="Entity_Name" style="max-width: 200px;">
        <div style="flex-grow:1"></div>
        <div id="status-msg" style="color:var(--accent); margin-right:10px; font-size:0.9rem;">READY</div>
    </div>

    <!-- LAYOUT -->
    <div id="layout">
        
        <!-- LEFT: HIERARCHY & LIBRARY -->
        <div id="sidebar" class="panel">
            
            <div class="panel-header">HIERARCHY <i class="fas fa-layer-group"></i></div>
            <div class="panel-content" id="hierarchy-list" style="height: 50%; border-bottom: 1px solid var(--border);">
                <!-- Active Components -->
            </div>

            <div class="panel-header" style="border-top:1px solid var(--border);">ADD COMPONENT <i class="fas fa-plus"></i></div>
            <div class="panel-content">
                <div class="comp-item" onclick="editor.addComponent('Transform')"><span><i class="fas fa-arrows-alt"></i> TRANSFORM</span></div>
                <div class="comp-item" onclick="editor.addComponent('Stats')"><span><i class="fas fa-heart"></i> STATS</span></div>
                <div class="comp-item" onclick="editor.addComponent('Collider')"><span><i class="fas fa-vector-square"></i> COLLIDER</span></div>
                <div class="comp-item" onclick="editor.addComponent('Script')"><span><i class="fas fa-code"></i> SCRIPT</span></div>
                <div class="comp-item" onclick="editor.addComponent('Light')"><span><i class="fas fa-sun"></i> LIGHT</span></div>
                <div class="comp-item" onclick="editor.addComponent('Loot')"><span><i class="fas fa-coins"></i> LOOT</span></div>
                <div class="comp-item" onclick="editor.addComponent('Particle')"><span><i class="fas fa-atom"></i> PARTICLE</span></div>
                <div class="comp-item" onclick="editor.addComponent('Prefab')"><span><i class="fas fa-cubes"></i> PREFAB</span></div>
            </div>
        </div>

        <!-- CENTER: VIEWPORT -->
        <div id="center-panel">
            <div id="canvas-wrapper">
                <canvas id="editor-canvas" width="600" height="600"></canvas>
            </div>
            <div class="viewport-overlay" style="position:absolute; bottom:5px; left:10px; color:#666; font-size:0.8rem; pointer-events:none;">
                [SCROLL] ZOOM | [ALT+DRAG] PAN
            </div>
        </div>

        <!-- RIGHT: INSPECTOR -->
        <div id="inspector" class="panel">
            <div class="panel-header">PROPERTIES <i class="fas fa-sliders-h"></i></div>
            <div id="inspector-content" class="panel-content">
                <div style="text-align:center; margin-top:50px; color:#444;">SELECT COMPONENT</div>
            </div>
        </div>

    </div>

    <!-- LOAD DIALOG -->
    <div id="file-browser">
        <div class="modal-box">
            <div class="panel-header">
                <span>OPEN PREFAB</span>
                <i class="fas fa-times" onclick="editor.hideLoadDialog()" style="cursor:pointer;"></i>
            </div>
            <div class="panel-content" id="file-list">
                <!-- File list -->
            </div>
        </div>
    </div>

    <!-- Integration System -->
    <script src="/shared/EventBus.js"></script>
    <script src="/shared/SharedProjectState.js"></script>
    <script src="/shared/AssetManager.js"></script>

    <script src="prefab_editor.js"></script>
</body>
</html>
