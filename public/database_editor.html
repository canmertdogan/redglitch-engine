<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>redglitch DATA TABLES</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <style>
        :root {
            --bg: #05080f;
            --panel: #0d1117;
            --accent: #f1c40f;
            --text: #cfd8dc;
            --border: #1f2937;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'VT323', monospace; font-size: 1.1rem;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        #header {
            height: 40px; background: #000; border-bottom: 2px solid var(--accent);
            display: flex; align-items: center; padding: 0 15px; justify-content: space-between;
        }

        #layout { flex-grow: 1; display: flex; overflow: hidden; }

        #sidebar {
            width: 200px; background: var(--panel); border-right: 2px solid var(--border);
            display: flex; flex-direction: column;
        }
        .table-tab {
            padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #161b22;
            color: #8fa0bc;
        }
        .table-tab:hover { background: #1c2331; color: #fff; }
        .table-tab.active { background: #1f2b42; color: var(--accent); border-left: 4px solid var(--accent); }

        #content { flex-grow: 1; display: flex; flex-direction: column; background: #08080c; }
        
        #grid-container { flex-grow: 1; overflow: auto; padding: 10px; }
        table { border-collapse: collapse; width: 100%; color: #fff; }
        th { background: #000; color: var(--accent); padding: 8px; border: 1px solid #333; text-align: left; }
        td { border: 1px solid #222; padding: 0; }
        td input {
            width: 100%; border: none; background: transparent; color: #eee;
            padding: 8px; font-family: inherit; font-size: inherit; outline: none;
        }
        td input:focus { background: #1f2b42; color: var(--accent); }

        #toolbar {
            height: 48px; background: #000; border-bottom: 2px solid var(--border);
            display: flex; align-items: center; padding: 0 10px; gap: 10px;
        }
        .btn {
            background: #222; border: 1px solid #444; color: #ccc; padding: 2px 10px;
            font-family: inherit; cursor: pointer;
        }
        .btn:hover { border-color: var(--accent); color: #fff; }
    </style>
</head>
<body>
    <div id="header">
        <div style="color:var(--accent); font-weight:bold;"><i class="fas fa-table"></i> DATA TABLE EDITOR</div>
        <div id="active-table-name" style="color:#555;">[SELECT TABLE]</div>
    </div>

    <div id="layout">
        <div id="sidebar">
            <div style="padding:10px; font-size:0.8rem; color:#444; text-transform:uppercase;">Tables</div>
            <div id="table-list">
                <div class="table-tab active" onclick="loadTable('items')">Items</div>
                <div class="table-tab" onclick="loadTable('enemies')">Enemies</div>
                <div class="table-tab" onclick="loadTable('npcs')">NPCs</div>
                <div class="table-tab" onclick="loadTable('skills')">Skills</div>
            </div>
            <div style="flex-grow:1"></div>
            <button class="btn" style="margin:10px;" onclick="alert('Future feature: Add Custom Table')">+ NEW TABLE</button>
        </div>

        <div id="content">
            <div id="grid-container">
                <table id="data-table">
                    <thead><tr id="table-head"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>

            <div id="toolbar">
                <button class="btn" onclick="addRow()"><i class="fas fa-plus"></i> ADD ROW</button>
                <button class="btn" onclick="saveTable()"><i class="fas fa-save"></i> SAVE CHANGES</button>
                <div style="flex-grow:1"></div>
                <div id="status" style="font-size:0.8rem; color:#444;">Ready</div>
            </div>
        </div>
    </div>

    <script>
        let currentTable = 'items';
        let tableData = [];

        async function loadTable(name) {
            currentTable = name;
            document.querySelectorAll('.table-tab').forEach(t => t.classList.remove('active'));
            // Find tab and activate
            document.getElementById('active-table-name').innerText = name.toUpperCase() + '.JSON';
            
            try {
                const res = await fetch(`/api/ide/read?file=dunyalar/definitions/${name}.json`);
                if (res.ok) {
                    tableData = await res.json();
                    renderTable();
                }
            } catch(e) { console.error(e); }
        }

        function renderTable() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            head.innerHTML = '';
            body.innerHTML = '';

            if (tableData.length === 0) {
                body.innerHTML = '<tr><td colspan="5" style="padding:20px; text-align:center; color:#444;">EMPTY TABLE</td></tr>';
                return;
            }

            const keys = Object.keys(tableData[0]);
            keys.forEach(k => {
                const th = document.createElement('th');
                th.innerText = k.toUpperCase();
                head.appendChild(th);
            });

            tableData.forEach((row, rowIdx) => {
                const tr = document.createElement('tr');
                keys.forEach(k => {
                    const td = document.createElement('td');
                    const input = document.createElement('input');
                    input.value = row[k];
                    input.oninput = (e) => { tableData[rowIdx][k] = e.target.value; };
                    td.appendChild(input);
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        function addRow() {
            if (tableData.length === 0) return;
            const newRow = { ...tableData[0] };
            Object.keys(newRow).forEach(k => newRow[k] = "");
            tableData.push(newRow);
            renderTable();
        }

        async function saveTable() {
            document.getElementById('status').innerText = "SAVING...";
            try {
                const res = await fetch('/api/ide/write', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        file: `dunyalar/definitions/${currentTable}.json`,
                        content: JSON.stringify(tableData, null, 2)
                    })
                });
                if(res.ok) {
                    document.getElementById('status').innerText = "SAVED";
                    setTimeout(() => document.getElementById('status').innerText = "Ready", 2000);
                }
            } catch(e) { alert("Save failed"); }
        }

        window.onload = () => loadTable('items');
    </script>
</body>
</html>
