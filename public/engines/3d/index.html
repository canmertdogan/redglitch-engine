<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedGlitch 3D — Runtime</title>
    <link href="/fonts/fonts.css" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { font-family: 'VT323', monospace; color: #ccc; }

        #game-container {
            position: fixed; inset: 0; z-index: 1;
        }
        #game-container canvas {
            display: block; width: 100% !important; height: 100% !important;
            image-rendering: pixelated;
        }

        /* ── Loading overlay ─────────────────────────────── */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: #0a0a0a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-title {
            font-size: 32px; color: #e74c3c;
            letter-spacing: 8px; margin-bottom: 24px;
            animation: pulse-glow 1.5s ease-in-out infinite;
        }
        .loading-bar-track {
            width: 300px; height: 4px;
            background: #222; border-radius: 2px; overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #e74c3c, #ff6b5b);
            transition: width 0.3s ease;
        }
        .loading-status {
            margin-top: 12px; font-size: 16px; color: #666;
            letter-spacing: 3px;
        }
        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 8px rgba(231,76,60,0.4); }
            50%      { text-shadow: 0 0 20px rgba(231,76,60,0.8); }
        }

        /* ── Pause overlay ───────────────────────────────── */
        #pause-overlay {
            position: fixed; inset: 0; z-index: 50;
            background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center;
            flex-direction: column;
        }
        #pause-overlay.active { display: flex; }
        .pause-title {
            font-size: 48px; color: #e74c3c;
            letter-spacing: 12px; margin-bottom: 20px;
        }
        .pause-btn {
            background: transparent; border: 1px solid #e74c3c;
            color: #e74c3c; font-family: 'VT323', monospace;
            font-size: 20px; padding: 8px 32px; margin: 6px;
            cursor: pointer; letter-spacing: 4px;
            transition: all 0.15s;
        }
        .pause-btn:hover {
            background: rgba(231,76,60,0.15); color: #fff;
        }

        /* ── Mode indicator ──────────────────────────────── */
        #mode-badge {
            position: fixed; top: 8px; left: 8px; z-index: 30;
            background: rgba(0,0,0,0.6); border: 1px solid #333;
            color: #e74c3c; font-size: 14px; padding: 4px 12px;
            letter-spacing: 3px; pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading-overlay">
        <div class="loading-title">REDGLITCH 3D</div>
        <div class="loading-bar-track">
            <div class="loading-bar-fill" id="loading-bar"></div>
        </div>
        <div class="loading-status" id="loading-status">INITIALIZING...</div>
    </div>

    <!-- Pause -->
    <div id="pause-overlay">
        <div class="pause-title">PAUSED</div>
        <button class="pause-btn" id="btn-resume">RESUME</button>
        <button class="pause-btn" id="btn-save">SAVE GAME</button>
        <button class="pause-btn" id="btn-quit">QUIT</button>
    </div>

    <!-- Mode badge -->
    <div id="mode-badge" id="mode-badge">---</div>

    <!-- Game container -->
    <div id="game-container"></div>

    <script type="module">
        import RedGlitch3DGame from './main.js';

        // ── URL params ────────────────────────────────────────────────────
        const params  = new URLSearchParams(window.location.search);
        const mode    = params.get('mode')    || params.get('engine') || 'fps-3d';
        const project = params.get('project') || '';
        const level   = params.get('level')   || '';
        const user    = params.get('user')    || 'player';
        const playtest = params.get('playtest') === '1' || params.get('playtest') === 'true';

        // ── DOM refs ──────────────────────────────────────────────────────
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingBar     = document.getElementById('loading-bar');
        const loadingStatus  = document.getElementById('loading-status');
        const pauseOverlay   = document.getElementById('pause-overlay');
        const modeBadge      = document.getElementById('mode-badge');

        // ── Loading progress ──────────────────────────────────────────────
        function setProgress(pct, msg) {
            loadingBar.style.width = `${pct}%`;
            loadingStatus.textContent = msg;
        }

        // ── Init ──────────────────────────────────────────────────────────
        const container = document.getElementById('game-container');
        const game = new RedGlitch3DGame(container, { mode });

        setProgress(10, 'LOADING ENGINE...');

        game.init(mode).then(async () => {
            setProgress(50, 'ENGINE READY');
            modeBadge.textContent = game.currentMode?.label || mode.toUpperCase();

            if (playtest) {
                setProgress(60, 'LOADING PLAYTEST DATA...');
                const playtestData = sessionStorage.getItem('redglitch_playtest_data')
                    || localStorage.getItem('temp_playtest_fps3d');
                if (playtestData) {
                    try {
                        const data = JSON.parse(playtestData);
                        await game.loadLevelFromData(data);
                        setProgress(90, 'PLAYTEST LEVEL LOADED');
                    } catch (e) {
                        console.error('[Playtest] Failed to parse playtest data:', e);
                        setProgress(0, 'ERROR: Invalid playtest data');
                    }
                } else {
                    console.warn('[Playtest] No playtest data found in storage');
                    setProgress(0, 'ERROR: No playtest data found');
                }
            } else if (project && level) {
                setProgress(60, 'LOADING LEVEL...');
                await game.loadProject(project, level);
                setProgress(90, 'LEVEL LOADED');
            }

            await game.login(user);
            setProgress(100, 'READY');

            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
            }, 400);
        }).catch(err => {
            console.error('[RedGlitch3D] Init failed:', err);
            setProgress(0, 'ERROR: ' + err.message);
        });

        // ── Pause system ──────────────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (game.isPaused) {
                    game.resume();
                    pauseOverlay.classList.remove('active');
                } else {
                    game.pause();
                    pauseOverlay.classList.add('active');
                }
            }
        });

        document.getElementById('btn-resume')?.addEventListener('click', () => {
            game.resume();
            pauseOverlay.classList.remove('active');
        });

        document.getElementById('btn-save')?.addEventListener('click', async () => {
            await game.saveGame().catch(e => console.error('Save failed:', e));
        });

        document.getElementById('btn-quit')?.addEventListener('click', () => {
            game.dispose();
            window.location.href = '/';
        });

        // ── Expose for debugging ──────────────────────────────────────────
        window.game = game;
    </script>
</body>
</html>
