<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer 3D Engine — Ketebe</title>
    <link href="../../fonts/fonts.css" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'VT323', monospace;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }

        /* ── Loading Screen ─────────────────────────────────── */
        #loading-screen {
            position: fixed; inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
            z-index: 10000;
        }
        #loading-screen.hidden { display: none; }

        #loading-title {
            color: #27ae60;
            font-size: 48px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        #loading-text {
            color: #888;
            font-size: 22px;
            letter-spacing: 3px;
        }

        #loading-bar-wrap {
            width: 320px;
            height: 6px;
            background: #111;
            border: 1px solid #333;
        }
        #loading-bar {
            height: 100%;
            background: #27ae60;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* ── Login / Click-to-start Screen ─────────────────── */
        #login-screen {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.97);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 5000;
        }
        #login-screen.hidden { display: none; }

        #login-box {
            background: #0a0a0a;
            border: 2px solid #27ae60;
            padding: 48px 56px;
            text-align: center;
            min-width: 360px;
        }

        #login-logo {
            color: #27ae60;
            font-size: 14px;
            letter-spacing: 6px;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        #login-title {
            color: #fff;
            font-size: 52px;
            letter-spacing: 4px;
            margin-bottom: 36px;
        }

        #username-input {
            background: #000;
            border: 2px solid #333;
            color: #27ae60;
            font-family: 'VT323', monospace;
            font-size: 26px;
            padding: 10px 20px;
            width: 100%;
            margin-bottom: 24px;
            text-transform: uppercase;
            text-align: center;
            outline: none;
            letter-spacing: 3px;
        }
        #username-input:focus { border-color: #27ae60; }

        #login-btn {
            background: #27ae60;
            border: none;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 28px;
            padding: 12px 48px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: background 0.1s, transform 0.1s;
            width: 100%;
        }
        #login-btn:hover  { background: #2ecc71; }
        #login-btn:active { transform: scale(0.97); }

        /* ── Game Container ─────────────────────────────────── */
        #game-container {
            width: 100%;
            height: 100vh;
            position: relative;
            display: none;
        }
        #game-container.active { display: block; }

        /* Three.js injects its own canvas — fill container */
        #game-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* ── HUD overlay ────────────────────────────────────── */
        #hud {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        #hud.hidden { display: none; }

        #hud-top-left {
            position: absolute;
            top: 16px; left: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .hud-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 26px;
            letter-spacing: 3px;
        }
        .hud-label { color: rgba(255,255,255,0.45); }
        .hud-value { color: #27ae60; }

        #hud-lives-icons {
            display: flex;
            gap: 6px;
        }
        .life-icon {
            width: 16px; height: 16px;
            background: #27ae60;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }
        .life-icon.lost { background: #333; }

        #hud-top-right {
            position: absolute;
            top: 16px; right: 16px;
            text-align: right;
            font-size: 22px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
        }

        /* ── Pause overlay ──────────────────────────────────── */
        #pause-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 28px;
            z-index: 2000;
        }
        #pause-overlay.hidden { display: none; }
        #pause-text {
            color: #27ae60;
            font-size: 64px;
            letter-spacing: 8px;
            animation: blink 1.2s step-end infinite;
        }
        #pause-hint {
            color: rgba(255,255,255,0.5);
            font-size: 24px;
            letter-spacing: 4px;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── Game Over overlay ──────────────────────────────── */
        #gameover-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 28px;
            z-index: 3000;
        }
        #gameover-overlay.hidden { display: none; }
        #gameover-text {
            color: #e74c3c;
            font-size: 72px;
            letter-spacing: 8px;
        }
        #gameover-sub {
            color: rgba(255,255,255,0.5);
            font-size: 26px;
            letter-spacing: 4px;
        }
        #gameover-retry {
            background: #27ae60;
            border: none;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 28px;
            padding: 12px 48px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        #gameover-retry:hover { background: #2ecc71; }

        /* ── Level Complete overlay ─────────────────────────── */
        #levelcomplete-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 3000;
        }
        #levelcomplete-overlay.hidden { display: none; }
        #levelcomplete-title {
            color: #f1c40f;
            font-size: 64px;
            letter-spacing: 6px;
        }
        #levelcomplete-stats {
            color: #fff;
            font-size: 28px;
            letter-spacing: 3px;
            text-align: center;
            line-height: 1.8;
        }

        /* ── Error banner ───────────────────────────────────── */
        #error-banner {
            position: fixed;
            top: 16px; left: 50%; transform: translateX(-50%);
            background: #c0392b;
            color: #fff;
            font-size: 18px;
            padding: 10px 28px;
            letter-spacing: 2px;
            z-index: 20000;
        }
        #error-banner.hidden { display: none; }

        /* ── Screen flash (damage / death / level complete) ─── */
        #screen-flash {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 9000;
            opacity: 0;
            transition: opacity 0.08s;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div id="loading-title">KETEBE</div>
        <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
        <div id="loading-text">LOADING PLATFORMER 3D ENGINE...</div>
    </div>

    <!-- Login / Start Screen -->
    <div id="login-screen" class="hidden">
        <div id="login-box">
            <div id="login-logo">KETEBE ENGINE</div>
            <div id="login-title">PLATFORMER 3D</div>
            <input type="text" id="username-input" placeholder="ENTER USERNAME" maxlength="16" autocomplete="off">
            <button id="login-btn" onclick="attemptLogin()">START GAME</button>
        </div>
    </div>

    <!-- Game Container (Three.js canvas injected here) -->
    <div id="game-container">

        <!-- HUD overlay -->
        <div id="hud" class="hidden">
            <div id="hud-top-left">
                <div class="hud-row">
                    <span class="hud-label">LIVES</span>
                    <div id="hud-lives-icons"></div>
                </div>
                <div class="hud-row">
                    <span class="hud-label">COINS</span>
                    <span class="hud-value" id="hud-coins">0</span>
                </div>
                <div class="hud-row">
                    <span class="hud-label">SCORE</span>
                    <span class="hud-value" id="hud-score">0</span>
                </div>
            </div>
            <div id="hud-top-right">
                <div id="hud-project"></div>
            </div>
        </div>
    </div>

    <!-- Pause overlay (ESC menu) -->
    <div id="pause-overlay" class="hidden">
        <div id="pause-text">PAUSED</div>
        <div id="pause-hint">ESC — RESUME &nbsp;|&nbsp; F5 — SAVE</div>
    </div>

    <!-- Game Over overlay -->
    <div id="gameover-overlay" class="hidden">
        <div id="gameover-text">GAME OVER</div>
        <div id="gameover-sub">ALL LIVES LOST</div>
        <button id="gameover-retry" onclick="retryFromCheckpoint()">RETRY</button>
    </div>

    <!-- Level Complete overlay -->
    <div id="levelcomplete-overlay" class="hidden">
        <div id="levelcomplete-title">STAGE CLEAR!</div>
        <div id="levelcomplete-stats"></div>
    </div>

    <!-- Error banner -->
    <div id="error-banner" class="hidden"></div>

    <!-- Screen flash (damage / invincibility / death / level complete) -->
    <div id="screen-flash"></div>

    <!-- Engine bootstrap (ES module) -->
    <script type="module">
        import Platformer3DGame from './main.js';

        // ── DOM refs ──────────────────────────────────────────────────────
        const loadingScreen       = document.getElementById('loading-screen');
        const loadingBar          = document.getElementById('loading-bar');
        const loadingText         = document.getElementById('loading-text');
        const loginScreen         = document.getElementById('login-screen');
        const gameContainer       = document.getElementById('game-container');
        const hud                 = document.getElementById('hud');
        const pauseOverlay        = document.getElementById('pause-overlay');
        const gameOverOverlay     = document.getElementById('gameover-overlay');
        const levelCompleteOverlay= document.getElementById('levelcomplete-overlay');
        const errorBanner         = document.getElementById('error-banner');
        const hudProject          = document.getElementById('hud-project');
        const hudCoins            = document.getElementById('hud-coins');
        const hudScore            = document.getElementById('hud-score');
        const hudLivesIcons       = document.getElementById('hud-lives-icons');
        const screenFlash         = document.getElementById('screen-flash');

        function setLoadingProgress(pct, text) {
            loadingBar.style.width = `${pct}%`;
            if (text) loadingText.textContent = text;
        }

        function showError(msg) {
            errorBanner.textContent = msg;
            errorBanner.classList.remove('hidden');
            setTimeout(() => errorBanner.classList.add('hidden'), 6000);
            console.error('[Platformer3D Launcher]', msg);
        }

        function flashScreen(color, duration = 200) {
            screenFlash.style.background = color;
            screenFlash.style.opacity = '0.55';
            setTimeout(() => { screenFlash.style.opacity = '0'; }, duration);
        }

        function updateLivesHUD(lives, max = 3) {
            hudLivesIcons.innerHTML = '';
            for (let i = 0; i < max; i++) {
                const icon = document.createElement('div');
                icon.className = 'life-icon' + (i < lives ? '' : ' lost');
                hudLivesIcons.appendChild(icon);
            }
        }

        // ── URL params ────────────────────────────────────────────────────
        const params      = new URLSearchParams(window.location.search);
        const levelId     = params.get('level');
        const project     = params.get('project');
        const isPlaytest  = params.get('playtest') === '1' || params.get('playtest') === 'true';
        const username    = params.get('username') || null;

        // ── Create game ───────────────────────────────────────────────────
        setLoadingProgress(10, 'CREATING ENGINE...');
        const game = new Platformer3DGame(gameContainer);

        game.onReady = () => {
            setLoadingProgress(80, 'ENGINE READY');
        };

        game.onLevelReady = (level) => {
            setLoadingProgress(100, `LEVEL: ${level?.name || level?.mapName || '?'}`);
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
                gameContainer.classList.add('active');
                hud.classList.remove('hidden');
                if (hudProject) hudProject.textContent = project || '';
                updateLivesHUD(game._lives);
            }, 300);
        };

        game.onLifeLost = (livesLeft) => {
            updateLivesHUD(livesLeft);
            flashScreen('#e74c3c', 400);
        };

        game.onGameOver = () => {
            hud.classList.add('hidden');
            gameOverOverlay.classList.remove('hidden');
            flashScreen('#000', 1000);
        };

        game.onLevelComplete = (stats) => {
            hud.classList.add('hidden');
            levelCompleteOverlay.classList.remove('hidden');
            flashScreen('#f1c40f', 600);
            document.getElementById('levelcomplete-stats').innerHTML =
                `COINS: ${stats.coins ?? 0}<br>SCORE: ${stats.score ?? 0}`;
        };

        // ── Init ──────────────────────────────────────────────────────────
        setLoadingProgress(20, 'INITIALISING SYSTEMS...');

        game.init().then(async () => {
            setLoadingProgress(50, 'SYSTEMS ONLINE');

            if (isPlaytest) {
                const raw = localStorage.getItem('temp_playtest_platformer3d');
                if (!raw) { showError('No playtest data in localStorage'); return; }
                try {
                    const levelData = JSON.parse(raw);
                    game.username = username || 'TEST_USER';
                    setLoadingProgress(70, 'LOADING PLAYTEST LEVEL...');
                    await game.loadLevelFromData(levelData);
                    game._startLoop();
                } catch (e) {
                    showError('Playtest load failed: ' + e.message);
                }

            } else if (levelId && project) {
                game.username       = username || 'PLAYER';
                game.currentProject = project;
                setLoadingProgress(70, `LOADING ${project.toUpperCase()}...`);
                try {
                    await game.loadProject(project, levelId);
                    game._startLoop();
                } catch (e) {
                    showError('Level load failed: ' + e.message);
                }

            } else {
                setLoadingProgress(100, 'READY');
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                    loginScreen.classList.remove('hidden');
                }, 400);
            }

        }).catch(e => {
            showError('Init failed: ' + e.message);
            console.error(e);
        });

        // ── Login ─────────────────────────────────────────────────────────
        window.attemptLogin = function() {
            const input = document.getElementById('username-input');
            const name  = (input?.value || '').trim().toUpperCase();
            if (!name) return;

            loginScreen.classList.add('hidden');
            loadingScreen.classList.remove('hidden');
            setLoadingProgress(60, 'STARTING...');

            game.login(name).then(() => {
                setLoadingProgress(100, 'WELCOME ' + name);
                updateLivesHUD(game._lives);
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                    gameContainer.classList.add('active');
                    hud.classList.remove('hidden');
                    if (hudProject) hudProject.textContent = '';
                    game._startLoop();
                }, 400);
            }).catch(e => showError('Login failed: ' + e.message));
        };

        document.getElementById('username-input')?.addEventListener('keypress', e => {
            if (e.key === 'Enter') window.attemptLogin();
        });

        // ── Retry from checkpoint (Game Over screen) ──────────────────────
        window.retryFromCheckpoint = function() {
            gameOverOverlay.classList.add('hidden');
            game._lives    = 3;
            game._respawning = false;
            game._respawn?.();
            game.isRunning = true;
            hud.classList.remove('hidden');
            updateLivesHUD(game._lives);
            game._startLoop();
        };

        // ── HUD tick — update coin/score from game state ──────────────────
        setInterval(() => {
            if (game.isRunning && !game.isPaused) {
                if (hudCoins) hudCoins.textContent = game._coins;
                if (hudScore) hudScore.textContent = game._score;
            }
        }, 200);

        // ── Keyboard shortcuts ────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                game.toggle();
                pauseOverlay.classList.toggle('hidden', !game.isPaused);
            }
            if (e.key === 'F5') {
                e.preventDefault();
                game.saveGame().catch(err => showError('Save failed: ' + err.message));
            }
        });

        // ── Expose for debugging ──────────────────────────────────────────
        window.game = game;
    </script>
</body>
</html>
