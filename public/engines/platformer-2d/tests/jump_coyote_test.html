<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Jump Coyote/Buffer Test</title>
  <style>body{font-family:monospace;background:#111;color:#fff;padding:10px}pre{white-space:pre-wrap}</style>
</head>
<body>
<pre id="log"></pre>

<!-- Load engine files if present -->
<script src="../PlatformerConfig.js"></script>
<script src="../Player.js"></script>
<script src="../PhysicsSystem.js"></script>

<script>
const out = document.getElementById('log');
function L(...args){ console.log(...args); out.textContent += args.join(' ') + "\n" }

// Fallback minimal config/classes if engine files are not present
const cfg = window.PlatformerConfig || { coyoteTime: 0.12, jumpBufferTime: 0.12, gravity: 1200, jumpVelocity: -420 };

class PlayerFallback {
  constructor(x=0){
    this.x = x; this.y = 0; this.vy = 0;
    this.onGround = true; this.coyoteTimer = cfg.coyoteTime; this.jumpBufferTimer = 0;
    this.speed = 80; this.jumpExecuted = false;
  }
  update(dt, input){
    // move
    if(input.moveRight) this.x += this.speed * dt;
    // jump buffering
    if(input.jump) this.jumpBufferTimer = cfg.jumpBufferTime;
    else this.jumpBufferTimer = Math.max(0, this.jumpBufferTimer - dt);
    // coyote timer decremented here (set by physics when leaving ground)
    if(!this.onGround) this.coyoteTimer = Math.max(0, this.coyoteTimer - dt);

    // attempt jump
    if((this.onGround || this.coyoteTimer > 0) && this.jumpBufferTimer > 0){
      this.vy = cfg.jumpVelocity; this.jumpBufferTimer = 0; this.jumpExecuted = true;
    } else {
      this.jumpExecuted = false;
    }
  }
}

// Use provided Player/PhysicsSystem if they exist, else fallbacks
const PlayerClass = window.Player || PlayerFallback;

// Minimal physics system fallback
const PhysicsFallback = {
  apply(player, dt, platform){
    // gravity
    player.vy += cfg.gravity * dt;
    player.y += player.vy * dt;
    // ground check: platform at y=0
    const onPlat = (player.x >= platform.x && player.x <= platform.x + platform.w);
    const wasOn = player.onGround;
    if(onPlat && player.y >= 0){
      player.onGround = true; player.y = 0; player.vy = 0; player.coyoteTimer = cfg.coyoteTime;
    } else {
      if(wasOn && !onPlat){
        // just stepped off
        player.onGround = false; player.coyoteTimer = cfg.coyoteTime;
      } else {
        player.onGround = false;
      }
    }
  }
};
const Physics = window.PhysicsSystem || PhysicsFallback;

// Setup platform and player
const platform = { x: 0, w: 50 };
const dt = 1/60;
const player = new PlayerClass(platform.x + platform.w - 1);
player.y = 0; player.onGround = true; player.coyoteTimer = cfg.coyoteTime;

L('Config:', JSON.stringify(cfg));
L('Platform:', JSON.stringify(platform));
L('Initial player x,y onGround:', player.x, player.y, player.onGround);

function logFrame(i){
  L('Frame', i, 'coyoteTimer=', player.coyoteTimer.toFixed(3),
    'jumpBuffer=', player.jumpBufferTimer.toFixed(3),
    'onGround=', player.onGround, 'vy=', player.vy.toFixed(2), 'jumpExecuted=', player.jumpExecuted);
}

// Simulate frames
// Frame 0: standing
logFrame(0);

// Frame 1: step off edge (move right), do NOT press jump yet
let input = { moveRight: true, jump: false };
player.update(dt, input); // player logic
Physics.apply(player, dt, platform); // physics
logFrame(1);

// Frame 2: immediately press jump after stepping off
input = { moveRight: false, jump: true };
player.update(dt, input);
Physics.apply(player, dt, platform);
logFrame(2);

// Frame 3: continue simulation a couple frames to observe
input = { moveRight: false, jump: false };
player.update(dt, input); Physics.apply(player, dt, platform); logFrame(3);
player.update(dt, input); Physics.apply(player, dt, platform); logFrame(4);

// Final assertion style log
if(player.jumpExecuted) L('\nRESULT: Jump executed during coyote window.');
else L('\nRESULT: Jump did NOT execute (coyote failed).');
</script>
</body>
</html>
