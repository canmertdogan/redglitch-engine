<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kai UI Smoke Test</title>
    <link rel="stylesheet" href="css/kai-theme.css">
    <style>
        body { background-color: #333; color: white; padding: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <!-- The assistant panel content will be loaded here -->
    
    <!-- Load AI Scripts in order -->
    <script src="ai/irab-personality.js"></script>
    <script src="ai/cerebras-adapter.js"></script>
    <script type="module" src="ai/ketebe-ai.js"></script>
    
    <!-- Wait for module to load KetebeAIInstance -->
    <script>
        function checkCore() {
            if (window.KetebeAIInstance) {
                console.log("SMOKE TEST: Core Loaded");
                loadNext();
            } else {
                setTimeout(checkCore, 100);
            }
        }
        
        function loadNext() {
            const s1 = document.createElement('script');
            s1.src = "ai/ketebe-ai-assistant.js";
            s1.onload = () => {
                console.log("SMOKE TEST: Assistant Layer Loaded");
                const s2 = document.createElement('script');
                s2.src = "ai/ui/assistant-panel.js";
                s2.onload = finalCheck;
                document.body.appendChild(s2);
            };
            document.body.appendChild(s1);
        }

        setTimeout(checkCore, 500);

        function finalCheck() {
            console.log("SMOKE TEST: UI Controller Loaded");
            if (window.AIChatUI) {
                document.body.innerHTML += "<h1 style='color:green'>TEST PASSED: AIChatUI Ready</h1>";
            } else {
                document.body.innerHTML += "<h1 style='color:red'>TEST FAILED: AIChatUI Missing</h1>";
            }
        }
    </script>
</body>
</html>
