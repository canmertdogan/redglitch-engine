<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CAMPAIGN MODE - ketebe ENGINE</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="pixel_scrollbars.css">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="transitions.css">
    <style>
        :root {
            --bg-root: #050505;
            --bg-panel: #0a0a0f;
            --bg-card: #111116;
            --bg-card-hover: #1a1a20;
            --border: #333;
            --border-active: #f1c40f;
            --accent: #f1c40f;
            --accent-hover: #ffd700;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --text-dim: #555;
            --success: #2ecc71;
            --danger: #e74c3c;
            --progress-bg: #222;
            --progress-fill: #f1c40f;
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-root);
            color: var(--text-main);
            font-family: 'VT323', monospace;
            font-size: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            image-rendering: pixelated;
        }

        /* Header */
        #header {
            height: 60px;
            background: #000;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            flex-shrink: 0;
        }

        #header h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            letter-spacing: 3px;
        }

        #back-btn {
            background: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-muted);
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        #back-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* Main Content */
        #main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
        }

        #slots-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        /* Slot Card */
        .slot-card {
            background: var(--bg-card);
            border: 3px solid var(--border);
            padding: 0;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            min-height: 200px;
        }

        .slot-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
            transform: translateY(-5px);
        }

        .slot-card.empty {
            border-style: dashed;
        }

        .slot-card.complete::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2rem;
            color: var(--success);
            text-shadow: 0 0 10px var(--success);
        }

        /* Slot Header */
        .slot-header {
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slot-number {
            font-size: 1.5rem;
            color: var(--accent);
            font-weight: bold;
        }

        .slot-status {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Slot Body */
        .slot-body {
            padding: 20px;
        }

        .campaign-name {
            font-size: 1.8rem;
            color: var(--text-main);
            margin: 0 0 10px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .campaign-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
        }

        .info-row i {
            width: 20px;
            text-align: center;
            color: var(--accent);
        }

        /* Progress Bar */
        .progress-container {
            margin: 15px 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: var(--progress-bg);
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--progress-fill);
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 100%
            );
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Empty Slot */
        .empty-slot-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            min-height: 160px;
        }

        .empty-icon {
            font-size: 3rem;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .empty-text {
            font-size: 1.4rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* Action Buttons */
        .slot-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            transition: all 0.3s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 15px var(--accent);
        }

        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 0 15px var(--danger);
        }

        .btn-info {
            border-color: var(--text-muted);
            color: var(--text-muted);
            flex: 0 0 auto;
            padding: 10px;
        }

        .btn-info:hover {
            border-color: #3498db;
            color: #3498db;
            box-shadow: 0 0 10px #3498db;
        }

        /* Loading State */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #loading-overlay.active {
            display: flex;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            font-size: 3rem;
            color: var(--accent);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.5rem;
            color: var(--text-main);
        }

        /* Delete Confirmation Modal */
        #delete-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        #delete-modal.active {
            display: flex;
        }

        /* Generic Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
            padding: 5px;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .modal-body {
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .modal-body::-webkit-scrollbar {
            width: 8px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 12px;
            font-size: 0.9rem;
        }

        .info-label {
            color: var(--accent);
            font-weight: bold;
        }

        .info-value {
            color: var(--text-main);
        }

        .copy-target-btn {
            width: 100%;
            padding: 15px;
            background: rgba(46, 204, 113, 0.1);
            border: 2px solid var(--accent);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Press Start 2P', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-target-btn:hover {
            background: rgba(46, 204, 113, 0.2);
            transform: translateX(5px);
        }

        .copy-target-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .copy-target-btn:disabled:hover {
            transform: none;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--accent), #27ae60);
            color: #fff;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #27ae60, var(--accent));
        }

        .modal-content {
            background: var(--bg-card);
            border: 3px solid var(--danger);
            padding: 30px;
            max-width: 500px;
            text-align: center;
        }

        .modal-title {
            font-size: 2rem;
            color: var(--danger);
            margin: 0 0 20px 0;
        }

        .modal-text {
            font-size: 1.3rem;
            color: var(--text-main);
            margin-bottom: 30px;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #slots-container {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 10px;
            }

            #header h1 {
                font-size: 1.5rem;
            }

            .slot-card {
                min-height: 180px;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slot-card {
            animation: fadeInUp 0.5s ease backwards;
        }

        .slot-card:nth-child(1) { animation-delay: 0.1s; }
        .slot-card:nth-child(2) { animation-delay: 0.2s; }
        .slot-card:nth-child(3) { animation-delay: 0.3s; }
        .slot-card:nth-child(4) { animation-delay: 0.4s; }
        .slot-card:nth-child(5) { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header">
        <h1><i class="fas fa-gamepad"></i> CAMPAIGN MODE</h1>
        <button id="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> BACK TO MENU
        </button>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <div id="slots-container">
            <!-- Slots will be dynamically loaded here -->
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"><i class="fas fa-sync-alt"></i></div>
            <div class="loading-text">LOADING SLOTS...</div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal">
        <div class="modal-content">
            <h2 class="modal-title"><i class="fas fa-exclamation-triangle"></i> WARNING</h2>
            <p class="modal-text">
                Are you sure you want to delete this save slot?<br>
                <strong id="delete-slot-name">Campaign Name</strong><br>
                This action cannot be undone!
            </p>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="confirmDelete()" style="flex: 1;">
                    <i class="fas fa-trash"></i> DELETE
                </button>
                <button class="btn btn-primary" onclick="cancelDelete()" style="flex: 1;">
                    <i class="fas fa-times"></i> CANCEL
                </button>
            </div>
        </div>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title"><i class="fas fa-info-circle"></i> SLOT DETAILS</h2>
                <button class="modal-close" onclick="closeInfoModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="info-modal-body">
                <!-- Content will be populated dynamically -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="closeInfoModal()" style="flex: 1;">
                    <i class="fas fa-check"></i> CLOSE
                </button>
            </div>
        </div>
    </div>

    <!-- Copy Slot Modal -->
    <div id="copy-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title"><i class="fas fa-copy"></i> COPY SLOT</h2>
                <button class="modal-close" onclick="closeCopyModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="modal-text">
                    Copy <strong id="copy-source-name">Campaign Name</strong> to another slot:
                </p>
                <div id="copy-target-slots" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                    <!-- Target slots will be populated here -->
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="closeCopyModal()" style="flex: 1;">
                    <i class="fas fa-times"></i> CANCEL
                </button>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="export-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title"><i class="fas fa-file-export"></i> EXPORT SLOT</h2>
                <button class="modal-close" onclick="closeExportModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="modal-text">
                    Export <strong id="export-slot-name">Campaign Name</strong> as JSON file:
                </p>
                <div style="margin-top: 15px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--accent);">
                        <i class="fas fa-file-signature"></i> Filename:
                    </label>
                    <input type="text" 
                           id="export-filename" 
                           placeholder="my-save.json"
                           style="width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 2px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Courier New', monospace; font-size: 0.9rem;">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-success" onclick="confirmExport()" style="flex: 1;">
                    <i class="fas fa-download"></i> EXPORT
                </button>
                <button class="btn btn-primary" onclick="closeExportModal()" style="flex: 1;">
                    <i class="fas fa-times"></i> CANCEL
                </button>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="import-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title"><i class="fas fa-file-import"></i> IMPORT SLOT</h2>
                <button class="modal-close" onclick="closeImportModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="modal-text">
                    Import a save file to <strong>SLOT <span id="import-slot-number">1</span></strong>:
                </p>
                <div style="margin-top: 15px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--accent);">
                        <i class="fas fa-file-upload"></i> Select JSON file:
                    </label>
                    <input type="file" 
                           id="import-file-input" 
                           accept=".json"
                           style="width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 2px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Press Start 2P', monospace; font-size: 0.7rem; cursor: pointer;">
                </div>
                <div id="import-preview" style="margin-top: 15px; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 2px solid var(--border); border-radius: 8px; display: none;">
                    <div style="color: var(--accent); margin-bottom: 8px;">
                        <i class="fas fa-eye"></i> PREVIEW:
                    </div>
                    <div id="import-preview-content" style="font-size: 0.8rem; color: var(--text-muted);">
                        <!-- Preview content -->
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-success" onclick="confirmImport()" id="confirm-import-btn" disabled style="flex: 1;">
                    <i class="fas fa-upload"></i> IMPORT
                </button>
                <button class="btn btn-primary" onclick="closeImportModal()" style="flex: 1;">
                    <i class="fas fa-times"></i> CANCEL
                </button>
            </div>
        </div>
    </div>

    <script src="js/smooth-nav.js"></script>
    <script src="js/CampaignSlot.js"></script>
    <script src="js/SlotManager.js"></script>
    <script src="slot_selection.js"></script>
</body>
</html>
