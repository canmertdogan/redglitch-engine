<!DOCTYPE html>
<html>
<head>
    <title>Example Editor with Integration</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background: #1e1e1e; 
            color: #fff; 
            padding: 20px; 
        }
        .editor-panel {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 15px;
            margin: 10px 0;
        }
        .form-group {
            margin: 10px 0;
        }
        label {
            display: inline-block;
            width: 120px;
            color: #ccc;
        }
        input, select, textarea {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            padding: 8px;
            border-radius: 3px;
            width: 200px;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #0052a3; }
        .status-bar {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #aaa;
        }
        .event-log {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            height: 200px;
            overflow-y: auto;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <h1>🎮 Example Character Editor</h1>
    <p>Demonstrates the new integration system with EventBus, SharedProjectState, and AssetManager</p>

    <div class="editor-panel">
        <h2>Character Properties</h2>
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="char-name" value="Hero">
        </div>
        <div class="form-group">
            <label>Level:</label>
            <input type="number" id="char-level" value="1" min="1" max="99">
        </div>
        <div class="form-group">
            <label>HP:</label>
            <input type="number" id="char-hp" value="100" min="1">
        </div>
        <div class="form-group">
            <label>Class:</label>
            <select id="char-class">
                <option value="warrior">Warrior</option>
                <option value="mage">Mage</option>
                <option value="rogue">Rogue</option>
            </select>
        </div>
        <div class="form-group">
            <label>Avatar:</label>
            <select id="char-avatar">
                <option value="">Loading assets...</option>
            </select>
        </div>
        
        <button onclick="saveCharacter()">Save Character</button>
        <button onclick="loadCharacter()">Load Character</button>
        <button onclick="broadcastUpdate()">Broadcast Update</button>
    </div>

    <div class="editor-panel">
        <h2>Integration Status</h2>
        <div class="status-bar">
            <div id="connection-status">Connecting...</div>
            <div id="sync-status">Not synced</div>
        </div>
    </div>

    <div class="editor-panel">
        <h2>Event Log</h2>
        <div class="event-log" id="event-log"></div>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <!-- Load the integration components -->
    <script src="/shared/EventBus.js"></script>
    <script src="/shared/SharedProjectState.js"></script>
    <script src="/shared/AssetManager.js"></script>

    <script>
        let eventBus, projectState, assetManager;
        let currentCharacter = {};

        async function init() {
            try {
                // Initialize integration components
                eventBus = window.KetebeEventBus;
                projectState = new SharedProjectState('Default Project');
                assetManager = new AssetManager();
                
                // Setup event listeners
                setupEventListeners();
                
                // Load available assets
                await loadAvailableAssets();
                
                // Load character data from shared state
                loadCharacterFromState();
                
                updateStatus('connection-status', '✓ Integration systems connected');
                log('Character editor initialized with integration systems');
                
            } catch (error) {
                console.error('Initialization failed:', error);
                updateStatus('connection-status', '✗ Integration failed: ' + error.message);
                log('ERROR: ' + error.message);
            }
        }

        function setupEventListeners() {
            // Listen for WebSocket connection
            eventBus.on('system:websocket:connected', () => {
                updateStatus('connection-status', '✓ WebSocket connected');
                log('WebSocket connection established');
            });
            
            eventBus.on('system:websocket:disconnected', () => {
                updateStatus('connection-status', '⚠ WebSocket disconnected');
                log('WebSocket connection lost');
            });
            
            // Listen for character updates from other editors
            eventBus.on('character:updated', (event) => {
                if (event.data.source !== 'character-editor') {
                    log(`Character update from ${event.data.source}: ${JSON.stringify(event.data.changes)}`);
                    // Update UI if it's for our character
                    if (event.data.characterId === getCurrentCharacterId()) {
                        updateUIFromData(event.data.changes);
                    }
                }
            });
            
            // Listen for quest system requests
            eventBus.on('quest:character-info-request', (event) => {
                const characterData = getCurrentCharacterData();
                eventBus.emit('character:info-response', {
                    requestId: event.data.requestId,
                    characterId: getCurrentCharacterId(),
                    character: characterData
                });
                log(`Provided character info to quest system`);
            });
            
            // Listen for asset changes
            eventBus.on('asset:*', (event) => {
                if (event.type === 'asset:loaded' && event.data.asset.type === 'image') {
                    log(`Asset loaded: ${event.data.asset.name}`);
                }
            });
            
            // Auto-save on character changes
            const inputs = ['char-name', 'char-level', 'char-hp', 'char-class', 'char-avatar'];
            inputs.forEach(id => {
                document.getElementById(id).addEventListener('input', () => {
                    saveToSharedState();
                    updateStatus('sync-status', '↻ Auto-saved');
                });
            });
        }

        async function loadAvailableAssets() {
            try {
                const response = await fetch('/api/assets');
                const data = await response.json();
                
                // Filter for character avatars (images)
                const avatars = data.assets.filter(asset => 
                    asset.type === 'image' && 
                    (asset.name.includes('character') || asset.name.includes('avatar') || asset.name.includes('hero'))
                );
                
                // Populate avatar dropdown
                const select = document.getElementById('char-avatar');
                select.innerHTML = '<option value="">No avatar</option>';
                
                avatars.forEach(asset => {
                    const option = document.createElement('option');
                    option.value = asset.id;
                    option.textContent = asset.name;
                    select.appendChild(option);
                });
                
                log(`Loaded ${avatars.length} avatar assets`);
                
            } catch (error) {
                log('ERROR: Failed to load assets: ' + error.message);
            }
        }

        function saveCharacter() {
            const characterData = getCurrentCharacterData();
            
            // Save to shared project state
            projectState.set(`characters.${getCurrentCharacterId()}`, characterData);
            
            log(`Character saved: ${characterData.name} (Level ${characterData.level})`);
            updateStatus('sync-status', '✓ Saved');
            
            // Broadcast the update
            broadcastUpdate();
        }

        function loadCharacter() {
            const characterData = projectState.get(`characters.${getCurrentCharacterId()}`);
            
            if (characterData) {
                updateUIFromData(characterData);
                log(`Character loaded: ${characterData.name}`);
            } else {
                log('No saved character data found');
            }
        }

        function loadCharacterFromState() {
            // Auto-load on startup
            loadCharacter();
        }

        function saveToSharedState() {
            // Auto-save functionality
            setTimeout(() => {
                const characterData = getCurrentCharacterData();
                projectState.set(`characters.${getCurrentCharacterId()}`, characterData, { silent: true });
            }, 500);
        }

        function broadcastUpdate() {
            const characterData = getCurrentCharacterData();
            
            eventBus.emit('character:updated', {
                source: 'character-editor',
                characterId: getCurrentCharacterId(),
                character: characterData,
                changes: characterData,
                timestamp: Date.now()
            });
            
            log(`Broadcasted character update to other editors`);
        }

        function getCurrentCharacterData() {
            return {
                name: document.getElementById('char-name').value,
                level: parseInt(document.getElementById('char-level').value),
                hp: parseInt(document.getElementById('char-hp').value),
                class: document.getElementById('char-class').value,
                avatar: document.getElementById('char-avatar').value
            };
        }

        function getCurrentCharacterId() {
            return document.getElementById('char-name').value.toLowerCase().replace(/[^a-z0-9]/g, '') || 'hero';
        }

        function updateUIFromData(characterData) {
            if (characterData.name !== undefined) {
                document.getElementById('char-name').value = characterData.name;
            }
            if (characterData.level !== undefined) {
                document.getElementById('char-level').value = characterData.level;
            }
            if (characterData.hp !== undefined) {
                document.getElementById('char-hp').value = characterData.hp;
            }
            if (characterData.class !== undefined) {
                document.getElementById('char-class').value = characterData.class;
            }
            if (characterData.avatar !== undefined) {
                document.getElementById('char-avatar').value = characterData.avatar;
            }
        }

        function updateStatus(elementId, message) {
            document.getElementById(elementId).textContent = message;
        }

        function log(message) {
            const logElement = document.getElementById('event-log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.textContent = `[${timestamp}] ${message}`;
            logElement.appendChild(entry);
            logElement.scrollTop = logElement.scrollHeight;
        }

        function clearLog() {
            document.getElementById('event-log').innerHTML = '';
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
