<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ketebe PIXEL STUDIO</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="pixel_scrollbars.css">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <style>
        :root {
            --bg-root: #050505;
            --bg-panel: #0a0a0f;
            --bg-header: #000000;
            --bg-canvas: #080808;
            --bg-input: #000000;
            --border: #333;
            --accent: #f1c40f;
            --text-main: #e0e0e0;
            --text-muted: #888;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            margin: 0; padding: 0; background-color: var(--bg-root); color: var(--text-main);
            font-family: 'VT323', monospace; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; user-select: none; font-size: 18px;
            image-rendering: pixelated;
        }

        /* --- MENUBAR --- */
        #menubar {
            height: 32px; background: #000; display: flex; align-items: center; padding: 0 10px;
            font-size: 1.1rem; border-bottom: 1px solid var(--border);
            z-index: 3000; flex-shrink: 0;
        }
        .menu-item { padding: 0 15px; cursor: pointer; color: #888; text-transform: uppercase; height: 100%; display: flex; align-items: center; }
        .menu-item:hover { background: var(--accent); color: #000; }

        /* --- TOOLBAR --- */
        #toolbar {
            height: 44px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 10px; gap: 8px; flex-shrink: 0;
        }
        .tool-group { display: flex; gap: 4px; padding-right: 10px; margin-right: 10px; border-right: 1px solid #333; }
        .tool-group:last-child { border-right: none; }

        .tool-btn {
            background: #111; border: 1px solid #444; color: #aaa;
            width: 32px; height: 32px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 1rem; border-radius: 3px;
        }
        .tool-btn:hover { background: #222; border-color: var(--accent); color: var(--accent); }
        .tool-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-text { width: auto; padding: 0 10px; font-weight: bold; }

        input[type="text"], input[type="number"], select {
            background: #000; border: 1px solid #444; color: var(--accent);
            padding: 4px; font-family: inherit; font-size: 1rem; outline: none;
        }
        input:focus { border-color: var(--accent); }

        /* --- LAYOUT --- */
        #layout { flex-grow: 1; display: flex; overflow: hidden; position: relative; }

        /* --- PANELS --- */
        .panel { display: flex; flex-direction: column; background: var(--bg-panel); border-right: 1px solid var(--border); }
        .panel-header {
            height: 32px; background: #000; display: flex; align-items: center; padding: 0 10px;
            font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--border); 
            text-transform: uppercase; font-size: 1rem; justify-content: space-between; letter-spacing: 1px; flex-shrink: 0;
        }
        .panel-content { padding: 10px; overflow-y: auto; flex-grow: 1; }

        /* --- SIDEBAR --- */
        #sidebar { width: 280px; border-right: 1px solid var(--border); }
        #inspector { width: 300px; border-left: 1px solid var(--border); border-right: none; }

        /* --- CENTER --- */
        #center-panel { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #viewport {
            flex-grow: 1; background: #080808; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        #drawing-canvas { box-shadow: 0 0 0 1px #333, 0 0 20px #000; image-rendering: pixelated; }

        /* --- PALETTE --- */
        #palette-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; }
        .swatch { aspect-ratio: 1; border: 1px solid #000; cursor: pointer; }
        .swatch:hover { transform: scale(1.2); border-color: #fff; z-index: 10; }

        /* --- LAYERS --- */
        .layer-item {
            display: flex; align-items: center; gap: 8px; padding: 6px; background: #111; 
            border: 1px solid #333; margin-bottom: 2px; cursor: pointer;
        }
        .layer-item.active { border-left: 3px solid var(--accent); background: #1a1a1a; }
        .layer-item:hover { background: #222; }

        /* --- TIMELINE (BOTTOM) --- */
        #timeline { height: 120px; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; flex-direction: column; }
        #timeline-header {
            height: 28px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 5px; gap: 5px;
        }
        #frames-strip { flex-grow: 1; overflow-x: auto; display: flex; gap: 5px; padding: 10px; background: #111; }
        
        .frame-thumb {
            min-width: 60px; height: 60px; background: #000; border: 1px solid #444; 
            position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        .frame-thumb.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .frame-thumb canvas { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
        .frame-num { position: absolute; top: 0; left: 0; background: var(--accent); color: #000; font-size: 0.7rem; padding: 0 3px; }

        /* --- PREVIEW --- */
        #preview-container {
            width: 100%; aspect-ratio: 1; background: #000; border: 1px solid #333; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            background-image: radial-gradient(#222 1px, transparent 1px); background-size: 10px 10px;
        }
        #preview-canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

        /* Color Picker */
        #color-picker-advanced { display: flex; flex-direction: column; gap: 5px; padding-bottom: 10px; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .cp-row { display: flex; gap: 5px; height: 120px; }
        #cp-sv-box { flex-grow: 1; cursor: crosshair; border: 1px solid #555; }
        #cp-hue-strip { width: 20px; cursor: ns-resize; border: 1px solid #555; }
        #cp-current-color { width: 100%; height: 24px; border: 1px solid #fff; margin-top: 5px; }

    </style>
    <script src="theme.js"></script>
</head>
<body>

    <div id="menubar">
        <div style="color:var(--accent); font-weight:bold; margin-right:20px; letter-spacing:2px;">
            <i class="fas fa-gamepad"></i> PIXEL STUDIO
        </div>
        <div class="menu-item" onclick="importFile()">File</div>
        <div class="menu-item" onclick="window.undo()">Edit</div>
        <div class="menu-item">View</div>
    </div>

    <div id="toolbar">
        <div class="tool-group">
            <button class="tool-btn active" id="tool-pen" title="Pen (B)"><i class="fas fa-pencil-alt"></i></button>
            <button class="tool-btn" id="tool-eraser" title="Eraser (E)"><i class="fas fa-eraser"></i></button>
            <button class="tool-btn" id="tool-fill" title="Bucket (F)"><i class="fas fa-fill-drip"></i></button>
            <button class="tool-btn" id="tool-picker" title="Picker (I)"><i class="fas fa-eye-dropper"></i></button>
            <button class="tool-btn" id="tool-move" title="Move (M)"><i class="fas fa-arrows-alt"></i></button>
            <button class="tool-btn" id="tool-shape" title="Shape (R)"><i class="far fa-square"></i></button>
        </div>
        
        <div class="tool-group">
            <button class="tool-btn" id="btn-undo"><i class="fas fa-undo"></i></button>
            <button class="tool-btn" id="btn-redo"><i class="fas fa-redo"></i></button>
        </div>

        <div class="tool-group">
            <button class="tool-btn" id="btn-onion" title="Onion Skin">ON</button>
            <button class="tool-btn" id="btn-grid" title="Grid">#</button>
        </div>

        <div style="flex-grow:1"></div>

        <div class="tool-group" style="border:none;">
            <input type="number" id="canvas-w" value="32" style="width:40px;">
            <span style="color:#666">x</span>
            <input type="number" id="canvas-h" value="32" style="width:40px;">
            <button class="tool-btn btn-text" onclick="resizeProject()">SIZE</button>
        </div>
        
        <div class="tool-group" style="border:none;">
            <button class="tool-btn btn-text primary" onclick="saveProject()">SAVE</button>
        </div>
    </div>

    <div id="layout">
        
        <!-- LEFT: TOOLS & PALETTE -->
        <div id="sidebar" class="panel">
            <div class="panel-header">COLOR <i class="fas fa-palette"></i></div>
            <div class="panel-content">
                <div id="color-picker-advanced">
                    <div class="cp-row">
                        <canvas id="cp-sv-box" width="200" height="150"></canvas>
                        <canvas id="cp-hue-strip" width="20" height="150"></canvas>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <div id="cp-current-color" style="width:30px;"></div>
                        <input type="text" id="hex-input" value="#000000" style="flex-grow:1;">
                    </div>
                </div>
                <div id="palette-grid"></div>
            </div>
        </div>

        <!-- CENTER: CANVAS -->
        <div id="center-panel">
            <div id="viewport">
                <canvas id="drawing-canvas"></canvas>
            </div>
            
            <!-- TIMELINE -->
            <div id="timeline">
                <div id="timeline-header">
                    <button class="tool-btn" onclick="addFrame()" style="height:24px;"><i class="fas fa-plus"></i></button>
                    <button class="tool-btn" onclick="duplicateFrame()" style="height:24px;"><i class="fas fa-copy"></i></button>
                    <button class="tool-btn" onclick="deleteFrame()" style="height:24px; color:#e74c3c;"><i class="fas fa-trash"></i></button>
                    <span style="margin-left:10px; color:#666; font-size:0.9rem;">FRAME: <span id="frame-counter" style="color:#fff;">1/1</span></span>
                </div>
                <div id="frames-strip"></div>
            </div>
        </div>

        <!-- RIGHT: LAYERS & PREVIEW -->
        <div id="inspector" class="panel">
            
            <div class="panel-header">PREVIEW <i class="fas fa-play-circle"></i></div>
            <div class="panel-content" style="flex-grow:0; border-bottom:1px solid var(--border);">
                <div id="preview-container">
                    <canvas id="preview-canvas"></canvas>
                </div>
                <div style="display:flex; gap:5px; margin-top:5px; align-items:center;">
                    <button class="tool-btn btn-text" id="btn-play" style="flex-grow:1;">PLAY</button>
                    <span style="font-size:0.8rem; color:#666;">FPS:</span>
                    <input type="number" id="anim-fps" value="8" style="width:40px;">
                </div>
            </div>

            <div class="panel-header">LAYERS <i class="fas fa-layer-group"></i></div>
            <div class="panel-content" style="padding:0;">
                <div style="padding:5px; display:flex; justify-content:flex-end; border-bottom:1px solid #222;">
                    <button class="tool-btn" style="height:20px; width:20px;" onclick="addLayer()"><i class="fas fa-plus"></i></button>
                </div>
                <div id="layers-list" style="padding:5px;"></div>
            </div>

            <div class="panel-header">ANIMATIONS <i class="fas fa-film"></i></div>
            <div class="panel-content">
                <button class="tool-btn btn-text" style="width:100%; margin-bottom:5px;" onclick="addAnimState()">+ NEW STATE</button>
                <div id="anim-list"></div>
            </div>

        </div>

    </div>

    <!-- Hidden IO -->
    <input type="file" id="file-input" style="display:none" accept=".png,.json">

    <!-- Integration System -->
    <script src="/shared/EventBus.js"></script>
    <script src="/shared/SharedProjectState.js"></script>
    <script src="/shared/AssetManager.js"></script>
    
    <script src="pixel_editor.js?v=pro_tools"></script>
</body>
</html>
