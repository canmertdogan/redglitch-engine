<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDGLITCH ENGINE BOOT</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050001;
            --accent: #ff1e27;
            --accent-glow: #ff2a5f;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'VT323', monospace;
            color: var(--text);
            user-select: none;
            image-rendering: pixelated;
        }

        /* Alive Red Background */
        .ambient-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 30, 39, 0.15) 0%, transparent 80%);
            animation: breathe 4s infinite alternate ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes breathe {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .crt-scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.2) 2px,
                rgba(0, 0, 0, 0.2) 4px
            );
            z-index: 999;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.95) 100%);
            z-index: 998;
            pointer-events: none;
        }

        #warp-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0.5;
            mix-blend-mode: screen;
        }

        /* Top Left Branding */
        .top-left-brand {
            position: absolute;
            top: 50px;
            left: 60px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo {
            width: 56px;
            height: 56px;
            filter: drop-shadow(0 0 15px var(--accent-glow));
            /* In case the icon is white/black, tint it heavily red */
            /* If it's already red, this just enhances it */
            -webkit-filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        .brand-text {
            font-size: 3.5rem;
            color: var(--text);
            letter-spacing: 14px;
            line-height: 1;
            text-transform: uppercase;
            text-shadow: 0 0 30px var(--accent-glow), 2px 2px 0px var(--accent);
            animation: glitch 4s infinite alternate-reverse;
        }

        @keyframes glitch {
            0% { transform: translate(0, 0); text-shadow: 0 0 30px var(--accent-glow), 2px 2px 0px var(--accent); }
            2% { transform: translate(-2px, 1px); text-shadow: 0 0 30px var(--accent-glow), -2px -1px 0px #0ff; }
            4% { transform: translate(2px, -1px); text-shadow: 0 0 30px var(--accent-glow), 2px -1px 0px var(--accent); }
            6% { transform: translate(0, 0); text-shadow: 0 0 30px var(--accent-glow), 2px 2px 0px var(--accent); }
            100% { transform: translate(0, 0); text-shadow: 0 0 30px var(--accent-glow), 2px 2px 0px var(--accent); }
        }

        /* Bottom Section */
        .bottom-section {
            position: absolute;
            bottom: 60px;
            left: 60px;
            right: 60px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .bottom-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        #boot-log {
            width: 400px;
            height: 120px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            font-size: 1.2rem;
            color: var(--text-dim);
            line-height: 1.5;
            letter-spacing: 2px;
        }
        .log-line { opacity: 0.6; }
        .log-line:last-child { opacity: 1; color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

        .status-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        
        #status-text {
            font-size: 1.2rem;
            color: var(--text-dim);
            letter-spacing: 6px;
        }

        #pct {
            font-size: 3rem;
            color: #fff;
            letter-spacing: 4px;
            text-shadow: 0 0 20px var(--accent-glow);
            line-height: 1;
        }

        /* Glowing Progress Bar */
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 30, 39, 0.1);
            position: relative;
            box-shadow: 0 0 10px rgba(255, 30, 39, 0.1);
            overflow: hidden;
            border-radius: 4px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            box-shadow: 0 0 20px 8px var(--accent-glow), 0 0 40px 15px rgba(255, 42, 95, 0.4);
            transition: width 0.1s linear;
            border-radius: 4px;
        }

        /* Hidden elements required by JS */
        .hidden-sys {
            display: none !important;
        }

    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <canvas id="warp-canvas"></canvas>
    <div class="vignette"></div>
    <div class="crt-scanlines"></div>

    <div class="top-left-brand">
        <img src="icons/icon.png" class="logo" alt="RedGlitch Logo">
        <div class="brand-text">REDGLITCH</div>
    </div>

    <div class="bottom-section">
        <div class="bottom-hud">
            <div id="boot-log"></div>
            <div class="status-info">
                <div id="status-text">INITIALIZING...</div>
                <div id="pct">0%</div>
            </div>
        </div>
        
        <div class="progress-track">
            <div class="progress-fill" id="bar"></div>
        </div>
    </div>

    <!-- Hidden chips to satisfy JS -->
    <div class="hidden-sys">
        <div id="chip-core"><div id="fill-core"></div></div>
        <div id="chip-link"><div id="fill-link"></div></div>
        <div id="chip-ui"><div id="fill-ui"></div></div>
        <div id="chip-mode"><div id="fill-mode"></div></div>
    </div>

    <script>
        // ═══════════════════════════════════════════
        // WARP STARFIELD — Red Alive Edition
        // ═══════════════════════════════════════════
        (function () {
            const canvas = document.getElementById('warp-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, stars = [];
            window.warpSpeed = 4.0;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const COLORS = ['#ff2a5f', '#ff5e62', '#ffffff', '#aa0011'];

            class Star {
                constructor() { this.reset(true); }
                reset(randomZ) {
                    this.x = (Math.random() - 0.5) * w * 2.0;
                    this.y = (Math.random() - 0.5) * h * 2.0;
                    this.z = randomZ ? Math.random() * 1000 : 1000;
                    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    this.speedMult = 0.5 + Math.random();
                }
                update(speed) {
                    this.z -= speed * this.speedMult;
                    if (this.z <= 0) this.reset(false);
                }
                draw() {
                    const k = 280 / this.z;
                    const px = this.x * k + w / 2;
                    const py = this.y * k + h / 2;
                    if (px < 0 || px > w || py < 0 || py > h) return;
                    const size = Math.max(2, Math.floor(6 - (this.z / 200)));
                    ctx.fillStyle = this.color;
                    ctx.fillRect(Math.floor(px), Math.floor(py), size, size);
                }
            }

            for (let i = 0; i < 400; i++) stars.push(new Star());

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
                ctx.fillRect(0, 0, w, h);
                const speed = window.warpSpeed;
                for (const star of stars) {
                    star.update(speed);
                    star.draw();
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ═══════════════════════════════════════════
        // BOOT SEQUENCE LOGIC
        // ═══════════════════════════════════════════
        const bootLines = [
            "BIOS DATE 06/16/26 18:00:00 VER 7.00",
            "CPU: REDGLITCH NEURAL PROCESSOR",
            "Speed: 8.4 GHz",
            "Memory Test: 1048576K OK",
            "Initializing Virtual File System...",
            "Mounting /dev/core...",
            "Loading Modules: GFX, AUDIO, PHYSICS",
            "Establishing neural link...",
            "Link OK.",
            "Waking the ghost...",
            "SYSTEM READY."
        ];

        let progress = 0;
        const bar = document.getElementById('bar');
        const pct = document.getElementById('pct');
        const statusEl = document.getElementById('status-text');
        const logContainer = document.getElementById('boot-log');

        function appendLog(text) {
            const div = document.createElement('div');
            div.className = 'log-line';
            div.innerText = '> ' + text;
            logContainer.appendChild(div);
            if (logContainer.children.length > 5) {
                logContainer.removeChild(logContainer.firstChild);
            }
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        let currentLineIndex = 0;
        const lineInterval = setInterval(() => {
            if (currentLineIndex < bootLines.length) {
                appendLog(bootLines[currentLineIndex]);
                currentLineIndex++;
            } else {
                clearInterval(lineInterval);
            }
        }, 700);

        // Chip activation logic (Hidden but functional)
        const chipCore = document.getElementById('chip-core');
        const chipLink = document.getElementById('chip-link');
        const chipUi = document.getElementById('chip-ui');
        const chipMode = document.getElementById('chip-mode');
        const fillCore = document.getElementById('fill-core');
        const fillLink = document.getElementById('fill-link');
        const fillUi = document.getElementById('fill-ui');
        const fillMode = document.getElementById('fill-mode');

        function updateChips(pct) {
            const activate = (chip, fill, threshold, active) => {
                chip.classList.toggle('active', active);
                if (fill) fill.style.width = active ? Math.min(100, ((pct - threshold) / (100 - threshold)) * 100) + '%' : '0%';
            };
            activate(chipCore, fillCore, 0, pct > 5);
            activate(chipLink, fillLink, 25, pct > 30);
            activate(chipUi, fillUi, 55, pct > 60);
            activate(chipMode, fillMode, 80, pct > 85);
        }

        function updateProgress() {
            if (progress < 100) {
                // Slower progress step to stretch out to ~10+ seconds
                let step = Math.random() * 0.5;
                
                // Add a chance for random "hangs" to simulate loading large assets
                if (Math.random() > 0.95) step = 0; 

                // Even slower at the very end
                if (progress > 85) step = 0.15;
                
                progress += step;
                if (progress > 100) progress = 100;

                if (bar) bar.style.width = progress + '%';
                if (pct) pct.innerText = Math.floor(progress) + '%';

                window.warpSpeed = 4.0 + (progress * progress * 0.02);
                updateChips(progress);

                if (progress >= 100) {
                    statusEl.innerText = 'BOOT COMPLETE';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 600);
                    return;
                }
                setTimeout(updateProgress, 60);
            }
        }

        setTimeout(updateProgress, 500);
    </script>
</body>
</html>
