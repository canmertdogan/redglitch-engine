<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' http://localhost:3000 ws://localhost:3000; img-src 'self' data:;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ketebe Terminal // Puzzle Node</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link href="fonts/fonts.css" rel="stylesheet">
    <style>
        :root {
            --bg: #080d1b;
            --panel: #040913;
            --line: rgba(106, 241, 194, 0.16);
            --text: #7af1c8;
            --dim: #4ec8a3;
            --warn: #ffd08a;
            --accent: #6fd9ff;
            --error: #ff8e8e;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, #162748 0%, var(--bg) 55%, #02050a 100%);
            color: var(--text);
            font-family: "VT323", monospace;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background-image: linear-gradient(transparent 95%, rgba(122, 241, 200, 0.09) 96%);
            background-size: 100% 4px;
            z-index: 1;
        }

        body::after {
            background: radial-gradient(circle at 15% 15%, rgba(111, 217, 255, 0.09), transparent 40%);
            z-index: 1;
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: 2;
            opacity: 0.045;
            background-image: radial-gradient(circle, #ffffff 0.5px, transparent 0.6px);
            background-size: 3px 3px;
            pointer-events: none;
        }

        .layout {
            position: relative;
            z-index: 3;
            width: min(1050px, 94vw);
            margin: 18px auto;
            height: calc(100vh - 36px);
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(4, 9, 19, 0.92);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.56), inset 0 0 36px rgba(0, 0, 0, 0.55);
            display: grid;
            grid-template-rows: auto 1fr auto;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
            letter-spacing: 0.08rem;
            text-transform: uppercase;
        }

        .topbar strong {
            color: var(--accent);
            font-size: 1.25rem;
        }

        .chip {
            border: 1px solid rgba(111, 217, 255, 0.35);
            color: var(--accent);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        #terminal-output {
            margin: 0;
            padding: 14px 16px;
            overflow: auto;
            line-height: 1.28;
            font-size: 1.2rem;
            scrollbar-width: thin;
            white-space: pre-wrap;
        }

        .line {
            margin-bottom: 2px;
        }

        .line.dim {
            color: var(--dim);
        }

        .line.warn {
            color: var(--warn);
        }

        .line.error {
            color: var(--error);
        }

        .prompt {
            border-top: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            background: rgba(0, 0, 0, 0.22);
        }

        .prompt-label {
            color: var(--accent);
            font-size: 1.15rem;
            white-space: nowrap;
        }

        #command-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font: inherit;
            font-size: 1.24rem;
            outline: none;
        }

        #quick-links {
            position: fixed;
            left: 24px;
            bottom: 24px;
            z-index: 4;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-width: min(92vw, 560px);
        }

        #quick-links a {
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 6px 10px;
            background: rgba(0, 0, 0, 0.26);
            transition: border-color 0.15s ease;
        }

        #quick-links a:hover {
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="noise"></div>

    <main class="layout">
        <header class="topbar">
            <strong>Ketebe Puzzle Terminal</strong>
            <span class="chip" id="status-chip">locked</span>
        </header>

        <pre id="terminal-output" aria-live="polite"></pre>

        <div class="prompt">
            <span class="prompt-label">operator@ketebe:~$</span>
            <input id="command-input" type="text" autocomplete="off" spellcheck="false" placeholder="type help">
        </div>
    </main>

    <nav id="quick-links" aria-label="quick links">
        <a href="slot_selection.html">campaign</a>
        <a href="campaign_launcher.html">quick play</a>
        <a href="campaign_editor.html">editor</a>
        <a href="tools.html">tools</a>
        <a href="credits.html">credits</a>
    </nav>

    <script>
        (function() {
            const output = document.getElementById('terminal-output');
            const input = document.getElementById('command-input');
            const statusChip = document.getElementById('status-chip');

            let unlocked = localStorage.getItem('ketebe_terminal_unlocked') === '1';
            let clueStep = 0;
            let history = [];
            let historyIndex = 0;

            function line(text, klass) {
                const span = document.createElement('span');
                span.className = klass ? "line " + klass : "line";
                span.textContent = text;
                output.appendChild(span);
                output.appendChild(document.createTextNode("\n"));
                output.scrollTop = output.scrollHeight;
            }

            function boot() {
                line("KETEBE SECURE NODE // RETRO TERMINAL INTERFACE", "warn");
                line("Build 1.0.43 // Session initialized.", "dim");
                line("Type 'help' to list commands.", "dim");
                line("");
                line("Puzzle objective: recover the passphrase and unlock hidden commands.", "warn");
                line("Hint: run 'clue' more than once.");
                if (unlocked) {
                    statusChip.textContent = "unlocked";
                    line("Welcome back, operator. Secret channel already unlocked.", "warn");
                }
            }

            function clearOutput() {
                output.textContent = "";
            }

            function unlock() {
                unlocked = true;
                localStorage.setItem('ketebe_terminal_unlocked', '1');
                statusChip.textContent = "unlocked";
                line("PASSCODE ACCEPTED. Secret channel unlocked.", "warn");
                line("Now available: run secret, run credits, run campaign, run quick, run editor, run tools");
            }

            function listHelp() {
                line("Available commands:", "dim");
                line("  help       - show this list");
                line("  clear      - clear terminal");
                line("  whoami     - show active profile");
                line("  clue       - reveal passphrase clues");
                line("  bootlog    - replay puzzle briefing");
                line("  run <cmd>  - open pages (more unlock after puzzle)");
                line("  reset      - lock terminal again");
            }

            function doRun(arg) {
                const map = {
                    credits: "credits.html",
                    campaign: "slot_selection.html",
                    quick: "campaign_launcher.html",
                    editor: "campaign_editor.html",
                    tools: "tools.html",
                    secret: "credits.html#decoded"
                };

                if (!arg) {
                    line("Usage: run <credits|campaign|quick|editor|tools|secret>", "error");
                    return;
                }

                if (!unlocked && arg !== "credits") {
                    line("Channel locked. Solve the puzzle first. Try: clue", "error");
                    return;
                }

                const target = map[arg];
                if (!target) {
                    line("Unknown run target: " + arg, "error");
                    return;
                }

                line("Launching: " + arg + "...", "dim");
                window.location.href = target;
            }

            function doClue() {
                clueStep += 1;
                if (clueStep === 1) {
                    line("CLUE[1]: The key starts with the engine core: V8", "warn");
                    return;
                }
                if (clueStep === 2) {
                    line("CLUE[2]: Add a separator, then the word 'EASTER'.", "warn");
                    return;
                }
                if (clueStep === 3) {
                    line("CLUE[3]: End with another separator and 'KETEBE'.", "warn");
                    line("Submit with: pass <phrase>", "dim");
                    return;
                }
                line("No more clues. Build the phrase from all parts.", "dim");
            }

            function resetLock() {
                unlocked = false;
                clueStep = 0;
                localStorage.removeItem('ketebe_terminal_unlocked');
                statusChip.textContent = "locked";
                line("Terminal lock restored.", "warn");
            }

            function runCommand(raw) {
                const command = raw.trim();
                if (!command) return;

                history.push(command);
                historyIndex = history.length;

                line("operator@ketebe:~$ " + command, "dim");
                const [cmd, ...rest] = command.split(/\s+/);
                const arg = rest.join(" ");

                if (cmd === "help") return listHelp();
                if (cmd === "clear") return clearOutput();
                if (cmd === "whoami") {
                    const user = localStorage.getItem('ketebe_username') || "guest";
                    line("active-profile: " + user);
                    return;
                }
                if (cmd === "clue") return doClue();
                if (cmd === "bootlog") return boot();
                if (cmd === "reset") return resetLock();
                if (cmd === "run") return doRun(arg.toLowerCase());
                if (cmd === "pass") {
                    if (arg.toUpperCase() === "V8-EASTER-KETEBE") unlock();
                    else line("Invalid passphrase.", "error");
                    return;
                }

                line("Unknown command: " + cmd + " (try 'help')", "error");
            }

            input.addEventListener('keydown', (event) => {
                if (event.key === "Enter") {
                    runCommand(input.value);
                    input.value = "";
                    return;
                }

                if (event.key === "ArrowUp") {
                    if (history.length === 0) return;
                    historyIndex = Math.max(0, historyIndex - 1);
                    input.value = history[historyIndex] || "";
                    event.preventDefault();
                    return;
                }

                if (event.key === "ArrowDown") {
                    if (history.length === 0) return;
                    historyIndex = Math.min(history.length, historyIndex + 1);
                    input.value = history[historyIndex] || "";
                    event.preventDefault();
                }
            });

            boot();
            input.focus();
        })();
    </script>
</body>
</html>
