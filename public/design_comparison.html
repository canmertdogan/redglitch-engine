<!DOCTYPE html>
<html>
<head>
    <title>Design Comparison - Algorithm Studio vs Interactive Cutscene Editor</title>
    <style>
        body { 
            margin: 0; 
            background: #222; 
            font-family: 'VT323', monospace; 
        }
        .comparison { 
            display: flex; 
            height: 100vh; 
        }
        .frame { 
            flex: 1; 
            border: 2px solid #f1c40f; 
            margin: 5px; 
        }
        .frame h3 { 
            background: #000; 
            color: #f1c40f; 
            margin: 0; 
            padding: 10px; 
            text-align: center; 
        }
    </style>
</head>
<body>
    <div class="comparison">
        <div class="frame">
            <h3>ALGORITHM STUDIO</h3>
            <iframe src="algorithm_editor.html" width="100%" height="calc(100% - 50px)" frameborder="0"></iframe>
        </div>
        <div class="frame">
            <h3>INTERACTIVE CUTSCENE EDITOR</h3>
            <iframe src="interactive_cutscene_editor.html" width="100%" height="calc(100% - 50px)" frameborder="0"></iframe>
        </div>
    </div>
</body>
</html>
